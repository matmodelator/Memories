<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>export-table-range</title>
</head>
<body>

<button id="download-btn">Скачать таблицу</button>
<pre id="debug"></pre>

<script>
document.getElementById("download-btn").addEventListener("click", downloadTable);

async function downloadTable() {
  const debug = document.getElementById("debug");
  debug.textContent = "Старт...\n";

  const indexFiles = [
    "poems.html",
    "songs.html",
    "stories.html"
  ];

  function parseRange(text) {
    const values = [];

    text.split("\n")
      .map(s => s.trim())
      .filter(Boolean)
      .forEach(line => {
        const parts = line.split("|").map(s => s.trim());

        // пропускаем заголовок
        if (parts[0] && parts[0].toLowerCase().includes("критерий")) return;

        if (parts[1]) {
          values.push(parts[1]); // берём только число
        }
      });

    return values;
  }

  try {
    const allLinks = [];

    for (const indexPath of indexFiles) {
      debug.textContent += "Гружу: " + indexPath + "\n";

      const res = await fetch(indexPath);

      if (!res.ok) {
        debug.textContent += "Не найден: " + indexPath + "\n";
        continue;
      }

      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      const links = [...doc.querySelectorAll("a[href$='.html']")]
        .map(a => a.getAttribute("href"))
        .filter(Boolean);

      debug.textContent += "Ссылок в " + indexPath + ": " + links.length + "\n";

      allLinks.push(...links);
    }

    debug.textContent += "Всего файлов: " + allLinks.length + "\n";

    if (!allLinks.length) {
      debug.textContent += "Файлы не найдены\n";
      return;
    }

    const rowsData = [];

    for (const path of allLinks) {
      try {
        debug.textContent += "Гружу: " + path + "\n";

        const fileName = path.split("/").pop();

        const r = await fetch(path);
        if (!r.ok) {
          debug.textContent += "Пропуск " + path + " : " + r.status + "\n";
          continue;
        }

        const text = await r.text();

        const authorMatch = text.match(/author:\s*"([^"]*)"/);
        const styleMatch = text.match(/style:\s*"([^"]*)"/);
        const titleMatch = text.match(/title:\s*"([^"]*)"/);
        const yearMatch = text.match(/year:\s*"([^"]*)"/);
        const placeMatch = text.match(/place:\s*"([^"]*)"/);
        const textMatch = text.match(/text:\s*`([\s\S]*?)`,/);
        const rangeMatch = text.match(/range:\s*`([\s\S]*?)`,/);

        if (!rangeMatch) {
          debug.textContent += "range не найден в: " + path + "\n";
          continue;
        }

        const author = authorMatch ? authorMatch[1].trim() : "";
        const genre = styleMatch ? styleMatch[1].trim() : "";
        const year = yearMatch ? yearMatch[1].trim() : "";
        const place = placeMatch ? placeMatch[1].trim() : "";

        let title = "";

        if (titleMatch && titleMatch[1].trim()) {
          title = titleMatch[1].trim();
        } else if (textMatch && textMatch[1]) {
          title = textMatch[1]
            .split("\n")
            .map(s => s.trim())
            .find(Boolean) || fileName;
        } else {
          title = fileName;
        }

        const values = parseRange(rangeMatch[1]);

        while (values.length < 7) {
          values.push("");
        }

        rowsData.push({
          fileName,
          author,
          genre,
          title,
          values,
          year,
          place
        });

      } catch (e) {
        debug.textContent += "Ошибка в " + path + ": " + e + "\n";
      }
    }

    rowsData.sort((a, b) =>
      a.title.localeCompare(b.title, "ru", { sensitivity: "base" })
    );

    const rows = [];

    rows.push([
      "ID",
      "Стих",
      "Файл",
      "Автор",
      "Жанр",
      "Образность",
      "Ритм",
      "Эмоции",
      "Стиль",
      "Композиция",
      "Оригинальность",
      "Средний",
      "Год",
      "Место"
    ]);

    rowsData.forEach((item, index) => {
      const row = [
        index + 1,
        item.title,
        item.fileName,
        item.author,
        item.genre,
        item.values[0] || "",
        item.values[1] || "",
        item.values[2] || "",
        item.values[3] || "",
        item.values[4] || "",
        item.values[5] || "",
        item.values[6] || "",
        item.year,
        item.place
      ];

      rows.push(row);
    });

    debug.textContent += "Строк в итоговой таблице: " + rows.length + "\n";

    if (rows.length <= 1) {
      debug.textContent += "Данных нет\n";
      return;
    }

    const csv = rows
      .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(","))
      .join("\n");

    debug.textContent += "CSV собран\n";

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "export-table-range.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();

    debug.textContent += "Команда на скачивание отправлена\n";

    setTimeout(function () {
      URL.revokeObjectURL(url);
    }, 1000);

  } catch (e) {
    debug.textContent += "Общая ошибка: " + e + "\n";
  }
}
</script>

</body>
</html>
