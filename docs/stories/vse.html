  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2023",
    title: "Всё зашибись!..",
    text: `
Ладно.
Я не знаю, кто меня сюда добавил, и зачем он(она) это сделал... 🤔но если он(она) полагал, что это просто так - взял и добавил, это была ошибка. Ну раз уж он (она) такую ерунду сотворил, разбередил и разворошил, то сорри, я ни хера ни в чём не виноват. Поэтому, пока Шабат и я не занят ничем общественно полезным, и пью светлый шотландский вискарь, расскажу вам историю из своей жизни, котеги. 🐈  Короче, если без политики, то есть два человека, которые давно умерли, но которые мне снятся до сих пор... это мой отец, и это Олег Кабанков. Они мне снятся всегда живыми... уже более 20 лет, если я не ошибаюсь с подсчётами, ведь физмат то я так и не закончил 🙄 ...ну типа такой расклад... они сильно болели и всё это верно, но всё-таки, слухи об их смерти оказались ошибочными... в общем , оставим моего отца, он здесь почти непричём. Так вот. Да, Кабанков. Сотни раз ... такой сюжет... Кауля 9 и всё такое... я знаю, что его нет... и уже давно. И всё-таки я вижу этот сон. И это не кошмар. Это лёгкое сновидение, и я просыпаюсь потом почти счастливым на мокрой подушке. Если конечно можно употребить слово счастье в (о) моей блядской жизни. Во сне он живой... обычно он звонит по телефону... надо понимать, что сначала у нас не было дома телефона... а потом типа мы стали в очередь на подключение.. ну и сказали, что подключат со следующего месяца.. а я числа 20-го предыдущего притащил телефонный аппарат попробовать... а он гудит себе..аппарат...ну и я позвонил Кабанкову... а у них был уже телефон. И вуаля!.. так вот... он звонит. Кабанков. Я охуеваю, естественно, но вида не подаю. И он заходит так буднично типа, а хуйли? Ты ж не верил, что я умер, не так ли, бразер?Иногда я с ней. С Леной Плетенёвой. Ну а как же без неё то, да Борис? 😜и он приходит, и мы бухаем втроём , разбавляем папин спирт маминым морсом, и закусываем огурцами, которые Лена притащила, всё равно у нас уже нет сил на любовь и совокупления, так что ж ещё нам остаётся делать то, сука? Мама Лены готовила такие мелкие огурчики-патиссончики , прямо отпад! Закусываем. Это ахуенно вкусно и вся ситуация будоражит и пьянит своей запретностью и вообще запредельностью. А потом мы идём между детсадом и нашим домом. В сторону универсама. И дальше.. туда .. в поля. Где деревня Подъячье, футбольное поле, свобода, репетитор по физике и река Упа. Теперь там многоэтажки, суворовское училище, магазин Глобус и парк Патриот. Правда сейчас ночь, и завтра экзамен по алгебре, но мне плевать!.., и поэтому мы выходим в светлую июньскую ночь через окно моей кухни. А там как раз козырёк над подъездом есть - кто не верит, можно посмотреть и убедиться. Мама потом много лет  недоумевала, как я сбегал из дому по-ночам?.. бедная моя наивная мама, я долго потешался над твои недоумением ...И тут в кухню заходит папа, и такой спрашивает меня: вы куда собрались то? А я говорю - Папа, да все путём, мы на рыбалку, все живы! И мы сваливаемся с карниза и ржём втроём в голос. Света смотрит на нас из окна с третьего этажа. И я машу ей рукой. Привет, мечта. Ты всё ещё здесь?! Нет. Она съехала много лет назад. И в этом окне нынче лишь призраки и паутина. Каждый раз, проходя тут, я подымаю глаза 👀. Вот справа твоё окно, а вот слева детский сад, где я впервые увидел тебя голой. Ты этого не помнишь, но для меня  это было главное эротическое приключение примерно до 10 класса. А возможно и намного дольше. Но это отдельная история, правда? С днём рождения, любовь. Ты всё ещё снишься мне, несмотря ни на что.  Потом мы плавно переносимся ко мне в общагу. Кто там был?.. ну ясное дело, Кабанков, Борисов, Света, Таня, кто ещё ?.. Галя... ? ничего не видно, все заволокло ... видно вокзал в Риге, а потом поезд Рига-Москва... блондинка и брюнетка... Рома, ты кого из них хочешь? Выбирай, друг!..Квартира на Арбате. Прямо напротив стены с Цоем... ну то есть Цой появится на ней чуть позже... и каждый раз, проходя мимо этой стены, я буду искать глазами тот двор... да где ж он, сука?! Парадное, проходные комнаты... белые скатерти с кружавчиками, туалет в коридоре, Бабушка блондинки...нихера себе!!!? Нету ни черта. Один долбаный новострой. Бабушку блондинки давно свезли на Митинской кладбище. Так бывает вообще? Рома. Я всегда хотел ту брюнетку вместо своей блондинки... я даже встречался пару раз с ней после. И с Аней Голубевой тоже. Но только ничего на было. Потому что Девушка друга - это то, от чего ты должен отказаться. Как бы тебе этого не хотелось!..,По крайней мере, мне так казалось всегда. Потом ещё много лет спустя дом отдыха в Велегоже... я даю концерт в клубе... полный зал, все хлопают, тёлочки, косички, популярность. Красивая буфетчица... кого-то напоминает мне...мой дружок Вадим хочет её закадрить... смотри, красавица, тот на сцене- он со мной. Я знаю его, говорит Алла. Это мой одноклассник. Мать твою, Алла, что ж ты творишь такое ?!!! Потом встреча выпускников . Незнакомая красивая девушка... как зовут тебя, печаль, ты фотомодель?! ах, мы учились в одном классе, ну что ж такое-то!.. какая ночь Бейби, жаль, что она так коротка, а я столь мудацки пьян... поехали со мною в Крым!.. куда же ты смотрел раньше, дурочек?!? А вот лето, комары, потные пионерки, истомленные вожатые. Секс, наркотики, рок-н-ролл 🎸 Жеееёолтая муха тоски... Я встречаю Бориса на вокзале. Он уже не в форме, но все ещё пахнёт казармой и солидолом. Лебединое озеро. Аня Голубева. На Пушке жгут костры 🔥 пиздец, это что, революция?!! А потом сразу зима, и я еду в этот блядский Велегож. ...тысяча девятьсот лохматый год. То есть нет ни сотовых, ни воцапа, вообще ни хера подобного... в вагоне выбитые стёкла, табачный дым и снежные заносы у дверей тамбура...и я швартуюсь на станции Тарусская и пиздую в сторону Оки... зима, Новый год, везде белый, холодный снег... я останавливаю попутку, парни едут в Велегож... водку будешь из горла? Конечно буду, говно 💩 вопрос. Я так закоченел в этом вонючем вагоне...пацаны, вы Рому Борисова не знаете случайно ? Это который на гитаре поёт?.. ну ясный хрен!!! Если б не был уверен, я бы и не поехал в этот сраный Велегож... и вот Рома... он немного в ахуе, конечно... ещё бы... откуда я тут вообще нарисовался, хрен сотрёшь?))) но места все те же... знакомые, сука, места... и кораблик на месте... в прошлый раз я был на нем с Наташей... Наташа, ты же помнишь это ржавый катер, правда? Как хорошо на борту судна , пока все готовят макароны по-флотски на берегу.. потом я отхожу на занозистой палубе, и появляется Кабанков. Курить будешь? Конечно, друг! И мы ныряем с истлевшей кормы. И плывём на остров. Широка Ока моя родная. И редкая рыбка доплывёт до её середины. А потом звонит телефон, и чужим голосом говорит Марина. Умер. Как так, сука!? Саша, куда ты смотрел? Почему это случилось? Нет ответа. Да и некому предъявить... все заволокло дымом, гарью, пеплом. Временем, которое убивает вернее, чем спирт или шрапнель. Остались только сны. И слова. И любовь.
Сны растают как утренний туман над Галилейским морем , слова распадутся на цифры, буквы и стоны. И только любовь останется с тобой всегда. Да конца. Спи спокойно, друг. Всё заебись!

22.08.2023
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
