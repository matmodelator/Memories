    year: "2017",
    title: "",
    text: `
Бабушкина квартира


На праздники и на Новый год было принято ходить к деду. Деда Гиля и баба Зоя жили в трехкомнатной квартире на проспекте Ленина. Их жилище казалось мне роскошным и огромным.  В гостиной поскрипывал паркет, позвякивал хрусталь и стояло черное пианино, на котором мне еще только предстояло научиться играть. На кухне всегда вкусно пахло бабушкиными пирогами, а в кабинете деда его сигаретами. Когда было тепло, он уходил курить на балкон. Я любил стоять рядом с ним, смотреть на троллейбусы, которые разворачивались на конечной остановке имени загадочного Зеленстроя, и вдыхать табачный дым. Дед ужасно кашлял,особенно по утрам, и всю жизнь его пилили за то, что он курил - один в семье, не считая меня, конечно. Дед упорно продолжал дымить, и жизнь показала, что он был не так уж и не прав. Он прожил до 90 лет, и я уверен, что мог дотянуть и до ста, если бы не бабушка и ее альцгеймер, превратившие последние их годы в сущий кошмар. И конечно же если бы не преждевременная смерть моего отца, страшно подкосившая их обоих. Дед был изрядным сибаритом - насколько им можно было стать в аскетичной атмосфере развитого социализма. Помимо курения, он страдал лишним весом и высоким давлением, а также не отказывал себе в удовольствии выпить рюмку другую - благо несколько лет он прожил с семьей в Ереване, откуда время от времени приходили посылки с мандаринами, виноградом, армянским коньяком и сладкими колбасками, предназначавшимися для меня и моего двоюродного брата Сашки. Дед был профессиональным другом, если так можно выразиться - в старом добром понимании дружбы, как семейной реликвии. Его записная книжка была исписана мелким почерком, и он тратил долгие дни на то, чтобы написать сотни писем своим друзьям на Новый год и на дни рождения. Мне казалось, что дед пережил их всех. Однако на его похороны собралось никак не меньше ста человек - когда я увидел эту толпу у его подъезда, я разрыдался. Как бы то ни было, дед надолго пережил моего отца, который не пил, не курил, и вообще не имел никаких вредных наклонностей, если не считать привычки нервически трясти ногой под столом и любую незначительную проблему превращать в трагедию, которые я конечно же перенял у него, как и всегда я безошибочно улавливал и копировал все дурные манеры своих родственников. И до сих пор я трясу ногой, когда сижу на диване, и вечно раздуваю из мухи слона. Это нехорошо, но видно уж такой я есть - сын своего отца. 

Впрочем в те почти былинные времена все еще были живы и даже счастливы. У деда собиралось изысканное общество, практически исключительно еврейское. Глузманы, Ковсманы, Вайсманы, Клевицкие - все доценты с кандидатами. Умные, образованные, хорошо воспитанные. Тогда они были советской производственной интеллигенцией, теперь в ходу почти ругательное слово "либералы". Впрочем бывали времена, когда их величали безродными космополитами, а то и еще чем похуже. Если бы эти почтенные люди нашли в себе достаточно мужества и авантюризма, чтобы вовремя свалить из совка, они могли бы встречаться в Кнессете, а не на дедовой квартире. Неевреем был только Коля Антоненко, зато жена его была стопроцентная еврейка - такая красивая и величественная, и к тому же намного моложе всей остальной компании, по крайней мере, насколько мне казалось. Еще Коля был заядлым филателистом и членом тульского клуба. Я тоже в ту пору увлекался марками, и именно он ввел меня в этот особый маленький мирок с его неповторимым колоритом и ароматом. Вместе мы ходили на вернисаж в ДК Профсоюзов, где можно было купить или обменять марки с рук. Часами я просиживал у них дома на Красноармейском проспекте, разглядывая колину коллекцию, а также его прехорошенькую дочку Аню. У нее были розовые щечки с ямочками и не менее розовые ушки - и все это пиршество обрамляли почти тоже розовые локоны. Когда она стояла на фоне светлого окна, то эти невероятные ушки как бы просвечивались насквозь, что приводило меня в неизменный восторг и неосознанный трепет. Результатом этого моего хобби стало первое сердечное разочарование, а также участие в тульской городской выставке филателистов, где моя коллекция на тему кошек и прочих львов с тиграми была удостоена бронзовой медали. По сути, можно считать, что я первым в мире сообразил, насколько прикольно постить "котегов" - задолго до появления интернета и фейсбука. В этом еврейском собрании было принято восхищаться бабушкиной стряпней - надо отдать ей должное, ибо баба Зоя и действительно готовила не на шутку. Особенно ей удавались фирменные блюда - пироги с мясом и сладкие торты. По правде сказать, я знаю только двух людей, которые бы готовили вкуснее. Дед никогда не участвовал в приготовлении пищи - до тех самых пор, пока альцгеймер давал еще бабушке возможность готовить без угрозы перепутать суп с чаем или взорвать весь дом при помощи газовой плиты. Вообще их быт во многом напоминал добрые старорежимные времена с этим неспешным, раз и навсегда устоявшимся укладом. Например, дед никогда не убирал кровать якобы потому, что бабушка в 1945 году проиграла ему спор о том, когда закончится война. Чтобы вы понимали, это длилось без малого 70 (семьдесят) лет!..
По праздникам мужское общество в какой-то момент уединялось в дедовом кабинете. Там курили, играли в шахматы и даже в преферанс, по-моему. Говорили о науке и футболе (все болели за "Спартак" и только я за тбилисское "Динамо"). Это было что-то навроде сигарного зала, куда допускались только мужчины, и где можно было отдохнуть от глупых бабьих пересудов. Когда бабушка уже не смогла более тянуть на себе хозяйство и быт, дед поразил всех, и меня в особенности. Сначала он начал делать закупки, потом уборку и мелкие работы по дому. В конце концов, он полностью взвалил на себя кухню, хотя за всю предыдущую жизнь вряд ли приготовил что-то весомее яичницы-глазуньи. Так я понял, что талантливый человек воистину должен быть талантлив во всем.

Трехкомнатная квартира деда была дворцом по сравнению с нашей затрапезной комнатушкой в семейной общаге. Гостиная, в которой был настоящий лакированный паркет, казалась огромной. В ней было аж целых два окна, а балкон выходил на главную улицу города - проспект Ленина. Все комнаты были изолированными, но спальня и кабинет деда еще и соединялись между собой дополнительной дверью, что было просто невиданным в убогом мире хрущевок и коммуналок. В серванте словно на музейном стенде был выставлен хрусталь, казавшийся мне весьма изысканным и прихотливым. Однако главное сокровище находилось в книжном шкафу - 33 тома БСЭ (большой советской энциклопедии) красного парткомовского цвета и еще 10 зеленых томов старой энциклопедии, изданных, страшно сказать, при товарище Сталине. Одно лишь сопоставления отсутствия либо наличия тех или иных статей в этих увесистых фолиантах могло дать довольно точное представление о колебаниях линии коммунистической партии и советского правительства на разных этапах строительства социализма. Я провел сотни или даже тысячи часов, перелистывая эти роскошно изданные книги, не уступавшие своим весом и всеохватным знанием талмуду. Купить их можно было либо за большие деньги, либо по большому блату. Дед был профессором, автором бесчисленных трудов по химической технологии, а в Академию наук его не брали по той единственной причине, что там наблюдался перманентный переизбыток лиц еврейского происхождения. Тем не менее он обладал достаточно высоким социальным статусом. Работал он неподалеку от дома в институте ВНИПИМ, поэтому обедать ходил домой. Это выглядело старорежимно и чуть ли не буржуазно)) Благодаря руководящей должности ему иногда перепадали бесплатные профкомовские путевки в Трускавец или Кисловодск - об одной из этих поездок я расскажу потом очень подробно. И конечно же у деда была машина, и не просто какая-то, а самая настоящая "Волга ГАЗ-21" с переключением передач на руле и оленем на капоте цвета "мокрый асфальт" - теперь это называется "серый металлик"!!!). Ездил он очень плохо отчасти в связи с избыточным весом, отчасти ввиду излишней нервозности и, конечно, главным образом, из-за почтенного возраста. Тем не менее в молодые годы вместе с бабушкой и близнецами они объездили весь Советский Союз, по крайней мере его европейскую часть - от Молдавии до Латвии. Летом на этой "Волге" мы совершали ритуальные трипы по Калужской дороге в березовую рощу недалеко от поселка Иншинский и пруда Карпики, где собирали грибы и даже иногда купались. Я всегда мечтал прокатиться на этой машине, чего мне так и не удалось никогда сделать. Однажды, когда дед оставил ключ в замке зажигания, а коробку на передаче, я повернул ключ и чуть не задавил деда, который в это время прислонился к капоту. Мне было лет десять, наверное. Позже, когда уже была куплена наша дача в Хомяково, машина стала постепенно переходить в управление отцу. Когда папа заболел, дед снова стал ездить сам, хотя ему и было уже за 80, а после его смерти "Волга" отошла моему брату Саше, который всегда считался в семье экспертом в области автомобилей. До сих пор я иногда хочу прикоснуться к ее породистым поверхностям и деталям, и думаю, почему же мне так никогда и не удалось сесть за руль столь изысканной машины, если, конечно, не считать того случая в детстве))) Но почему-то после смерти отца и деда мне стала неприятной мысль об этом автомобиле, пережившем двух своих хозяев. Увы, вещи часто этим грешат, хотя, как правило, в этом и нет их вины. 
Когда бабушка стала терять память, а особенно со смертью деда, душа стала потихоньку покидать их квартиру. Заходя туда, я каждый раз поражался упадку и тлену, воцарившимся в некогда живом и теплом пространстве. Низкие потолки, затертый паркет, старая мебель и печальная убогость советского жилья - со временем все стало проступать наружу и бросаться в глаза. Точно так плесень, дремавшая все лето, проявляется зимой в сырых углах уродливыми серыми пятнами, словно негатив, сквозь пласты времени, краски и побелки. Даже энциклопедии как-то затерлись и обветшали, да и вообще устарели, потеряв всякий смысл с появлением интернета. С тех пор меня обуяла жажда перемены мест - я не хочу жить в доме, их которого меня когда-нибудь вынесут. Эта изящная и наивная фобия, в конце концов, привела к тому, что в один прекрасный день я обнаружил себя в полном недоумении на берегу Средиземного моря с теудат зеутом в кармане...


12 марта 2017
`
  };

 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;});

  meta.style.left = "0";

  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
