  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2023",
    title: "Эклеры",
    text: `
Диана Версяцкайте

Когда мы познакомились, моя аура было крохотной, драной и тёмной, как коричневые чулочки второклассницы. Израиль крепко держал меня в тесной, но крепкой тюрьме своей повседневности, словно плохоощипанную тушку петуха в микроволновке. Работа больше не приносила радости, превратившись в бесконечную череду тренировок, игр и военных действий против начальства с применением высокоточного оружия. Дочь сторонилась и была холодна со мной, пропадая у своего бойфренда, что делало меня бесконечно и беспросветно несчастным. И даже столь ожидаемый контрнаступ забуксовал где-то в приазовских степях, разбрасывая гусеницами сухую почву Северной Таврии вперемежку с  красной солдатской кровью. И тут появилась ты. Ты сняла трубку на другом конце земли, прислонившись рваными джинсами к прохладному металлу автобусной остановки и затараторила своим неподражаемым и еле уловимым балтийским акцентом. Сначала я пытался следовать в фарватере твоей речи, но ты не стала ждать автобуса, а вместо этого почти мгновенно преодолела четыре километра жаркой вильнюсской улицы. Быстро смекнув, что угнаться за тобой невозможно, я просто лёг на дно ванной и стал слушать твой голос, сладкий и звонкий, будто только что испечённый эклер. Примерно за 5 минут ты рассказала мне всё, что я и не думал узнать в течение следующих пары недель. Когда ты повесила трубку и умчалась на педикюр, воцарилась пустота, похожая на бескрайность открытого космоса. Я понял, что мне не хватает серебристого звона твоего голоса. Пространство было наполнено белым шумом, который абсолютно не имел смысла и не содержал ни единого байта информации. Я лежал в прохладной воде и слушал, как капает жизнь из крана. Капли возникали, набухали, формировались, срывались в пике и бесконечно долго летели вниз, чтобы в конце пути взорваться оглушительной бавовной. Через дорогу ошалевшими голосами горланили свои бесконечные распевы ортодоксы. Какой-то идиот вот уже полчаса беспрерывно сигналил в клаксон. В соседнем квартале что-то визжала явно ненормальная женщина, её муж в ответ орал, как бешеный павиан во время брачных игр, а их дебильный отпрыск просто истошно вопил, пытаясь заглушить своих родителей, шум дороги, бригаду рабочих, которые с адским грохотом отпиливали ветки с деревьев, попутно перерезав два забора и линию электропередач, а также моего фашиста-соседа, с остервенениям вонзающего перфоратор в свою долбаную стену в компании двенадцати говорливых палестинских строителей. А выключил воду и подумал, что если мне не лень будет спуститься с третьего этажа, то пожалуй, я сделаю доброе дело и убью их всех. Но тут зазвонил телефон и твоим голосом сказал, что ты уже вышла из соляриума, и, что если я не занят и не общаюсь с другой, то у тебя есть время немного поболтать по дороге на работу между автобусом и тизиотерапевтом, потому что вечером сосед позвал тебя на шашлыки, и у тебя совсем не будет времени на меня. Конечно, - ответил я, улыбнулся и понял, что пропал.

23-24 июля 2023. Вена - Тель-Авив
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
