<!DOCTYPE html>
<!-- version: v1.0.0
PARSING-->

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eBook Memories</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

header {
  background: #2563eb;
  color: white;
  padding: 16px;
  text-align: center;
}

.container {
  max-width: 980px;
  margin: 24px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.status {
  margin: 16px 0;
  padding: 12px 14px;
  border-radius: 8px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  white-space: pre-wrap;
}

.status.good {
  background: #f0fdf4;
  border-color: #bbf7d0;
}

.status.bad {
  background: #fef2f2;
  border-color: #fecaca;
}

.log {
  margin-top: 20px;
  background: #0f172a;
  color: #dbeafe;
  padding: 14px;
  border-radius: 8px;
  height: 380px;
  overflow: auto;
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}
</style>

</head>

<body>

<header>
  <h1>eBook Memories</h1>
</header>

<div class="container">

<div class="buttons">
  <button onclick="buildEbook()">Собрать Memories.epub</button>
</div>

<div id="status" class="status">Готов</div>
<div id="log" class="log"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

/*
========================================
ГЛОБАЛЬНЫЕ
========================================
*/

let BOOK_ITEMS = []

const logBox =
  document.getElementById("log")

const statusBox =
  document.getElementById("status")

/*
========================================
ЛОГ
========================================
*/

function log(text) {
  logBox.textContent += text + "\n"
  logBox.scrollTop = logBox.scrollHeight
}

/*
========================================
СТАТУС
========================================
*/

function setStatus(text, error = false) {
  statusBox.textContent = text
  statusBox.className = error ? "status bad" : "status good"
}

/*
========================================
ОЧИСТКА
========================================
*/

function clean(value) {
  return String(value || "")
    .replace(/\r/g, "")
    .replace(/\u00A0/g, " ")
    .replace(/\t/g, " ")
    .replace(/\s+/g, " ")
    .trim()
}

function getFirstLine(text) {
  const lines =
    String(text || "")
      .replace(/\r/g, "")
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean)

  return lines.length ? clean(lines[0]) : ""
}

/*
========================================
РАЗДЕЛ
========================================
*/

function detectSection(file) {
  if (file.includes("poems/")) return "poems"
  if (file.includes("songs/")) return "songs"
  if (file.includes("stories/")) return "stories"
  return ""
}

function sectionTitle(section) {
  if (section === "poems") return "Стихи"
  if (section === "songs") return "Песни"
  if (section === "stories") return "Проза"
  return "Тексты"
}

/*
========================================
FETCH HTML
========================================
*/

async function fetchHtml(path) {
  log("Открываю: " + path)

  const res =
    await fetch(path, {
      cache: "no-store"
    })

  if (!res.ok)
    throw new Error("Не удалось открыть: " + path)

  return await res.text()
}

/*
========================================
СПИСОК ФАЙЛОВ ИЗ СТРАНИЦЫ
========================================
*/

async function getFilesFromPage(page) {
  try {
    const html =
      await fetchHtml(page)

    const doc =
      new DOMParser()
        .parseFromString(html, "text/html")

    const links =
      Array.from(doc.querySelectorAll("a[href]"))

    const hrefs =
      links
        .map(a => (a.getAttribute("href") || "").trim())
        .filter(Boolean)

    let files = []

    if (page === "poems.html") {
      files = hrefs.filter(href =>
        (href.includes("poems/") || href.includes("poem_")) &&
        href.endsWith(".html") &&
        !href.endsWith("poems.html")
      )
    }

    else if (page === "songs.html") {
      files = hrefs.filter(href =>
        (href.includes("songs/") || href.includes("song_")) &&
        href.endsWith(".html") &&
        !href.endsWith("songs.html")
      )
    }

    else if (page === "stories.html") {
      files = hrefs.filter(href =>
        (href.includes("stories/") || href.includes("story_")) &&
        href.endsWith(".html") &&
        !href.endsWith("stories.html")
      )
    }

    log("Страница: " + page)
    log("Подходящих файлов: " + files.length)

    return files
  }

  catch {
    log("Ошибка страницы: " + page)
    return []
  }
}

/*
========================================
ИЗВЛЕЧЕНИЕ ДАННЫХ ИЗ window.poem
========================================
*/

function extractField(source, name) {
  const reg =
    new RegExp(
      name + "\\s*:\\s*`([\\s\\S]*?)`|" +
      name + "\\s*:\\s*\"([\\s\\S]*?)\"|" +
      name + "\\s*:\\s*'([\\s\\S]*?)'",
      "s"
    )

  const match =
    source.match(reg)

  if (!match)
    return ""

  return match[1] || match[2] || match[3] || ""
}

function extractPoemData(source, file) {
  if (!source.includes("window.poem")) {
    log("window.poem не найден: " + file)
    return null
  }

  const text =
    extractField(source, "text")

  if (!text) {
    log("text не найден: " + file)
    return null
  }

  const titleRaw =
    extractField(source, "title")

  const title =
    clean(titleRaw) || getFirstLine(text)

  return {
    file: file,
    section: detectSection(file),
    title: title,
    author: clean(extractField(source, "author")),
    place: clean(extractField(source, "place")),
    year: clean(extractField(source, "year")),
    style: clean(extractField(source, "style")),
    text: String(text || "")
  }
}

/*
========================================
СБОРКА EPUB
========================================
*/

async function buildEbook() {
  try {
    logBox.textContent = ""

    setStatus("Сборка EPUB...")

    const pages = [
      "poems.html",
      "songs.html",
      "stories.html"
    ]

    let files = []

    for (const page of pages) {
      const list =
        await getFilesFromPage(page)

      files =
        files.concat(list)
    }

    files =
      Array.from(new Set(files))

    log("Всего файлов: " + files.length)

    BOOK_ITEMS = []

    for (const file of files) {
      try {
        const source =
          await fetchHtml(file)

        const item =
          extractPoemData(source, file)

        if (!item)
          continue

        BOOK_ITEMS.push(item)

        log("Добавлен: " + item.title)
      }

      catch {
        log("Ошибка файла: " + file)
      }
    }

    if (!BOOK_ITEMS.length)
      throw new Error("Нет текстов для EPUB")

    await saveEpub(BOOK_ITEMS)

    setStatus("EPUB готов: " + BOOK_ITEMS.length)

  }

  catch (e) {
    setStatus("Ошибка: " + e.message, true)
  }
}

/*
========================================
СОХРАНЕНИЕ EPUB
========================================
*/

async function saveEpub(items) {
  const zip =
    new JSZip()

  zip.file(
    "mimetype",
    "application/epub+zip",
    { compression: "STORE" }
  )

  zip.file(
    "META-INF/container.xml",
    makeContainerXml()
  )

  const chapters = []

  let index = 1

  const sections =
    ["poems", "songs", "stories"]

  for (const section of sections) {
    const sectionItems =
      items.filter(item => item.section === section)

    if (!sectionItems.length)
      continue

    const sectionFile =
      "section-" + section + ".xhtml"

    const sectionId =
      "section-" + section

    chapters.push({
      id: sectionId,
      href: sectionFile,
      title: sectionTitle(section)
    })

    zip.file(
      "OEBPS/" + sectionFile,
      makeSectionXhtml(sectionTitle(section))
    )

    for (const item of sectionItems) {
      const chapterFile =
        "chapter" + String(index).padStart(3, "0") + ".xhtml"

      const chapterId =
        "chapter" + index

      chapters.push({
        id: chapterId,
        href: chapterFile,
        title: item.title
      })

      zip.file(
        "OEBPS/" + chapterFile,
        makeChapterXhtml(item)
      )

      index++
    }
  }

  zip.file(
    "OEBPS/nav.xhtml",
    makeNavXhtml("Memories", chapters)
  )

  zip.file(
    "OEBPS/content.opf",
    makeContentOpf("Memories", "Игорь Хорош", chapters)
  )

  const blob =
    await zip.generateAsync({
      type: "blob",
      mimeType: "application/epub+zip"
    })

  downloadBlob(blob, "Memories.epub")

  log("Файл сохранён: Memories.epub")
}

/*
========================================
EPUB FILES
========================================
*/

function makeContainerXml() {
  return `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`
}

function makeContentOpf(bookTitle, bookAuthor, chapters) {
  const manifest =
    chapters.map(ch =>
      `<item id="${ch.id}" href="${ch.href}" media-type="application/xhtml+xml"/>`
    ).join("\n    ")

  const spine =
    chapters.map(ch =>
      `<itemref idref="${ch.id}"/>`
    ).join("\n    ")

  return `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="bookid">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:identifier id="bookid">memories-${Date.now()}</dc:identifier>
    <dc:title>${escapeXml(bookTitle)}</dc:title>
    <dc:creator>${escapeXml(bookAuthor)}</dc:creator>
    <dc:language>ru</dc:language>
    <meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/, "Z")}</meta>
  </metadata>

  <manifest>
    <item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>
    ${manifest}
  </manifest>

  <spine>
    ${spine}
  </spine>
</package>`
}

function makeNavXhtml(bookTitle, chapters) {
  const items =
    chapters.map(ch =>
      `<li><a href="${ch.href}">${escapeXml(ch.title)}</a></li>`
    ).join("\n      ")

  return `<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:epub="http://www.idpf.org/2007/ops"
      xml:lang="ru"
      lang="ru">
<head>
  <title>${escapeXml(bookTitle)}</title>
</head>
<body>
  <nav epub:type="toc" id="toc">
    <h1>${escapeXml(bookTitle)}</h1>
    <ol>
      ${items}
    </ol>
  </nav>
</body>
</html>`
}

function makeSectionXhtml(title) {
  return `<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xml:lang="ru"
      lang="ru">
<head>
  <title>${escapeXml(title)}</title>
</head>
<body>
  <h1>${escapeXml(title)}</h1>
</body>
</html>`
}

function makeChapterXhtml(item) {
  return `<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xml:lang="ru"
      lang="ru">
<head>
  <title>${escapeXml(item.title)}</title>
  <meta charset="UTF-8"/>
  <style>
    body {
      font-family: serif;
      line-height: 1.6;
      margin: 2em;
    }

    h1 {
      text-align: center;
      margin-bottom: 1em;
      font-size: 1.6em;
    }

    .meta {
      text-align: center;
      color: #666;
      margin-bottom: 2em;
      font-size: 0.9em;
    }

    .poem {
      white-space: pre-wrap;
      font-family: serif;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>${escapeXml(item.title)}</h1>
  <div class="meta">${escapeXml(makeMetaLine(item))}</div>
  <div class="poem">${escapeXml(item.text.trim())}</div>
</body>
</html>`
}

/*
========================================
META
========================================
*/

function makeMetaLine(item) {
  const parts = []

  if (item.place) parts.push(item.place)
  if (item.year) parts.push(item.year)
  if (item.style) parts.push(item.style)

  return parts.join(" — ")
}

/*
========================================
DOWNLOAD
========================================
*/

function downloadBlob(blob, fileName) {
  const url =
    URL.createObjectURL(blob)

  const a =
    document.createElement("a")

  a.href =
    url

  a.download =
    fileName

  a.click()

  setTimeout(() => URL.revokeObjectURL(url), 1000)
}

/*
========================================
XML ESCAPE
========================================
*/

function escapeXml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&apos;")
}

log("ebook.html загружен")

</script>

</body>
</html>
