<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>eBook Memories</title>

<style>
body {

</style>

</head>

<body>

<header>
<h1>eBook Memories</h1>
</header>

<div class="container">

<div class="settings">

  <div class="field">
    <label>Название книги</label>
    <input id="bookTitle" value="Memories">
  </div>

  <div class="field">
    <label>Автор</label>
    <input id="bookAuthor" value="Игорь Хорош">
  </div>

  <div class="field">
    <label>Имя файла без расширения</label>
    <input id="bookFileName" value="Memories">
  </div>

</div>

<div class="buttons">
  <button onclick="scanBook()">Scan</button>
  <button onclick="addSection()">New section</button>
  <button onclick="selectAll(true)">Select all</button>
  <button onclick="selectAll(false)">Unselect all</button>
  <button onclick="makeEpub()">Make EPUB</button>
  <button onclick="makePdf()">Make PDF</button>
</div>

<div id="status" class="status">Готов</div>

<div id="list"></div>

<div id="log" class="log"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.min.js"></script>

<script>

/*
========================================
ГЛОБАЛЬНЫЕ
========================================
*/

let SECTIONS = []
let BOOK_ITEMS = []

const logBox = document.getElementById("log")
const statusBox = document.getElementById("status")
const listBox = document.getElementById("list")

/*
========================================
СТАРТОВЫЕ РАЗДЕЛЫ
========================================
*/

function resetSections() {

  SECTIONS = [
    {
      id: "poems",
      title: "Стихи",
      selected: true
    },
    {
      id: "stories",
      title: "Проза",
      selected: true
    },
    {
      id: "songs",
      title: "Песни",
      selected: true
    }
  ]

}

/*
========================================
ЛОГ
========================================
*/

function log(text) {
  logBox.textContent += text + "\n"
  logBox.scrollTop = logBox.scrollHeight
}

/*
========================================
СТАТУС
========================================
*/

function setStatus(text, error = false) {
  statusBox.textContent = text
  statusBox.className = error ? "status bad" : "status good"
}

/*
========================================
ОЧИСТКА
========================================
*/

function clean(value) {
  return String(value || "")
    .replace(/\r/g, "")
    .replace(/\u00A0/g, " ")
    .replace(/\t/g, " ")
    .replace(/\s+/g, " ")
    .trim()
}

function getFirstLine(text) {
  const lines = String(text || "")
    .replace(/\r/g, "")
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)

  return lines.length ? clean(lines[0]) : ""
}

/*
========================================
РАЗДЕЛ ПО ФАЙЛУ
========================================
*/

function detectSectionId(file) {
  if (file.includes("poems/")) return "poems"
  if (file.includes("stories/")) return "stories"
  if (file.includes("songs/")) return "songs"
  return "poems"
}

/*
========================================
FETCH HTML
========================================
*/

async function fetchHtml(path) {
  log("Открываю: " + path)

  const res = await fetch(path, {
    cache: "no-store"
  })

  if (!res.ok)
    throw new Error("Не удалось открыть: " + path)

  return await res.text()
}

/*
========================================
СПИСОК ФАЙЛОВ ИЗ СТРАНИЦЫ
========================================
*/

async function getFilesFromPage(page) {

  try {

    const html = await fetchHtml(page)

    const doc = new DOMParser()
      .parseFromString(html, "text/html")

    const hrefs = Array.from(doc.querySelectorAll("a[href]"))
      .map(a => (a.getAttribute("href") || "").trim())
      .filter(Boolean)

    let files = []

    if (page === "poems.html") {
      files = hrefs.filter(href =>
        (href.includes("poems/") || href.includes("poem_")) &&
        href.endsWith(".html") &&
        !href.endsWith("poems.html")
      )
    }

    if (page === "stories.html") {
      files = hrefs.filter(href =>
        (href.includes("stories/") || href.includes("story_")) &&
        href.endsWith(".html") &&
        !href.endsWith("stories.html")
      )
    }

    if (page === "songs.html") {
      files = hrefs.filter(href =>
        (href.includes("songs/") || href.includes("song_")) &&
        href.endsWith(".html") &&
        !href.endsWith("songs.html")
      )
    }

    log("Страница: " + page)
    log("Подходящих файлов: " + files.length)

    return files

  } catch {

    log("Ошибка страницы: " + page)
    return []

  }

}

/*
========================================
ИЗВЛЕЧЕНИЕ ПОЛЕЙ window.poem
========================================
*/

function extractField(source, name) {

  const reg = new RegExp(
    name + "\\s*:\\s*`([\\s\\S]*?)`|" +
    name + "\\s*:\\s*\"([\\s\\S]*?)\"|" +
    name + "\\s*:\\s*'([\\s\\S]*?)'",
    "s"
  )

  const match = source.match(reg)

  if (!match)
    return ""

  return match[1] || match[2] || match[3] || ""

}

function extractPoemData(source, file) {

  if (!source.includes("window.poem")) {
    log("window.poem не найден: " + file)
    return null
  }

  const text = extractField(source, "text")

  if (!text) {
    log("text не найден: " + file)
    return null
  }

  const titleRaw = extractField(source, "title")
  const title = clean(titleRaw) || getFirstLine(text)

  return {
    file: file,
    sectionId: detectSectionId(file),
    title: title,
    author: clean(extractField(source, "author")),
    place: clean(extractField(source, "place")),
    year: clean(extractField(source, "year")),
    style: clean(extractField(source, "style")),
    text: String(text || ""),
    selected: true
  }

}

/*
========================================
SCAN
========================================
*/

async function scanBook() {

  try {

    logBox.textContent = ""
    listBox.innerHTML = ""

    resetSections()
    BOOK_ITEMS = []

    setStatus("Сканирование...")

    const pages = [
      "poems.html",
      "stories.html",
      "songs.html"
    ]

    let files = []

    for (const page of pages) {
      const list = await getFilesFromPage(page)
      files = files.concat(list)
    }

    files = Array.from(new Set(files))

    log("Всего файлов: " + files.length)

    for (const file of files) {

      try {

        const source = await fetchHtml(file)
        const item = extractPoemData(source, file)

        if (!item)
          continue

        BOOK_ITEMS.push(item)

        log("Добавлен: " + item.title)

      } catch {

        log("Ошибка файла: " + file)

      }

    }

    renderList()

    setStatus("Найдено произведений: " + BOOK_ITEMS.length)

  } catch (e) {

    setStatus("Ошибка: " + e.message, true)

  }

}

/*
========================================
ОТРИСОВКА
========================================
*/

function renderList() {

  listBox.innerHTML = ""

  for (const section of SECTIONS) {

    const items = BOOK_ITEMS.filter(item =>
      item.sectionId === section.id
    )

    const box = document.createElement("div")
    box.className = "section-box"

    const allChecked =
      items.length && items.every(item => item.selected)

    const head = document.createElement("div")
    head.className = "section-head"

    head.innerHTML = `
      <input type="checkbox" ${section.selected && allChecked ? "checked" : ""}>
      <span class="section-title">${escapeHtml(section.title)} (${items.length})</span>
      <button class="small-btn" data-action="up">↑</button>
      <button class="small-btn" data-action="down">↓</button>
      <button class="small-btn" data-action="rename">Rename</button>
      <button class="small-btn" data-action="delete">Delete</button>
    `

    const sectionCheck = head.querySelector("input")

    sectionCheck.addEventListener("change", function () {
      section.selected = sectionCheck.checked
      items.forEach(item => item.selected = sectionCheck.checked)
      renderList()
    })

    head.querySelector('[data-action="up"]').onclick = function () {
      moveSection(section, -1)
    }

    head.querySelector('[data-action="down"]').onclick = function () {
      moveSection(section, 1)
    }

    head.querySelector('[data-action="rename"]').onclick = function () {
      renameSection(section)
    }

    head.querySelector('[data-action="delete"]').onclick = function () {
      deleteSection(section)
    }

    box.appendChild(head)

    for (const item of items) {

      const row = document.createElement("div")
      row.className = "item-row"

      row.innerHTML = `
        <input type="checkbox" ${item.selected ? "checked" : ""}>

        <div>
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-meta">${escapeHtml(makeMetaLine(item))}</div>
          <div class="item-file">${escapeHtml(item.file)}</div>
        </div>

        <select></select>

        <div class="move-buttons">
          <button class="small-btn" data-move="up">↑</button>
          <button class="small-btn" data-move="down">↓</button>
        </div>
      `

      row.querySelector("input").addEventListener("change", function (e) {
        item.selected = e.target.checked
      })

      const select = row.querySelector("select")

      for (const s of SECTIONS) {
        const opt = document.createElement("option")
        opt.value = s.id
        opt.textContent = s.title

        if (s.id === item.sectionId)
          opt.selected = true

        select.appendChild(opt)
      }

      select.addEventListener("change", function () {
        item.sectionId = select.value
        renderList()
      })

      row.querySelector('[data-move="up"]').onclick = function () {
        moveItem(item, -1)
      }

      row.querySelector('[data-move="down"]').onclick = function () {
        moveItem(item, 1)
      }

      box.appendChild(row)

    }

    listBox.appendChild(box)

  }

}

function makeMetaLine(item) {

  const parts = []

  if (item.place) parts.push(item.place)
  if (item.year) parts.push(item.year)
  if (item.style) parts.push(item.style)

  return parts.join(" — ")

}

/*
========================================
РАЗДЕЛЫ
========================================
*/

function addSection() {

  const title = prompt("Название нового раздела:")

  if (!title || !title.trim())
    return

  const id =
    "section_" + Date.now()

  SECTIONS.push({
    id: id,
    title: title.trim(),
    selected: true
  })

  renderList()

}

function renameSection(section) {

  const title = prompt("Новое название раздела:", section.title)

  if (!title || !title.trim())
    return

  section.title = title.trim()

  renderList()

}

function deleteSection(section) {

  const items = BOOK_ITEMS.filter(item =>
    item.sectionId === section.id
  )

  const ok = confirm(
    "Удалить раздел \"" +
    section.title +
    "\" из текущей книги?\n\n" +
    "Текстов в разделе: " +
    items.length
  )

  if (!ok)
    return

  SECTIONS = SECTIONS.filter(s =>
    s.id !== section.id
  )

  BOOK_ITEMS = BOOK_ITEMS.filter(item =>
    item.sectionId !== section.id
  )

  renderList()

}

function moveSection(section, direction) {

  const index = SECTIONS.indexOf(section)
  const target = index + direction

  if (target < 0 || target >= SECTIONS.length)
    return

  const temp = SECTIONS[index]
  SECTIONS[index] = SECTIONS[target]
  SECTIONS[target] = temp

  renderList()

}

/*
========================================
ВЫБОР
========================================
*/

function selectAll(value) {

  SECTIONS.forEach(section => {
    section.selected = value
  })

  BOOK_ITEMS.forEach(item => {
    item.selected = value
  })

  renderList()

}

/*
========================================
ПЕРЕСТАНОВКА ТЕКСТОВ
========================================
*/

function moveItem(item, direction) {

  const sectionItems = BOOK_ITEMS.filter(x =>
    x.sectionId === item.sectionId
  )

  const localIndex = sectionItems.indexOf(item)
  const targetLocalIndex = localIndex + direction

  if (
    targetLocalIndex < 0 ||
    targetLocalIndex >= sectionItems.length
  )
    return

  const targetItem = sectionItems[targetLocalIndex]

  const indexA = BOOK_ITEMS.indexOf(item)
  const indexB = BOOK_ITEMS.indexOf(targetItem)

  const temp = BOOK_ITEMS[indexA]
  BOOK_ITEMS[indexA] = BOOK_ITEMS[indexB]
  BOOK_ITEMS[indexB] = temp

  renderList()

}

/*
========================================
ВЫБРАННЫЕ ДАННЫЕ
========================================
*/

function getSelectedSectionsWithItems() {

  const result = []

  for (const section of SECTIONS) {

    if (!section.selected)
      continue

    const items = BOOK_ITEMS.filter(item =>
      item.sectionId === section.id &&
      item.selected
    )

    if (!items.length)
      continue

    result.push({
      section: section,
      items: items
    })

  }

  return result

}

function getBaseFileName() {

  return clean(
    document.getElementById("bookFileName").value
  ) || "Memories"

}

/*
========================================
MAKE EPUB
========================================
*/

async function makeEpub() {

  try {

    const data = getSelectedSectionsWithItems()

    if (!data.length) {
      setStatus("Ничего не выбрано", true)
      return
    }

    const bookTitle =
      clean(document.getElementById("bookTitle").value) || "Memories"

    const bookAuthor =
      clean(document.getElementById("bookAuthor").value) || "Игорь Хорош"

    const fileName =
      getBaseFileName() + ".epub"

    setStatus("Сборка EPUB...")

    await saveEpub(data, bookTitle, bookAuthor, fileName)

    setStatus("EPUB готов")

  } catch (e) {

    setStatus("Ошибка EPUB: " + e.message, true)

  }

}

/*
========================================
MAKE PDF
========================================
*/

function makePdf() {

  const data = getSelectedSectionsWithItems()

  if (!data.length) {
    setStatus("Ничего не выбрано", true)
    return
  }

  const bookTitle =
    clean(document.getElementById("bookTitle").value) || "Memories"

  const bookAuthor =
    clean(document.getElementById("bookAuthor").value) || "Игорь Хорош"

  const fileName =
    getBaseFileName() + ".pdf"

  const content = []

  content.push({
    text: bookTitle,
    style: "bookTitle"
  })

  content.push({
    text: bookAuthor,
    style: "bookAuthor",
    pageBreak: "after"
  })

  for (const group of data) {

    content.push({
      text: group.section.title,
      style: "sectionTitle",
      pageBreak: content.length > 2 ? "before" : undefined
    })

    for (const item of group.items) {

      content.push({
        text: item.title,
        style: "chapterTitle",
        pageBreak: "before"
      })

      const meta =
        makeMetaLine(item)

      if (meta) {
        content.push({
          text: meta,
          style: "meta"
        })
      }

      content.push({
        text: String(item.text || "").trim(),
        style: "poem"
      })

    }

  }

  const docDefinition = {
    info: {
      title: bookTitle,
      author: bookAuthor
    },

    pageSize: "A4",

    pageMargins: [
      60,
      60,
      60,
      60
    ],

    content: content,

    defaultStyle: {
      font: "Roboto",
      fontSize: 12
    },

    styles: {
      bookTitle: {
        fontSize: 28,
        bold: true,
        alignment: "center",
        margin: [0, 180, 0, 20]
      },

      bookAuthor: {
        fontSize: 16,
        alignment: "center"
      },

      sectionTitle: {
        fontSize: 24,
        bold: true,
        alignment: "center",
        margin: [0, 200, 0, 0]
      },

      chapterTitle: {
        fontSize: 18,
        bold: true,
        alignment: "center",
        margin: [0, 0, 0, 20]
      },

      meta: {
        fontSize: 10,
        color: "#666666",
        alignment: "center",
        margin: [0, 0, 0, 20]
      },

      poem: {
        fontSize: 12,
        lineHeight: 1.35,
        margin: [0, 0, 0, 0]
      }
    }
  }

  pdfMake.createPdf(docDefinition).download(fileName)

  setStatus("PDF готов")

}

/*
========================================
SAVE EPUB
========================================
*/

async function saveEpub(data, bookTitle, bookAuthor, fileName) {

  const zip = new JSZip()

  zip.file(
    "mimetype",
    "application/epub+zip",
    {
      compression: "STORE"
    }
  )

  zip.file(
    "META-INF/container.xml",
    makeContainerXml()
  )

  const chapters = []

  let index = 1

  for (const group of data) {

    const sectionFile =
      "section-" + cleanFileName(group.section.id) + ".xhtml"

    const sectionId =
      "section-" + cleanFileName(group.section.id)

    chapters.push({
      id: sectionId,
      href: sectionFile,
      title: group.section.title
    })

    zip.file(
      "OEBPS/" + sectionFile,
      makeSectionXhtml(group.section.title)
    )

    for (const item of group.items) {

      const chapterFile =
        "chapter" +
        String(index).padStart(3, "0") +
        ".xhtml"

      const chapterId =
        "chapter" + index

      chapters.push({
        id: chapterId,
        href: chapterFile,
        title: item.title
      })

      zip.file(
        "OEBPS/" + chapterFile,
        makeChapterXhtml(item)
      )

      index++

    }

  }

  zip.file(
    "OEBPS/nav.xhtml",
    makeNavXhtml(bookTitle, chapters)
  )

  zip.file(
    "OEBPS/content.opf",
    makeContentOpf(bookTitle, bookAuthor, chapters)
  )

  const blob = await zip.generateAsync({
    type: "blob",
    mimeType: "application/epub+zip"
  })

  downloadBlob(blob, fileName)

  log("Файл сохранён: " + fileName)

}

/*
========================================
EPUB FILES
========================================
*/

function makeContainerXml() {

  return `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`

}

function makeContentOpf(bookTitle, bookAuthor, chapters) {

  const manifest = chapters
    .map(ch =>
      `<item id="${ch.id}" href="${ch.href}" media-type="application/xhtml+xml"/>`
    )
    .join("\n    ")

  const spine = chapters
    .map(ch =>
      `<itemref idref="${ch.id}"/>`
    )
    .join("\n    ")

  return `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="bookid">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:identifier id="bookid">memories-${Date.now()}</dc:identifier>
    <dc:title>${escapeXml(bookTitle)}</dc:title>
    <dc:creator>${escapeXml(bookAuthor)}</dc:creator>
    <dc:language>ru</dc:language>
    <meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/, "Z")}</meta>
  </metadata>

  <manifest>
    <item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>
    ${manifest}
  </manifest>

  <spine>
    ${spine}
  </spine>
</package>`

}

function makeNavXhtml(bookTitle, chapters) {

  const items = chapters
    .map(ch =>
      `<li><a href="${ch.href}">${escapeXml(ch.title)}</a></li>`
    )
    .join("\n      ")

  return `<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:epub="http://www.idpf.org/2007/ops"
      xml:lang="ru"
      lang="ru">
<head>
  <title>${escapeXml(bookTitle)}</title>
</head>
<body>
  <nav epub:type="toc" id="toc">
    <h1>${escapeXml(bookTitle)}</h1>
    <ol>

function downloadBlob(blob, fileName) {

  const url = URL.createObjectURL(blob)

  const a = document.createElement("a")

  a.href = url
  a.download = fileName

  a.click()

  setTimeout(function () {
    URL.revokeObjectURL(url)
  }, 1000)

}

function escapeHtml(text) {

  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")

}

function escapeXml(text) {

  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&apos;")

}

function cleanFileName(text) {

  return String(text || "")
    .replace(/[^a-zA-Z0-9_-]/g, "_")

}
