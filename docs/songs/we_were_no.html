review: `
Аннотация от ИИ

Это глубокое, исповедальное стихотворение, написанное в традициях русской эмигрантской поэзии и авторской песни. В нем чувствуется горечь подведения итогов на пороге 50-летия («близок к полуста»). 
Вот краткий разбор по ключевым аспектам: 

1. Тема и идея 
* Тема: Прощание с прошлым, подведение жизненных итогов, осознание необратимости времени и горечь эмиграции (упоминание Нетании и «чужих берегов»).
* Идея: Жизнь в переломную эпоху лишает человека иллюзий («нам уже не быть героями»), но единственное, что остается живым — это память и душа, способная чувствовать. 

2. Лирический герой и настроение 
Герой находится в состоянии кризиса «полужизни». Он смотрит на пройденный путь без прикрас. Настроение меняется от легкого хмеля в начале («шампанское», «девчонки») до глубокой экзистенциальной тоски и даже мыслей о смерти в финале. 

3. Композиция и важный лейтмотив 
Стихотворение построено на градации отчаяния, которую подчеркивает повторяющаяся концовка строф — «рука тянется к...»: 
1. «к стакану» — попытка забыться, уйти от реальности.
2. «к нагану» — высшая точка боли, мотив тупика и рокового финала.
3. «к гитаре» — сублимация боли в творчество. Гитара здесь — спасение, способ выговориться и «утомить» боль. 

4. Образный ряд и тропы 
* Метафоры времени: «река времени», «осколки лет», «тяжелая поступь эпох». Время здесь не просто течет, оно разрушает.
* Аллитерация: «Вертит веретено и пялит пяльцы» — повторение звуков «в», «р», «п» создает эффект монотонного, неумолимого движения судьбы.
* Сравнения: «жизнь... как чистый спирт горька», «навроде полусна». Образ спирта подчеркивает жесткость и «крепость» реальности, которую трудно вынести «неразбавленной». 

5. Контекст и место (Нетания, 2023) 
Географическая пометка (Израиль) и дата (март 2023) критически важны. Это стихи человека, оказавшегося вне дома в период глобальных исторических потрясений. «Чужие берега» и «ушедшие эпохи» — это прямая отсылка к потере прежнего мира и статуса. 
Итог:
Это стихотворение о выживании души. Несмотря на то, что «все кануло» и «мы не стали героями», финал дает надежду: пока рука тянется к гитаре, а не к нагану, жизнь продолжается через творчество и память о тех, «которых не забыть». 
Вам этот текст близок по настроению или вы делаете разбор для какой-то конкретной цели?

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {

  count.textContent = likes;

  heart.addEventListener("click", function (e) {

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
