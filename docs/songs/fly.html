 <link rel="stylesheet" href="../style.css"> 

  
</head>

<body>

  <!-- Фон (на уровень выше) -->

  <!-- МЕНЮ (4 пункта, без изменений по структуре) -->

  <!-- ОБЛАСТЬ ЧТЕНИЯ (скроллится) -->
<section class="reading-panel" aria-label="Текст стихотворения">

  <!-- Контейнер стиха -->

  <!-- ВАЖНО: pre сохраняет пробелы/табуляции/переносы -->
  <pre id="poem" class="poem-text"></pre>
  <!-- подпись внизу страницы -->
  
</section>

<div id="meta"></div>

  
  

    </pre>

  </section>

<script>
document.addEventListener("click", function(e) {
    const readingPanel = document.querySelector(".reading-panel");
    const nav = document.querySelector(".main-nav");

    if (!readingPanel.contains(e.target) && !nav.contains(e.target)) {
        window.location.href = "../index.html";
    }
});
</script>

  <!-- Утилита переадресации по пунктам Меню (для контента)-->
  <script src="../nav.js"></script>

  


 <!--  Контейнер для контента с переменными -->

<h1 id="title"></h1>
<p id="author"></p>
<p id="year"></p>
<div id="text"></div>
  



  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "1991",
    title: "Жёлтая муха тоски",
    text: `
Жёлтая муха тоски


1.
Рвётся из горла крик,
Карта идёт не в масть.
Знать бы в последний миг,
Где же ловчей упасть.

Давит сомнений пресс,
Нервов натянут трос - 
То ли за тестом тест
То ли за тостом тост…

Ref.
Жёлтая муха тоски,
Что-то жужжит в мозги.
Жёлтая муха тоски,
Жёлтая муха...

2.
Льётся из горла песнь,
Сердце стучит в тамтам.
Да, ты уже не здесь,
Но и ещё не там.

Плещет о борт волна
Между холодных льдин.
Кажется, ты одна,
Может быть, я один.

Ref.
Жёлтая муха тоски,
Бьётся тебе в мозги.
Жёлтая муха тоски,
Жёлтая муха...

3.
Скорчился день и скис,
Время идёт в разнос.
Ты рисовал эскиз,
А вышло то всё всерьёз…

Нет уже больше слов
Для подходящих фраз.
Будет в конце концов
Самый последний раз.

Ref.
Жёлтая муха тоски,
Гадит в твои мозги.
Жёлтая муха тоски,
Жёлтая муха...

4.
Все, что искал слова
Где-то найдутся вдруг.
Если ты их сказал,
Значит, замкнулся круг.

Жгучей хмельной рекой
Падает в горло джин, - 
Это не ты такой,
Это такая жизнь!..

Ref.
Жёлтая муха тоски,
Съела твои мозги.
Жёлтая муха тоски,
Жёлтая муха...


август 1991 - август 2021
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;}); 
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 
    
</script>

</body>
</html>
