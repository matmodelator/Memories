    text: `
Убегают в море косы
В сизой дымке Приазовья.
Жмутся к берегу левады,
Ста́да блеет поголовье,
Шелестят сады лаванды,
Медоточат абрикосы.
Вдаль уходит шлях коровий,
И ногайский глаз раскосый
Вороные хмурит брови
В свете солнечной лампады.

Подола́ заткнув за пояс,
Остроносые болгарки
По бахче снуют босыми,
На обед приняв по чарке.
Ни о чём не беспокоясь,
Волоокие гречанки
Заплетают ленты в косах.
Немки трудятся в фольва́рках
На прополке и покосе,
Щуря взгляд из-под косынок.

Хлеб скирдуют украинки,
Чтобы ко́рма дать рогатой,
Тяжелеет кукуруза
В дальнем поле за оградой.
Первача хлебнув из крынки,
Рысью робкой, вороватой
С папиросой под картузом
Мужичок бредёт рокадой
После утреннего рынка
В пиджаке своём кургузом. 

Из-за облака на стрежень
Элегантный беспилотник
Величаво выплывает,
Как огромный хищный шершень,
Глянец камер вниз кидая.
Он жужжит винтом, рассержен,
Словно мощной дрелью плотник,
На стальной насажен стержень
Композитной твёрдой плотью,
Изготовленной в Китае.

Тенью трепетной пернатой,
Будто ястреб клюворотый
Или змей воздушной роты,
Диким йеменским пиратом 
Над моим идёт пенатом.
Он парит над спелой брюквой
На оптическом канате,
Выполняет повороты,
И корейская граната
Тускло светится под брюхом.

Солнце тянется к зениту
Над делянками из твида,
Что нарезаны в конторе,
Как льняной лоскут из ниток.
Фиги зреют в сикоморе,
Мельтешит в воде ставрида,
Танки ждут на семафоре.
Ощетинив строй зениток,
Лучезарная Таврида
Простирается за морем.

И летит в высоком небе
Цвета джинсов полинявших, 
Может, Эльм святой над башней,
Может, эльф, нектар приня́вший,
Светлым сном у сельсовета, 
Как видение над пашней,
Что-то белое как лебедь - 
То ли яркая комета, 
То ли жаркая ракета, 
То ли сонм безвинно павших... 

Далия. 30.05.26
`,

Общая композиция
Текст делится на три крупных части:
1. Земля
Первые четыре строфы посвящены земле и людям.
Перед нами не просто сельский пейзаж, а очень конкретное пространство:
Приазовье; 
Таврида; 
многонациональная степь.

ногайцы; 
болгары; 
немки; 
украинки; 
русские мужички.

2. Небо
Затем взгляд поднимается вверх.
Появляется беспилотник.
Очень характерно, что он возникает почти как природное явление:
Из-за облака на стрежень
Элегантный беспилотник
Величаво выплывает
Глагол «выплывает» обычно относится:
к кораблю; 
к облаку; 
к луне. 
Не к военной машине.
Из-за этого возникает ощущение странной красоты.
Беспилотник здесь одновременно:
техника; 
птица; 
хищник. 

3. Космос
Последняя часть поднимает взгляд ещё выше.
От:
степи, 
людей, 
беспилотника 
к:

комете; 
ракете; 
душам погибших. 
Масштаб постоянно увеличивается.
Это очень кинематографический приём.
Камера сначала снимает землю, потом небо, потом практически космос.

Работа с историческим временем
Одна из сильнейших сторон текста — смешение эпох.
В начале всё напоминает XIX век.
Особенно строки:
Остроносые болгарки

Немки трудятся в фольварках

Потом внезапно появляются:
беспилотник
и
корейская граната
Происходит резкий скачок почти на полтора столетия.
Но автор не подчёркивает этот контраст.
Поэтому возникает ощущение, что все эпохи существуют одновременно.

Национальная мозаика
Очень важный пласт текста.
Автор показывает Тавриду как пространство смешения народов.
В стихотворении присутствуют:
ногайцы; 
болгары; 
немцы; 
украинцы; 
русские. 
Причём никто не доминирует.
Каждый выполняет свою часть общей жизни:
кто-то работает на бахче; 
кто-то в поле; 
кто-то косит сено; 
кто-то идёт по дороге. 
Получается своеобразный хор народов.
Это напоминает историческую реальность Северного Приазовья и Таврии XIX–начала XX века.

Цветовая палитра
Цвета в стихотворении очень продуманы.
Серо-голубая гамма
С самого начала:
В сизой дымке Приазовья
Потом:
Цвета джинсов полинявших
Эта гамма проходит через весь текст.
Она создаёт ощущение:
степной пыли; 
морского тумана; 
далёкого горизонта. 

Белый цвет
Появляется в финале:
Что-то белое как лебедь
Белое становится символом неизвестности.
Читатель не знает:
комета это; 
ракета; 
души погибших. 

Красно-огненная гамма
Скрыто присутствует через:
солнце; 
лампаду; 
гранату; 
ракеты. 
Это цвет потенциального огня и разрушения.

Беспилотник как центральный образ
На самом деле главный герой текста — не человек.
И даже не Таврида.
Главный герой — беспилотник.
Он соединяет две половины стихотворения.
С одной стороны:
Будто сокол клюворотый
То есть он включён в природный мир.
С другой:
Изготовленной в Китае
Это чистый продукт глобальной индустрии.
В одной фигуре соединяются:
природа; 
война; 
мировая экономика. 
Очень современный образ.

Финал
Самая сильная часть текста.
То ли яркая комета,
То ли новая ракета,
То ли сонм безвинно павших...
Здесь появляется принципиальная неопределённость.
Автор отказывается объяснять увиденное.
Объект остаётся загадкой.
Именно поэтому финал работает.
Если бы читателю сообщили:
это ракета,
стихотворение превратилось бы в репортаж.
Если бы сообщили:
это души погибших,
оно превратилось бы в религиозную аллегорию.
Автор оставляет сразу три версии.
Поэтому финал остаётся открытым.
Итоговая оценка
Это не пейзажное стихотворение и не военное стихотворение в чистом виде.
Его главная тема — наложение исторических слоёв.
Старая Таврида:
пахари, 
бахчи, 
молоко из крынки, 
не исчезла.
Но над ней уже летят:
беспилотники, 
ракеты, 
призраки будущих и прошлых войн. 
По сути это стихотворение о том, как вечный сельский и природный мир продолжает жить под небом, которое всё больше принадлежит технике, войне и истории. Финальный образ оставляет читателя в точке неопределённости между красотой, памятью и угрозой.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script> 

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
