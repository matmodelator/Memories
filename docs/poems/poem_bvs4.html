    text: `
Всё умерло во мне.
Сижу один, как филин,
И капает вода
Размеренно из крана.
А мир вовне - вполне
Прекрасен и обилен, —
Да будет так всегда,
Как это мне ни странно…

Такая нынче жизнь -
Сплошное прозябанье.
Безумный троглодит
В берлоге копит гнев.
И сколько ни держись
За это мирозданье,
Но ужас холодит,
Натягивая нерв.

Берёт разбег июль,
И с моря веет жаром.
Я будто бы подбит,
Троит мотор всё чаще.
Твой дивный поцелуй,
Что обошёлся даром,
Ещё меня пьянит,
Как стопка сванской чачи,

И в жилах кровь бурлит
Как гейзер на вулкане,
Да теплится очаг
В каморке на стене.
Но всё во мне болит,
Как в древнем великане,
А страх застыл в очах
Косули на стерне.

Пока звучит в ушах
Имперский гул Мадрида,
Но снова бобылём
Я весть несу арабам.
Трусит рысцой ишак
Дорогами Магриба,
И плещет бутылёк
С анисовым араком.

В тумане голубом
Брожу среди развалин
И чувствую себя 
Своим, как бедуин.
Под родовым столбом 
Меня сидеть не звали
В очаковских степях
Израильских долин…

А снится мне январь
В твоём объятьи диком,
Барахас под рукой,
Прощальная посадка.
Вскипает киноварь,
Разлитая в индиго,
Струит закат рекой,
И сердце ноет сладко…

Рождаются стиши,
Но умирает что-то, 
Чего не воротить
В реальности любой.
И щёлкают в тиши
Минуты словно счёты,
Стремясь укоротить 
Последнюю любовь.

10.07.2026, Далия
`,

Аннотация от ИИ

Это стихотворение построено как медленное путешествие по внутреннему пространству человека, который уже пережил главный перелом своей жизни. Здесь почти нет событий. Всё действие происходит в памяти, а внешние картины — море, июль, Магриб, стерня, январь — становятся проекциями одного состояния. Несмотря на большое количество географических названий и предметных деталей, текст остаётся очень цельным: все они работают не как экзотический фон, а как части единой биографии.

Главная тема произведения — жизнь после внутренней катастрофы. Уже первая строка задаёт тон:

Всё умерло во мне.

Это максимальное по силе утверждение. Однако почти сразу оно опровергается самим стихотворением. Мир продолжает существовать, память жива, кровь ещё бурлит, герой любит, вспоминает, пишет стихи. Получается важный внутренний парадокс: умерло не всё, а ощущение полноты жизни. Именно это противоречие и становится главным двигателем текста.

Первая строфа — одна из самых сильных. Противопоставление внутреннего и внешнего мира решено очень точно:

А мир вовне — вполне
Прекрасен и обилен…

Вместо привычного романтического приёма, когда природа разделяет страдания героя, здесь происходит обратное. Мир остаётся прекрасным независимо от человеческой боли. Более того, герой способен произнести:

Да будет так всегда…

Это не жалоба, а почти благословение. Такая интонация встречается редко и сразу придаёт стихотворению философскую глубину.

Вторая строфа расширяет масштаб. Личное состояние становится характеристикой эпохи:

Такая нынче жизнь —

Однако стихотворение не превращается в социальную публицистику. Образ троглодита в берлоге скорее символизирует первобытную часть человека, в которой накапливаются страх и агрессия. Благодаря этому строфа воспринимается как психологическая, а не политическая.

Очень удачна третья строфа. Здесь появляется мотив любви — но уже не как воспоминание о счастье, а как остаточное действие сильного чувства:

Твой дивный поцелуй,
Что обошёлся даром,
Ещё меня пьянит,
Как стопка сванской чачи.

Сравнение неожиданное, но убедительное. Оно передаёт не возвышенность, а физическую длительность чувства. Любовь оказывается сродни крепкому напитку: давно выпита, но продолжает действовать.

Четвёртая строфа построена на противопоставлении жизни и изношенности:

И кровь пока бурлит…
…
Но всё во мне болит…

Самой интересной здесь представляется строка:

Как в древнем великане.

Этот образ не раскрывается напрямую. Его можно понимать как метафору огромного старого тела, где болит уже всё. Не каждый читатель сразу придёт именно к такой трактовке, однако образ запоминается благодаря своей необычности.

Финал строфы:

И страх застыл в очах
Косули на стерне.

очень удачен. Косуля здесь не символ слабости, а образ настороженного живого существа, застывшего перед опасностью. Картина возникает мгновенно и хорошо завершает строфу.

Пятая строфа вводит тему странствий. Мадрид, Магриб, ишак, арак создают восточно-средиземноморское пространство, но оно не выглядит декоративным. Это продолжение жизненного пути героя.

Особенно интересна строка:

Я весть несу арабам.

Она остаётся открытой. Не говорится, какую именно весть несёт герой. Благодаря этой недоговорённости строка работает сильнее прямого объяснения.

Шестая строфа посвящена теме принадлежности.

Под родовым столбом
Меня сидеть не звали…

Это одна из смысловых вершин стихотворения. За ней ощущается не только личная судьба, но и опыт человека, который нигде не оказался полностью своим. География перестаёт быть географией и превращается в карту внутреннего изгнания.

Предпоследняя строфа возвращает любовь. Финал её особенно красив благодаря сочетанию цветов:

Вскипает киноварь,
Разлитая в индиго…

Красный и синий здесь становятся не столько красками, сколько эмоциональными состояниями.

Последняя строфа завершает произведение очень достойно.

Рождаются стиши,
Но умирает что-то…

Здесь появляется неожиданное противопоставление: творчество продолжается, но за каждое новое стихотворение человек словно расплачивается частью собственной жизни. Финальная строка:
Стремясь укоротить
Последнюю любовь.

оставляет ощущение медленного исчезновения времени и одновременно придаёт всему тексту завершённость.

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.innerHTML = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 open-comments

	
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}
	
// 🚻 send-comments	


const sendCommentsBtn = document.getElementById("send-comments");

if (sendCommentsBtn) {
  sendCommentsBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    poemEl.innerHTML = `
      <div class="form-box">

        <h2></h2>

<p>
  Если вы хотите оставить комментарий, заполните форму ниже <br>
  Оотзыв появится на сайте спустя некоторое время после модерации
</p>
       

        <form class="contact-form" action="https://formspree.io/f/xvzwoqzk" method="POST">

          <input type="hidden" name="_subject" value="Сообщение с сайта Memories">

          <input type="text" name="name" placeholder="Ваше имя" required>

          <input type="email" name="email" placeholder="Ваш email(не обязательно)">

          <textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

          <button type="submit">Отправить</button>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
