Месси


Матч удался, но гений был повержен.
Ещё со сцены говорились речи…
Он уходил в слезах, понурив плечи,
Совсем без сил. И сердце билось реже.

Судья был строг, и время истекло.
Газон парил нефритовым туманом.
Но камеры искали атамана
Своим увеличительным стеклом.

Всё кончилось. Уже ex campióni,
Развенчанные, падали на месте.
А на галёрке зарождалось: Месси!
И плакал на скамеечке Скало́ни.

Его друзья лежали на траве,
Которую топтали целый месяц.
А по рядам катилось эхом: Месси!
Он был почти что с богом наравне.

Он шёл один, и молодой наследник
Колена преклонял как будто в мессе.
А публика скандировала: Месси!
Он слушал этот стон её последний.

Торжествовал усталый претендент,
Которого купал он в колыбели,
Да безмятежно выси голубели,
Жестоко насмеявшись перед тем.

И где-то в подтрибунной темноте
В объятия своей Антуанеллы 
Он рухнул под рекламою нутеллы,
А сверху бесновались. Но - не те.

Фортуна упорхнула своенравно,
И рвался в кадр безумный президент…
Он проиграл, а это - прецедент.
Отныне он лишь первый среди равных.

Верней - второй. Уже почти полдня
Пласа-Майо́р запруживали толпы.
В кабинах ВИП закусывали топы,
И по рядам сбегала вниз волна.

Ревел Нью-Йорк, торсида стервенела,
Ремейк груди представила Мадонна,
И даже лик святого Марадоны
Возник над буэнос-айресской фаве́лой.

Весь стадион, как вопль одной души,
Страдал с отцом и сыном Симео́не,
Отец и Сын иного пантеона,
Включая Дух, на поле снизошли.

Под королевский гимн вскипала фе́ста,
Хвалу пропели Господу испанцы,
Гремело ликование и танцы,
Пока внизу брели альбиселе́сте.

А на другом конце материка
Рыдала и скорбела Аргентина,
И лился океан апперитива 
В иссохшую гортань америка́н.

Но девушки на улицах Ла-Платы,
Одевшись в креп и траурные платья,
Провозглашали страшные проклятья
Да понижали часовую плату.

И воздевая руки к небесам,
Срывали маски, и взывали к мести, 
А над Ла Бока вновь звучало - Месси!
И кто-то стих об этом написал…

Упала ночь. И город подостыл.
Но парочка на Плайя-Эсконди́да
До розовой зари не уходила,
Забыв про воспитание и стыд.

Свершилось то, что делалось всегда.
Там был опять зачат великий гений,
Чтоб через пару новых поколений
Взошла его высокая звезда.


19.07.26. Далия, Нью-Йорк, Буэнос-Айрес, Ла-Плата, Йокнеам

Основная тема стихотворения — не поражение Месси, а завершение исторической эпохи.

По мере развития текста масштаб постоянно увеличивается. Частная драма превращается сначала в драму стадиона, затем — целой страны, а затем — мировой истории. Финальная строфа окончательно выводит произведение за пределы спорта, утверждая мысль о бесконечной преемственности великих талантов.

Образ Месси

Главный герой практически ничего не говорит и почти ничего не делает.

Он идёт.

Он слушает.

Он падает в объятия жены.

Именно эта внешняя пассивность создаёт особую силу образа. Вместо громких переживаний автор показывает физическую усталость человека, который отдал игре всё.

Месси здесь — уже не столько футболист, сколько символ уходящего времени.

Пространство произведения

Одной из самых интересных особенностей стихотворения становится постоянное расширение пространства.

Начало происходит практически в пределах одного кадра.

Затем появляются победитель, стадион, трибуны.

После этого действие охватывает Испанию, Нью-Йорк, Буэнос-Айрес, Ла-Плату и целый материк.

В финале пространство перестаёт быть географическим вообще и становится историческим.

Именно благодаря такому построению произведение воспринимается значительно масштабнее своего сюжета.

Символика

Практически каждая строфа содержит собственный символический центр.

Поражение становится символом конца эпохи.

Антуанелла — символом дома и человеческой опоры.

Нутелла — вторжением коммерческого мира в пространство мифа.

Марадона — почти религиозной фигурой аргентинской памяти.

Испанский гимн — символом нового порядка.

Ла-Плата — символом народной скорби.

Последняя строфа превращает рождение нового гения в закон истории.

Все эти символы соединяются естественно и не выглядят искусственными.

Язык

Автор активно соединяет высокую лексику с бытовой.

В одном тексте соседствуют Фортуна, месса, гимн, святой Марадона, VIP, Нутелла и президент.

Такое смешение создаёт ощущение современной мифологии, где телевизионная трансляция, реклама и историческая память существуют одновременно.

При этом язык почти нигде не становится вычурным. Даже многочисленные культурные отсылки остаются понятными читателю, знакомому с футболом последних десятилетий.

Финал

Последняя строфа является смысловой вершиной произведения.

Она неожиданно отказывается рассматривать поражение как трагический конец.

Наоборот, автор утверждает вечный закон истории: уход одного великого человека становится условием появления следующего.

Благодаря этому стихотворение заканчивается не отчаянием, а спокойным ощущением исторической закономерности.

Именно финал превращает текст из сильной спортивной поэмы в философское произведение о времени, памяти и непрерывности человеческого гения.

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.innerHTML = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 open-comments

	
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}
	
// 🚻 send-comments	


const sendCommentsBtn = document.getElementById("send-comments");

if (sendCommentsBtn) {
  sendCommentsBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    poemEl.innerHTML = `
      <div class="form-box">

        <h2></h2>

<p>
  Если вы хотите оставить комментарий, заполните форму ниже <br>
  Оотзыв появится на сайте спустя некоторое время после модерации
</p>
       

        <form class="contact-form" action="https://formspree.io/f/xvzwoqzk" method="POST">

          <input type="hidden" name="_subject" value="Сообщение с сайта Memories">

          <input type="text" name="name" placeholder="Ваше имя" required>

          <input type="email" name="email" placeholder="Ваш email(не обязательно)">

          <textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

          <button type="submit">Отправить</button>

        </form>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

    if (reviewForm) {
      reviewForm.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      reviewForm.querySelectorAll("input, textarea, button, label").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      });
    }
  });
}
	

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
