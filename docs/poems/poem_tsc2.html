Что позади? Все то, о чем жалею…
А впереди - безрадостная осень,
И с ней тоска, но только тяжелее,
Чем раньше. Мир по-прежнему несносен,
И жизнь уходит, как песок сквозь пальцы.
И мы с тобой так далеки от места,
Где встретились, как далеки непальцы
От Катманду до пика Эвереста.

Москва. Осень 1991г.
