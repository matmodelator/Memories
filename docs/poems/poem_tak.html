Я живу на горе, 
Под которой раскинулось море,
В холостяцкой норе,
Где храню сто ненужных вещей.
И куда я бреду,
Эмигрантское мыкая горе,
Как в тифозном бреду, -
Мне теперь непонятно вообще.

Расцветают сады,
Накануне девятого мая, -
Сколь вокруг красоты,
И как море под солнцем блестит!..
Это пахнет весна, -
Я хочу подарить её маме.
Двое суток без сна 
Я пишу этот праздничный стих.

Мир куда-то летит…
Назовём это вежливо - в пропасть.
Нагуляв аппетит,
Черти пьют ярко-алую кровь.
И языческий бог
Умыкает куда-то Европу,
Свой вакхический рог
Наполняя до самых краёв.

Так кончается всё.
На востоке сгущаются краски,
С Украины несёт
Пепелищем и прелой ботвой,
Льётся бражка из фляг,

В неоглядных полях
Прорастают зелёной травой.

«Двое суток без сна Я пишу этот праздничный стих» — это не поза, а реальность человека, который пытается удержать что‑то светлое, подарить его матери, несмотря на собственную усталость и тревогу.
? 3. Третья строфа — мифологизация происходящего
Здесь появляется масштаб: мир «летит в пропасть», черти, языческий бог, Европа, вакхический рог.

⚔️ 4. Четвёртая строфа — возвращение к земле
«С Украины несёт Пепелищем и прелой ботвой» — образ резкий, но не натуралистичный.

? 5. Итог
Стихотворение зрелое, цельное, с хорошей внутренней музыкой. Оно одновременно личное и историческое, и это редкое сочетание. Дата «9.05.26» делает его ещё более точным — как будто зафиксирован момент, когда человек пытается удержать смысл в мире, который рассыпается.

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>

  const heart = document.getElementById("heart");
  const count = document.getElementById("like-count");

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

});

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
