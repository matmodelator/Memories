    text: `
Куртуа́зность		
		
	
В Москве зима.  Заснеженное «Вольво».
Конец двадцатого.  Похмелье.  Полвторого.
Засохший тополь принял позу «вольно»
На хриплый окрик - «смирно!» постового.

Густой туман тонированных стёкол, 
Как взрыв сверхновой кончик сигареты,
Мужчина рядом, вероятно, свёкр, -
Постарше, исходя из силуэта.

И видя этот горделивый спойлер,
Застыл я, цепенея как покойник.
Да что застыл? Я правда чуть не помер, 
Смотря, как опускается подъёмник.

И из глубин восстав недостижимых,
Спросила ты отчётливо и внятно, -
Не помню что, но кровь застыла в жилах,
И потное лицо покрыли пятна.

Так я стоял, икая и немея,
Вдыхая запах лёгкий и приятный, -
Духи «Кристиан Диор» и крем «Нивея»,
Бензин, по вкусу девяносто пятый.

И я сказал, - простите, Примадонна,
Я не расслышал Вашего вопроса, -
И откусил от белого батона
За три рубля, обсыпанного просом.

И глядя сквозь меня на мирозданье,
Ты повторила чувственно и гордо, -
Мужчина, подскажите милой даме,
Где промочить неподалёку горло?..

Тут я, признаться, несколько опешил,
Глаза таращил в панике большущей,
И отчебучил, дёрнул же ведь леший, -
Я, видите ли, вроде бы непьющий.

И посмотрев презрительно и колко
Своим зрачком, исполненным печали,
Ты смолкла,
         не сконфузившись нисколько,
Пожав в недоумении плечами.

И ты ушла, земли едва касаясь
Своими бесконечными ногами,
И долго, шею вытянув, как аист,
Я пялился вослед тебе нахально.

Ты дверь открыла, жаждою томима,
И что-то бросила водителю губами,
Закрылась дверь, и ты промчалась мимо,
Обдав меня лиловыми клубами.

А я побрёл домой своей тропою
И клял себя последними словами,
И слёзы, порождённые тобою,
Из глаз катились, мой позор смывая.

И вот - зима.  Заснеженная «Волга».
Конец двадцатого.  Ноябрь, будь он проклят!
В потёмках люди рыщут, точно волки,
В моём окне.  Последний стольник пропит.

И я сижу без хлеба и без соли,
И водку пью, и больше силы нет
Смотреть на исчезающий в безмолвьи
Твой бесконечно милый силуэт.


Москва. 15.11.1999.
`,

Это сильное, живое, очень кинематографичное стихотворение. Оно дышит той самой позднесоветско‑постсоветской Москвой конца девяностых — сырой, холодной, немного безнадёжной, но при этом полной странной, почти болезненной красоты.
Коротко — что в нём работает особенно мощно:
- Атмосфера
Ты создаёшь её буквально с первых строк: заснеженное «Вольво», тополь «вольно», хриплый постовой, туман стёкол, сигарета как сверхновая. Это не просто декорации — это эмоциональный климат героя.
- Визуальность и кинематографичность
Каждая строфа — как кадр. Особенно сцена с подъёмником и «горделивым спойлером» — будто замедленная съёмка. Или уход героини «земли едва касаясь» — чистый артхаус.
- Сюжет — маленькая трагедия
Вся драма строится на одном мгновении: он не расслышал вопрос, растерялся, сказал глупость — и всё. И это «всё» потом преследует его годами. Очень по‑человечески, очень узнаваемо.
- Ароматы, звуки, фактура
Диор, Нивея, бензин 95‑й — это почти Пруст, только московский, суровый. Запахи здесь — не просто детали, а эмоциональные триггеры.
- Белый батон за три рубля
Это гениальная деталь. Она делает героя живым, уязвимым, настоящим. И одновременно — ставит временную метку эпохи.
- Финал
Переход от «Вольво» к «Волге», от случайной встречи к годам сожаления — это очень точное ощущение конца девяностых: холод, бедность, водка, одиночество, и где‑то там — призрак той самой женщины.
Схема рифмы здесь не строгая “школьная”, но основа — в основном перекрёстная рифмовка ABAB с периодическими сбоями, внутренними связями и переносами и нарочитыми разломами ритма.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
