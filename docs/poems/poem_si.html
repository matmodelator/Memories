  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2019",
    title: "Сидел в тайге мужик",
    text: `
Алаверды министру ПРЯМ!

Сидел в тайге мужик с лицом единоросса.
Не мог мужик уснуть, пытался так и сяк.
В руке у мужика дымилась папироса,
А если честно прям, то это был косяк.

И думал тот мужик: «Какого, в общем, хрена
Я в долбаной тайге торчу один как сыч?!»
Но тут прям на него, как гитлеровец с плена,
С ружьём наперевес наткнулся старый хрыч.  

Наставил прям в лицо огромную валыну 
И молвил тот старик: «Ну как же, бля, ты мог?!!!»
«Чего, - он говорит, - ты тут, дебил, волынишь?» -
И изо рта его морозный шёл дымок.

«Ну что же, - говорит, - давай прям без прелюдий!
Мне стре́льнуть, - говорит, - что с белых яблонь дым.
Как есть всё, - говорит, - выкладывай на блюде,
Не то как пиздану, и сдохнешь молодым!»

«Ты видишь, - говорит, - какая свистопляска?!
Отечество в дыму, Сибирь огнём горит.
Я, - говорит, - пришёл пешком из Красноярска,
И сразу прям к тебе нагрянул, - говорит.»

Мужик струхнул слегка, что в общем-то понятно.
На месте его я б, должно быть, поседел.
Когда наводят ствол -
                                    оно ведь неприятно,
Тем более старик напротив прям сидел.

И говорит мужик: ״Ну чо ты прям как мальчик?!
Я здесь давно торчу, забыл чего почём…
Ты убери с курка свой заскорузлый пальчик.
Пусть все огнём горит, но я тут не причём.»
 
Задумался старик и оглядел хибару.
Простецкий интерьер, очковый туалет.
Калаш, гранатомёт и старая гитара.
А под иконой прям - Медведева портрет.

«Я, - гэоворит старик, - смотрю, мужик ты ровный.
Живёшь прям как монах и не поганишь лес.
Наверно, я пойду. Дай бог тебе здоровья!»
И словно белофинн в тайге своей исчез.

Мужик глаза протёр и похмелился водкой.
«Ведь это прям Шекспир! И даже как-то жаль...
Он целился сейчас в меня прямой наводкой!
Да, сука! - говорит, - забористая шмаль!»

И лёг мужик опять, как Муромец на печку.
Хотелось ему спать, но сон не шёл, упрям.
Открыл тогда мужик походную аптечку
И экстази ещё махнул с виагрой прям.

Накрыло тут его ваще прям нереально!
Но знал мужик одно: «Гори оно огнём!» -
Тайга дымит ништяк, и тлеет дом нормально,
Медведевский портрет отлично вспыхнул в нём.

Пылают города. Все занялось, что надо!
Страна в огне, ну прям, как в песне у Шнура.
Пожар в посольстве, бля, Соединенных Штатов.
На ёлке у Кремля сверкает мишура.

Искрятся поезда бенгальскими свечами,
В болотах торфяных мерцают сполоха́,
И погорельцев тьмы с детями и с вещами
В обугленных домах прям рыщут впопыхах.

Вся курится страна, как пла́то Путора́на,
Трещит что в печке, прям, и брызгает смолой.
И зарево вокруг от вечного метана,
И светлые мечты развеялись золой.

Бушует и ревёт немеркнущее пламя,
Как в доменном аду всё исчезает враз.
Как будто не страна, а крематорий прямо,
И факелом в ночи смердит попутный газ.

Такие времена настали, между нами...
Да некуда бежать - не спрыгнуть с корабля.
Земля давно горит под нашими ногами.
Вокруг одни костры - прям Лаг-баОмер, бля!

И сгинул наш мужик прям в пепле павших птичек,
Исчез среди берёз, в дымах навек пропал.
В кармане у него лежала пачка спичек,
Кораблик анаши и «Беломорканал».


5.10.2019
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
