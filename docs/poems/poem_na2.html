На Средиземном третье апреля, 
Канун субботы и конец недели,
Крик муэдзи́на, запах фалафе́ля
И попугаев говорящих трели, -
На завтра намечается шара́в.

Над Средиземным небо голубое,
Мы жизнь напрасно прожили с тобою,
И пыль уже метёт над мостовою,
И чайки голосят над головою,
О том, кто был из нас с тобой неправ.

На Средиземном славная погода, 
Знать, лето начинается, походу.
Оно тут продолжается полгода,
И вовсе нету снега, слава Богу! 
Но каждый здесь практически - еврей.

Так вот, на море этом на старинном, 
Земной свой путь пройдя до середины,
С ума сведённый воплем муэдзи́на,
Я думаю: не всё ль оно едино,
В какой земле потом кормить червей?..

Не всё ль равно, где жить нам будет трудно,
Дождь или снег, понос или простуда,
Израиль, Украина или Куба...
И чьи тебя теперь целуют губы? 
Все в Средиземьи губы хороши!

И в этом вечноголубом изгнаньи
Проходит жизнь, та что была не с нами,
Где длится дольше вечности экзамен, 
Но я раскис, и ничего не знаю,
Да жгут кулак последние гроши.

Опять настало третье апреля - 
Канун субботы и конец недели.
Как много мы с тобою не успели,
Недолюбили или недопели,
И дочь внезапно выросла, хоть плачь!..

Над Средиземьем ветер дует зимний - 
Шара́ва ждут, а может быть хамси́на.
По маме я теперь скучаю сильно,
И тонет солнце цвета апельсина 
В небесной се́пии, как баскетбольный мяч.

 
03.04.2016

review: `
Аннотация от ИИ

Это одно из тех стихотворений, в которых география оказывается не темой, а способом разговора о человеке. Средиземное море, Израиль, муэдзин, шарав, хамсин, фалафель — всё это не экзотика и не туристические впечатления. Автор сознательно собирает мир из узнаваемых бытовых деталей, чтобы показать: смена страны не избавляет человека ни от самого себя, ни от памяти, ни от чувства утраченного времени. В этом смысле стихотворение не столько об Израиле, сколько об эмиграции как внутреннем состоянии.
Композиция построена очень грамотно. Повторяющаяся дата — «третье апреля», «канун субботы и конец недели» — становится не просто рефреном, а своеобразной точкой отсчёта, к которой текст возвращается уже другим по смыслу. В начале читатель воспринимает её как обычную бытовую зарисовку, но к финалу она превращается в символ времени, которое ежегодно напоминает о прожитой жизни и несбывшемся.
Главное достоинство произведения — умение постоянно удерживать равновесие между конкретным и философским. Практически каждая строфа начинается с наблюдения: море, небо, жара, ветер, крик муэдзина, запах еды. Однако уже через несколько строк это наблюдение перерастает в вопрос о памяти, любви, старении или смерти. Благодаря этому текст развивается естественно, без ощущения, что автор специально «выходит на философию».
Очень удачно работает и контраст. Израиль изображён как солнечная, тёплая, почти праздничная страна, где «лето продолжается полгода» и «нету снега». Но именно на фоне этой внешней благополучности особенно остро звучат одиночество, тоска по матери, воспоминания о прошлом и ощущение жизни, которая «была не с нами». Этот приём делает стихотворение гораздо глубже, чем простая эмигрантская ностальгия.
Отдельно стоит отметить авторскую интонацию. Она постоянно балансирует между самоиронией и трагизмом. Строки вроде «понос или простуда» или «каждый здесь практически — еврей» могли бы разрушить серьёзность текста, но здесь они работают иначе. Они становятся способом защититься от пафоса и сохранить живой человеческий голос. Это характерная особенность твоей поэтики вообще: самые серьёзные мысли часто появляются через бытовую, почти разговорную речь.
При этом стихотворение не лишено внутренних шероховатостей. Некоторые философские выводы проговариваются слишком прямо. Например, строфа «Не всё ль равно, где жить нам будет трудно...» очень сильна по мысли, но уже следующая строка «И чьи тебя сейчас целуют губы?» почти завершает эмоциональное движение, а дальнейшее развитие немного объясняет то, что читатель уже успел почувствовать самостоятельно. В нескольких местах текст выиграл бы от большей недосказанности.
Финал — одна из сильнейших сторон произведения. Возвращение к третьему апреля, воспоминание о матери, неожиданное сравнение солнца с баскетбольным мячом — всё это создаёт ощущение не завершения истории, а принятия собственной судьбы. Последний образ соединяет повседневность, детскую память и уходящий день в одной простой, но очень ёмкой картине.
В целом это зрелое стихотворение, в котором личная биография естественно превращается в разговор о времени, памяти, родине и человеческом возрасте. Его сила не в отдельных удачных строках, а в общей архитектуре произведения, где каждая строфа работает на единую эмоциональную и смысловую цель. Именно поэтому текст оставляет ощущение цельности и продолжает звучать уже после того, как прочитана последняя строка.

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
