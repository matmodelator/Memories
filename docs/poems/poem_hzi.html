    text: `
Зима. Которую неделю,
Забытый богом и людьми,
Ищу отметины на теле
Твоей неистовой любви.

Гудят воздушные тревоги,
Ракеты метят в города,
А я один топчу дороги —
Те, что с тобой коротал.

И горы горбятся сутуло,
И город горя ждёт ещё.
Медовым пряником из Тулы
Начинка жидкая течёт…

То не брусничное варенье, 
То не солёная вода,
Кровит моё стихтворенье —
Что я рожаю в никуда.

А тишина, как наказанье,
Что краткий миг среди сирен...
Дрожат устои мирозданья,
Печёт колени вольтарен.

Но голос твой, как дуновенье 
Из неизведанных глубин,
Звучит, чтобы продлить мгновенье,
Когда я был тобой любим.

review: `
Аннотация от ИИ

Это пронзительное стихотворение, написанное на стыке интимной и гражданской лирики. В нём личная драма (утрата близости, одиночество) разворачивается на фоне масштабной катастрофы. 

1. Тема и идея 
* Тема: Сохранение человеческих чувств и памяти о любви в условиях войны и экзистенциального кризиса.
* Идея: Единственное, что способно противостоять хаосу, летящим ракетам и разрушению мира — это внутренний голос любимого человека и творчество, даже если оно кажется «рождённым в никуда». 

2. Сюжет и композиция 
Стихотворение строится на контрасте: 
* Внешний мир: Ракеты, сирены, «дрожащие устои мирозданья», физическая боль (вольтарен). Это мир «горя» и разрушения.
* Внутренний мир: Поиск «отметин» любви, воспоминания о прогулках вдвоем, голос из «неведомых глубин».
* Финал: Стихотворение закольцовывается темой любви. Если в начале герой одинок и заброшен, то в конце голос любимой становится его опорой, позволяя «продлить мгновение» жизни. 

3. Образный строй и тропы 
* Метафора «Тульского пряника»: Один из самых сильных и страшных образов. Пряник — символ мирной жизни, дома, сладости. Но здесь его «жидкая начинка» течёт из города, ждущего горя, превращаясь в кровь («не брусничное варенье»). Это символ разрушенного уюта.
* Олицетворения: «горы горбятся сутуло», «город горя ждёт» — природа и пространство сопереживают человеческой трагедии.
* Антитеза: «тишина как наказание» противопоставляется звуку сирен. В военном контексте тишина часто пугает больше, чем шум, так как она — лишь пауза перед новым ударом.
* Бытовая деталь: Упоминание «вольтарена» приземляет стихотворение, делает страдания героя осязаемыми, физическими, лишая их излишнего пафоса. 

4. Форма и ритм 
* Размер: Четырехстопный ямб. Он придает стиху динамику, напоминающую шаг человека, который «топчет дороги».
* Рифмовка: Перекрестная (АВАВ).
* Особенности: Автор намеренно использует слово «стихтворенье» (с пропуском буквы), что может символизировать надрыв, сбой дыхания или само «кровоточащее» состояние текста. 

Резюме 
Это текст о хрупкости человека. Герой ищет спасения от «мирового пожара» в интимном прошлом. Любовь здесь — не просто чувство, а единственный способ сохранить рассудок, когда «дрожат устои».

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

});

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена.";
  });
}

// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
