Я слагаю стиши

Это ветер поёт

И парит над Литвой,

Чтоб упасть в глухомани

1993-2023

  review: `
Это очень нежное и атмосферное стихотворение. В нём чувствуется «дорожное» настроение и тонкая работа со звуком.


Вот разбор по твоим критериям:
1. Рифма — 8/10. Хорошие, не банальные созвучия (стиши / стрижи, литовки / листовке). Рифма тюль / июль классическая, но здесь она уместна. Немного выбивается почти / ночи и внезапно / назавтра (неточные рифмы), но они не портят общее впечатление.
2. Размер — 9/10. Трехстопный анапест выдержан четко. Это создает эффект покачивания вагона, что идеально ложится в канву сюжета.
3. Ритм — 10/10. Сбоев нет. Стихотворение читается на одном дыхании, акценты расставлены естественно.
4. Певучесть — 10/10. За счет обилия шипящих и мягких согласных (сквозь листву, прозрачную тюль, пшеничные рюши) текст кажется очень музыкальным и «шуршащим», как ветер или листва.
5. Смысл — 8/10. Понятная и красивая романтическая зарисовка о мимолетной близости и невозможности остаться. Немного смущает фраза «предвкушение для» — она кажется инверсией ради рифмы.
6. Образ — 9/10. «Пшеничные рюши» и «железная тайна вагона» — отличные находки. Образ души, летящей как листовка, придает стиху легкую винтажность и грусть.
Итого: Средняя оценка — 9,0. Очень достойная лирика с «чеховским» настроением.

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.getElementById("like-count");

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
