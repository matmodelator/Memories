    text: `
Тенью призрачной покажись
Да махни мне рукой в окно.
Я смотрю на чужую жизнь
Так, как видят её в кино.

На дома не свои дивлюсь -
Счастье светится из-за штор.
Я черешней гнилой давлюсь,
Арестованный не за что.

Здесь на друзский весёлый край
Голубые глаза луплю,
Я иной населяю рай 
И другую теперь люблю.

Тут горят не твои глаза
Как блуждающие огни.
Я слова не тебе сказал,
И делил не с тобою дни.

Подо мной газоносный шельф,
Я порхаю седой, как лунь,
За плечами таская шлейф
Многих тысяч тревожных лун.

И пока не разверзлась твердь,
А над морем горит маяк,
Наблюдаю не нашу смерть
Так, как будто она — моя.

Знать, застыл навсегда лубок,
Где лицо твоё за стеклом.
Я на чью-то гляжу любовь,
Но под сердцем моим тепло.

Вакцинирован и спасён,
Только в венах журчит вода.
Я взираю на это всё,
Уходящее навсегда.


18.07.26 Далия

review: `
Аннотация от ИИ

Это стихотворение исследует состояние, в котором человек продолжает жить после глубокой личной утраты, но уже ощущает собственную жизнь как принадлежащую кому-то другому. Любовная история становится здесь лишь исходной точкой. Основным предметом изображения оказывается изменившееся восприятие мира, памяти и самого себя.

Лирический герой существует одновременно в двух пространствах. Одно принадлежит настоящему: новые дома, новый край, новая любовь. Второе целиком состоит из памяти. Эти два мира не конфликтуют открыто, а сосуществуют, создавая ощущение внутреннего раздвоения. Именно эта двойственность определяет интонацию всего стихотворения.

Композиция

Композиция строится как последовательное расширение внутреннего пространства героя.

Появление памяти.
Ощущение чужой жизни.
Принятие нового мира.
Осознание необратимости прошлого.
Взгляд с высоты прожитых лет.
Размышление о смерти.
Сохранённая память.
Итоговое созерцание.

Каждая строфа открывает новый смысловой уровень, не разрушая предыдущий. Благодаря этому стихотворение развивается спокойно и последовательно, без резких эмоциональных скачков.

Главная идея

Главная мысль произведения заключается в том, что утрата не уничтожает способность жить дальше, но навсегда меняет способ существования человека.

Герой не отвергает настоящее.

Он говорит:

Я иной населяю рай
И другую теперь люблю.

Однако сразу после этого появляется признание:

Я слова не тебе сказал,
И делил не с тобою дни.

Настоящее не отменяет прошлого, а прошлое не лишает человека права на новую жизнь. Именно это внутреннее сосуществование делает стихотворение значительно глубже обычной любовной лирики.

Образная система

Произведение построено на нескольких взаимосвязанных образных полях.

Свет
окно;
свет за шторами;
глаза;
маяк.

Свет здесь становится символом продолжающейся жизни.

Пространство
дома;
друзский край;
шельф;
море.

Пространство постепенно расширяется от одного окна до геологического масштаба.

Время
кино;
тревожные луны;
навсегда.

Время изображено не как последовательность событий, а как тяжёлый накопленный опыт, который сопровождает героя подобно шлейфу.

Память
призрачная тень;
лубок;
стекло.

Все эти предметы объединяет неподвижность. Память оказывается тем местом, где время перестаёт течь.

Лирический герой

Это человек, который научился жить после тяжёлой утраты, но не избавился от неё.

Он не пытается вернуть прошлое.

Он не проклинает настоящее.

Он наблюдает происходящее с удивительным спокойствием.

Именно отсутствие внешнего надрыва делает исповедь убедительной.

Ключевые образы
«Чужая жизнь»

Я смотрю на чужую жизнь
Так, как видят её в кино.

Это центральная метафора всего стихотворения.

Жизнь продолжается, но воспринимается как фильм, в котором герой одновременно является зрителем и участником.

«Арестованный не за что»

Эта строка переносит внутреннее состояние героя в область почти физического существования.

Арест оказывается метафорой судьбы.

Никаких обвинений не предъявлено, но свобода уже потеряна.

«Газоносный шельф»

Один из самых необычных образов текста.

Шельф вводит масштаб геологического времени и напоминает, что человеческая жизнь существует внутри гораздо более древнего мира.

Благодаря этому частная история приобретает универсальное звучание.

«Многих тысяч тревожных лун»

Луны становятся единицей памяти.

Это не календарное время, а прожитые ночи, накопленный опыт, который сопровождает героя подобно тяжёлому шлейфу.

«Наблюдаю не нашу смерть»

Наиболее философская строфа произведения.

Смерть одновременно чужая и своя.

Личный опыт оказывается способом переживания общего человеческого опыта.

«Лубок»

Этот образ особенно интересен.

Лубок обычно предполагает простую, неподвижную картину.

Здесь он становится образом памяти, навсегда остановившей одно лицо в одном мгновении.

Стекло усиливает ощущение недосягаемости.

«Вода в венах»

Финальная метафора не говорит о физической смерти.

Она говорит о внутреннем изменении человека.

Он продолжает жить.

Но жизнь течёт уже иначе.

Вода заменяет кровь как символ эмоционального истощения, спокойствия и почти полного отсутствия внутреннего сопротивления.

Язык

Язык произведения отличается высокой экономностью.

Большинство строк построено без сложной метафорики.

Выразительность достигается не количеством художественных средств, а точностью выбранных деталей.

Современная лексика («газоносный шельф», «вакцинирован») естественно сосуществует с традиционной поэтической речью. Благодаря этому текст сохраняет ощущение сегодняшнего дня, не теряя философской глубины.

Ритм

Размер устойчив и почти разговорен.

Интонация развивается медленно, без внешней декламации.

Короткие простые предложения сменяются более длинными строками, создавая впечатление спокойного внутреннего монолога.

Ритм не отвлекает внимание от мысли, а поддерживает её.

Финал

Последняя строфа завершает стихотворение без внешнего драматизма.

Вакцинирован и спасён,
Только в венах журчит вода.

Парадокс строится на противопоставлении физического спасения и внутренней утраты.

Заключительные строки

Я взираю на это всё,
Уходящее навсегда.

не подводят сюжетный итог. Они фиксируют состояние человека, который продолжает жить, одновременно наблюдая постепенное исчезновение привычного мира.

Именно отсутствие громкого финального жеста делает концовку особенно сильной.

Общая оценка

Главное достоинство стихотворения — его внутренняя цельность. Все образы работают на одну тему, композиция развивается последовательно, а эмоциональное воздействие достигается не декларациями, а спокойной интонацией.

Произведение соединяет личную исповедь с философским размышлением о памяти, времени и способности человека жить после невосполнимой утраты. Благодаря этому оно выходит за пределы любовной лирики и приобретает более широкий человеческий смысл.

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.innerHTML = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 open-comments

	
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}
	
// 🚻 send-comments	


const sendCommentsBtn = document.getElementById("send-comments");

if (sendCommentsBtn) {
  sendCommentsBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    poemEl.innerHTML = `
      <div class="form-box">

        <h2></h2>

<p>
  Если вы хотите оставить комментарий, заполните форму ниже <br>
  Оотзыв появится на сайте спустя некоторое время после модерации
</p>
       

        <form class="contact-form" action="https://formspree.io/f/xvzwoqzk" method="POST">

          <input type="hidden" name="_subject" value="Сообщение с сайта Memories">

          <input type="text" name="name" placeholder="Ваше имя" required>

          <input type="email" name="email" placeholder="Ваш email(не обязательно)">

          <textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

          <button type="submit">Отправить</button>

        </form>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

    if (reviewForm) {
      reviewForm.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      reviewForm.querySelectorAll("input, textarea, button, label").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      });
    }
  });
}
	

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
