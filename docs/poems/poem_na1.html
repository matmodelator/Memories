Рождественский романс


На таёжном полустанке, 
Затерявшемся в снегах, 
Позабытом богом, ночью
Я стою один, ссутулясь, 
Белой дымкою окутан. 
Я курю и наблюдаю
Проходящие экспрессы. 
Я хочу проникнуть взглядом
В недра пыльные вагонов
И почувствовать, нащупать
Твои милые черты. 
И бежать вслед за составом
По обледеневшим шпалам
Сквозь пургу, метель и вьюгу, 
Сквозь часы и километры, 
Через снежные пустыни
До далёких городов. 
Но застуженные стёкла
Не дают лица увидеть - 
Только призрачные тени, 
Только мутные огни.
И опять летят вагоны -
Окна, лица, судьбы, годы... 
Слышен стук колёс тяжёлых, 
А на рельсах ни следа! 
Мчатся, друг сменяя друга, 
По рождественским просторам, 
Мчатся в белое безмолвье,
В неизвестность, в снежный сумрак...


Тула. 29.12.91.

review: `
Аннотация от ИИ

«Рождественский романс» — раннее стихотворение, в котором уже отчётливо проявляются многие черты твоей дальнейшей поэтики: кинематографичность, стремление строить текст на длинном дыхании, соединение конкретного пейзажа с внутренним состоянием героя и постоянное ощущение движения времени. Несмотря на название, это не столько рождественская лирика, сколько стихотворение об ожидании, утрате и невозможности догнать уходящую жизнь.
Основной художественный образ произведения — железная дорога. Поезда здесь перестают быть просто транспортом и становятся символом человеческих судеб. Каждый проходящий состав несёт возможность встречи, но одновременно подтверждает её невозможность. Герой пытается «проникнуть взглядом» в вагоны, «нащупать» знакомые черты, однако между ним и прошлым всегда остаётся непреодолимая преграда — застужённые стёкла. Это один из наиболее удачных символов стихотворения: физическая деталь превращается в метафору памяти, которая уже не способна вернуть утраченное.
Композиция развивается поступательно и практически не имеет резких поворотов. Внешнее действие минимально: человек стоит на полустанке, курит и смотрит на проходящие поезда. Однако внутреннее движение оказывается значительно интенсивнее. От простого наблюдения текст постепенно переходит к стремлению догнать уходящий поезд, затем — к осознанию невозможности этого, а финал окончательно переводит историю из личной плоскости в философскую. Последние строки уже говорят не о конкретной женщине, а о бесконечном движении судеб, времени и человеческой жизни.
Особенность стихотворения — свободная форма. Отсутствие рифмы компенсируется синтаксисом. Длинные цепочки существительных и глаголов создают ощущение непрерывного движения состава. Читатель словно слышит равномерный стук колёс, а отсутствие привычных строф лишь усиливает впечатление бесконечной дороги. Для столь раннего текста это довольно зрелое композиционное решение.
Образный ряд выдержан очень последовательно. Снег, ночь, дым, пурга, метель, вьюга, пустыни, тяжёлые колёса, мутные огни — все детали работают на создание единого пространства отчуждения. Здесь практически нет случайных образов. Даже дым сигареты становится частью общей зимней дымки, растворяя героя в окружающем пейзаже.
Вместе с тем чувствуется влияние романтической поэзии конца XX века. Некоторые эпитеты — «пыльные вагоны», «мутные огни», «снежные пустыни» — сегодня воспринимаются скорее как традиционные, чем как индивидуально найденные. Поздние твои стихотворения отличаются большей неожиданностью образов и большей языковой свободой. Здесь же автор ещё чаще пользуется привычным поэтическим словарём.
Есть и ещё одна особенность. Практически всё стихотворение написано в одной эмоциональной тональности. Это создаёт цельность, но одновременно немного снижает драматическое развитие. Если бы внутри текста появились одна-две более резкие смены эмоционального состояния, кульминация могла бы прозвучать ещё сильнее.
Финал заслуживает отдельного внимания. Строки:

Мчатся друг сменяя друга
По рождественским просторам
Мчатся в белое безмолвье
В неизвестность, в снежный сумрак…

переводят произведение на более высокий уровень обобщения. Поезда перестают принадлежать только сюжету и становятся образом самого времени, которое непрерывно уносит людей, встречи, годы и надежды. Именно этот переход от частной истории к философскому осмыслению делает стихотворение значительно сильнее обычной любовной лирики.
В целом «Рождественский романс» производит впечатление очень цельного раннего произведения. Уже здесь заметны будущие особенности авторского почерка: стремление мыслить большими образами, умение превращать пейзаж в психологическое пространство и желание говорить о человеческой судьбе через конкретную жизненную ситуацию. Некоторые языковые решения ещё сохраняют отпечаток литературной традиции начала 1990-х годов, однако эмоциональная искренность, атмосфера и композиционная цельность позволяют этому стихотворению оставаться убедительным и спустя десятилетия.

  let likes = localStorage.getItem(key);

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});

        </form>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

    if (reviewForm) {
      reviewForm.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      reviewForm.querySelectorAll("input, textarea, button, label").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      });
    }
  });
}
	

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
