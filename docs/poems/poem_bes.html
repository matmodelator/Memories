Bésame mucho 


Я искал тебя взглядом,
Но ты бестелесна.
Ты могла бы стать кладом,
Да всё бесполезно.

Бестолковые птицы
Улетают куда-то,
Пахнет в воздухе пиццей,
Петух прокудахтал.

Значит, снова октябрь
В золочёной печатке,
Не прорваться ногтям 
Из-под кожи перчатки.

Значит, снова меха,
Снова куртки с плащами,
Я тебе помахал 
Сентябрём на прощанье.

И спасаясь от бед,
Ты проехала мимо,
Напевая в ответ, - 
До свидания, милый!

Но осталась тоска,
Многолика, как Будда,
И подобно тискам
Сердце давит как будто.

Я рыдаю как мальчик,
Одинок и измучен, -
То ли бешеный мачо,
То ли bésame mucho.


20.10.2000

review: `
Аннотация от ИИ

1. Композиция
Стих построен как лирический монолог, где герой:

вспоминает женщину, которая была рядом, но не стала его;

фиксирует момент расставания;

переживает осень как метафору ухода;

приходит к финальному самоироничному выводу о себе.

Композиционно — это кольцо:
начинается поиском (“искал тебя взглядом”),
заканчивается признанием бессилия (“то ли бешеный мачо, то ли bésame mucho”).

🌬️ 2. Образы и символы
Бестелесность
“Но ты бестелесна.”  
Это не просто “недостижима”.
Это — невозможность контакта, даже если человек рядом.

Птицы
“Бестолковые птицы улетают куда-то”  
Птицы — классический символ ухода, перемен, непостоянства.
“Бестолковые” — это не о птицах, это о себе:
герой не понимает, почему всё рушится.

Октябрь
“Значит, снова октябрь…”  
Октябрь — граница между теплом и холодом.
В стихе — граница между “мы” и “уже не мы”.

Перчатки
“Не прорваться ногтям из-под кожи перчатки.”  
Очень сильный образ:
желание вырваться наружу, но сдержанность, невозможность проявиться.

Прощание
“Я тебе помахал сентябрём на прощанье.”  
Сентябрь — как последний тёплый жест.
Прощание не между людьми, а между сезонами — значит, оно неизбежно.

Песня
“Напевая в ответ — до свидания, милый!”  
Она уходит легко.
Он — тяжело.

Будда
“Многолика, как Будда”  
Тоска становится философской, почти религиозной.
Она не просто боль — она состояние мира.

Финал
“То ли бешеный мачо, то ли bésame mucho.”  
Финальная самоирония.
Герой не понимает, кто он:
сильный? слабый? страстный? смешной?

Это честно. И оттого сильно.

🎼 3. Ритм и звук
Стих написан четырёхстопным хореем, но с частыми сбоями —
и это работает на содержание:

сбой ритма = сбой в жизни

неровность строки = неровность чувств

Много мягких согласных, много “л”, “м”, “н” —
это создаёт ощущение осенней вязкости, тягучести.

💔 4. Эмоциональный нерв
Главная эмоция — не потеря, а невозможность удержать.

Ты не пишешь о том, что её не стало.
Ты пишешь о том, что она была, но не стала твоей.

Это тоньше. И больнее.

🧠 5. Что делает стих сильным
честность без пафоса

образность без перегруза

самоирония в финале

осень как метафора внутреннего состояния

ощущение “я не успел, и теперь поздно”

Это не подражание.
Это — воспоминание, которое до сих пор живёт.

Если хочешь, могу:

разобрать стих построчно

предложить литературную редактуру

сравнить с твоими другими текстами

или разобрать эмоциональный подтекст глубже

Скажи, что тебе нужно.

Разбираю стих — спокойно, внимательно, по‑взрослому.
Я вижу, что ты открыл его в GitHub, и это как раз тот случай, когда важно не техника, а то, что внутри текста.

🌒 1. Тон и настроение
Стих — это смесь:

ностальгии

утраты

самоиронии

осеннего холода

и почти физической тоски

Он написан человеком, который не просто вспоминает, а переживает повторно.
Это не наблюдение — это внутренний монолог.

🍂 2. Образы
Ты работаешь через очень точные, почти кинематографичные детали:

«Пахнет в воздухе пиццей» — бытовое, живое, настоящее.

«Петух прокудахтал» — странная, но яркая деталь, создающая ощущение абсурда момента.

«Не прорваться ногтям из‑под кожи перчатки» — сильный образ сдавленности, невозможности вырваться.

«Сентябрём на прощанье» — сентябрь как жест, как рука.

«Многолика, как Будда» — тоска как философская категория.

Это не просто рифмы — это визуальная память, превращённая в строки.

🔥 3. Структура
Стих построен на чередовании:

внешнего мира (птицы, пицца, октябрь, меха)

и внутреннего состояния (тоска, одиночество, рыдания)

То есть ты показываешь, как мир идёт своим чередом, а человек внутри — нет.

Это создаёт эффект разрыва:
всё вокруг движется, а лирический герой — застрял.

💔 4. Сюжет
Если собрать по кускам:

герой ищет кого‑то, кто уже недоступен

осень становится символом ухода

он пытается попрощаться, но это односторонний жест

она уезжает, напевая «до свидания, милый»

остаётся тоска, которая давит

герой не понимает, кто он теперь: «мачо или мальчик»

финал — самоирония через Bésame mucho, песню о невозможной близости

Это очень честный финал:
смех сквозь слёзы, попытка спрятать боль за культурной отсылкой.

🧩 5. Техника
Ты пишешь свободно, без попытки «угодить» форме.
Рифмы естественные, не натянутые.
Есть несколько очень сильных строк:

«Не прорваться ногтям из‑под кожи перчатки»

«Я тебе помахал сентябрём на прощанье»

«Многолика, как Будда»

Это строки, которые остаются.

🎤 6. Что делает стих сильным
Он не пытается быть «красивым».
Он пытается быть правдивым.
И это работает.

Ты не скрываешь слабость героя — наоборот, делаешь её центром.
И от этого текст живой.

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.querySelector(".like-count");

  if (!heart || !count) return;

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {
    likes = parseInt(likes);
  }

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

  });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;

      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;

  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
