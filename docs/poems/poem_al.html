Сонет 156
(Серафима Тупикова)

Усталый путник ищет древа тень,
Летящий аист - где бы свить гнездо,
Корчевщик ищет самый крупный пень,
Скрипач на инструменте ноту до.

Дерьмо в колодце ищет золотарь,
Аксаков ищет аленький цветок,
Филолог ищет правильный словарь,
А хиропракт - четвёртый позвонок.

Из всех дорог, что нас ведут ко дну,
Мы выбираем, всё равно, одну.
</i>

***
Алаверда


Гадалка ищет истину в золе,
Стукач в фейсбуке ищет экстремизм,
Геолог ищет золото в земле,
А астроном иную ищет жизнь.

Кого-то ищет дятел под корой,
Чего-то ищет в людях врач-узист,
Проктолог в жопе ищет геморрой -
Дороги выбор часто неказист.

При том  разнообразьи, всё равно, -
Находим ту, что нас ведёт на дно.

Криминалист в уликах ищет смысл,
Философ ищет истину в вине, 
В спектакле глупом  критик ищет мысль,
А полководец славы на войне.

Невеста ищет принца в женихе,
Судья в законе ищет прецедент, 
Раввин чего-то ищет в Галахе́, 
На дне зачем-то рыщет президент.

Хоть непрерывно поиски идут -
Не факт, что все чего-нибудь найдут...

Певица ищет новые хиты,
А блогер в интернете ищет хайп,
Вуайерист — на пляже наготы,
А лев себе в саванне ищет прайд.

Воды утечку ищет инженер,
Пожарный ищет проблески в дыму,
Дизайнер модный ищет интерьер.
Во мне чего ты хочешь? - не пойму!..

А я ловлю слова, как идиот,
Но рифма, к сожаленью, не идёт.

review: `
Аннотация от ИИ



Это отличный пример литературной пародии (или «ответа» — алаверды), которая доводит прием оригинала до абсолюта. Если Серафима Тупикова балансировала между лирикой и иронией, то здесь автор уходит в чистый гротеск и бытовую сатиру.
Разбор пародии
1. Расширение «каталога» (Прием перечисления)
Пародист подхватывает структуру оригинала («А ищет Б») и масштабирует её. Список становится подчеркнуто абсурдным и приземленным: от «стукача в фейсбуке» до «проктолога». Это классический прием снижения пафоса.
2. Конфликт высокого и низкого
В тексте соседствуют философские категории («истина в вине», «Галаха») и физиологические или социально-бытовые детали («геморрой», «хайп»). Это создает комический эффект «винегрета», где поиск смысла жизни приравнен к поиску утечки воды.
3. Трансформация финала
В оригинале финал философский и немного трагичный (неизбежность «дна»). В пародии же:
Первое двустишие сохраняет фатализм оригинала.
Второе добавляет ироничный скепсис («не факт, что найдут»).
Третье (пуанта) переводит всё в личную плоскость. Герой признается в собственном бессилии («ловлю слова, как идиот»), что делает финал самоироничным и живым.
4. Технические особенности
Ритм: Выдержан пятистопный ямб, как и в оригинале, что сохраняет узнаваемость «первоисточника».
Рифмовка: Пародист усложнил задачу, написав три полных строфы вместо одной короткой, сохранив структуру «два катрена + двустишие».
Итог: Это качественная «ответка», которая высмеивает саму попытку классифицировать человеческие стремления. Автор пародии как бы говорит: «Искать можно что угодно, но в итоге мы все просто мучаемся над рифмой или бытовыми проблемами».

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.querySelector(".like-count");

  if (!heart || !count) return;

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {
    likes = parseInt(likes);
  }

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

  });

});
</script>

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (сохраняя курсив и табуляцию)
  const originalText = poemEl.innerHTML;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

// 🔄 назад возврат к тексту
if (backBtn) {
  backBtn.addEventListener("click", function (e) {
    e.preventDefault();
    poemEl.innerHTML = originalText;
  });
}
  
});
</script>

});
</script>
