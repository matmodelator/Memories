    text: `
       ПРОЩАНИЯ


Прости мне то, что я тебе не нужен,
Что нет ни уважения, ни дружбы,
И что шагрень любви всё тоньше, уже,
И что слова недужны и натужны.

Прости мне то, что родинкой болею,
Что думаю о смерти я нездраво,
Прости мне, что с годами я старею, 
Хотя, конечно, не имею права.

Прости мне то, что ты во мне забыла, 
Как жил тобой, как пел тебе я блюзы, 
Что поросла любовь степной ковылью,
И сделалась она тебе обузой.

Прости мне то, что я тебе прощаю – 
Мои слова, мои дела и мысли.
Прости мне душу, что идёт прыщами,
И чувства, что в душе твоей прокисли.

Прости мне то, что ты в меня не веришь, 
И что мои пристанища убоги,
Прости мне то, что я ломаю двери – 
Я вместо них любви творю чертоги…

Прости мне то, что я хандрю и пла́чу, 
Что это как-то вовсе не брутально,
Прости мне даже то, что я не мачо – 
Прошу тебя о том документально.

Прости мне то, что я не сплю ночами,
Луначу неприкаянной совою,
И что любовь, нам данную вначале,
В последний мрак я унесу с собою.

Прости мне то, что я не нищ, но беден,
Что я твои желанья разрушаю,
Прости мне то, что я за всё в ответе,
Поэтому я кое-что решаю.

Прости мне то, что праздники унылы, 
Что не умею толком я поздравить.
Прости мне то, что ты любовь убила,
И никогда ей крыльев не расправить.

Прости мне то, что я патриархален, -
Мне моногамность тягостна - не скрою…
Прости, что в этом я не уникален,
Все мужики – козлы, давай поспорим?!

Прости мне баскетбол, друзей-блюзменов,
Депрессии, обиды, страхи, ссоры,
Прости, что ты дежурила бессменно
У детской колыбели, что бесспорно.

Прости мне дочь, что связью нам не стала, 
Что так люблю и слёзы с глаз моргаю... 
Прости мне то, что ты от нас устала,
Прости меня, что мало помогаю.

Прости мне всё, что есть во мне плохого,
Что я не Магомет, не Иисус, не Будда,
Что стал никем в последние полгода,
И что никем тебе уже не буду.

Прости мне жизнь, что прожита с тобою, 
Прости мне то, что ты была несчастна,
Прости любовь, не ставшую судьбою,
Прости мне секс, недолгий и нечастый.

Прости мне то, что нету мне прощенья, 
И что не повезло, и всё такое…
Ещё прости меня за обращенье, 
Что был несдержан, груб и беспокоен.

Прости мне то, что ты меня не любишь,
Что стала жизнь войной - передовою,
Где гибнешь ты, и где меня ты губишь -
Я в этом виноват перед тобою!

Прости меня за всё. Прости, что есть я.
Прости, что мир собой не украшаю.
За счастье, за стихи, за жизнь, за песни -
Прости меня. А я тебя прощаю.


Москва. 17 июня 2008 года.

  review: `
Это сильный, тяжёлый, честный текст. Он звучит как человек, который пытается подвести итог целой жизни — не только отношениям, но и себе самому. И делает это с такой степенью самообвинения, что становится ясно: боль здесь давно вышла за пределы конкретной истории любви.
Коротко — это не просто «прощание». Это исповедь. Причём исповедь человека, который берёт на себя вину за всё подряд, даже за то, что объективно не может быть его виной. Такой жест всегда говорит о глубокой усталости, о внутреннем надрыве, о попытке хоть как‑то объяснить разрушение того, что было важным.
Вот несколько вещей, которые особенно выделяются:
1. Повтор «прости мне»
Он работает как ритм, как мантра. Но по сути — это не просьба о прощении, а признание собственной несостоятельности. Такое ощущение, что герой пытается заранее снять с другого человека любую ответственность, оставляя всё на себе.
2. Сильная самоирония и саморазрушение
Строки вроде «Прости мне душу, что идет прыщами» или «Прости мне то, что я не мачо» — это не просто юмор. Это способ спрятать отчаяние за гротеском. Когда человек смеётся над собой, чтобы не расплакаться.
3. Любовь, которая стала грузом
Он признаёт, что любовь иссякла, но всё равно держится за неё как за единственное, что придаёт смысл. Это очень по‑человечески: даже когда всё разрушено, память о любви остаётся последним убежищем.
4. Тема вины за всё: за возраст, за бедность, за дочь, за праздники
Это уже не про отношения. Это про внутренний кризис, про ощущение собственной ненужности и усталости от себя самого.
5. Финал
«Прости меня. А я тебя прощаю.» Это, пожалуй, самая честная строка. В ней — не упрёк, не обвинение, а попытка поставить точку без войны.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
