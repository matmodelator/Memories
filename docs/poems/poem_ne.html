review: `
Аннотация от ИИ

Это стихотворение построено на одном приёме — анафоре «Мне бы...», которая превращается не просто в повтор, а в своеобразный внутренний список несбывшихся желаний. Каждая строфа начинается с новой мечты, но постепенно становится понятно, что все они сводятся к одной: вернуть не молодость как таковую, а возможность снова любить и быть счастливым.
Сюжет почти отсутствует, однако внутреннее движение очень чёткое. Вначале желания носят внешний, почти бытовой характер: сбросить возраст, похудеть, избавиться от долгов, восстановить здоровье. Затем появляется любовь, а в финале — очищение и покой. Таким образом, стихотворение развивается от материального к духовному.
Интонация заслуживает отдельного внимания. Автор избегает трагического пафоса. Вместо громких слов появляются простые разговорные выражения: «погудеть», «разгрестись в долгах», «прибавить зубов». Именно они делают лирического героя убедительным. Перед читателем не романтический герой, а обычный человек, который умеет иронизировать над собой. Эта самоирония смягчает тему старения и делает исповедь особенно доверительной.
Первая строфа сразу задаёт масштаб мечты:

Мне бы сбросить лет сто,
Да обернуться львом...

Желание намеренно гиперболизировано. Сбросить не десять и не двадцать лет, а целое столетие — значит отказаться от самого времени. Но уже следующая строка резко снижает пафос:

И отыскать листок,
На котором твой телефон.

После почти сказочного превращения следует бытовая деталь — номер телефона. Благодаря этому возникает тонкий юмор: герою не нужна вечная молодость сама по себе, ему нужен всего лишь шанс снова позвонить любимой.
Вторая и третья строфы продолжают снижение масштаба. Здесь появляются долги, лишний вес, отсутствие зубов. Автор не скрывает возраст, а наоборот, делает его частью художественного мира. Особенно удачно звучит строка:

Я бы вспомнил ещё,
Что такое любовь.

Любовь представлена не как чувство настоящего времени, а как утраченное состояние, которое приходится вспоминать.
Перелом происходит в строфе:

Мне бы много чего
Хочется, но нельзя...

Это самая философская часть стихотворения. Впервые звучит слово «нельзя», которое перечёркивает все предыдущие мечты. После этого желания перестают быть фантазиями и превращаются в осознание собственной судьбы.
Последняя строфа заметно отличается по образности:

Мне бы упасть в прибой
И душу прополоскать...

Здесь появляется сильная метафора очищения. Море становится не просто пейзажем, а символом внутреннего освобождения. Глагол «прополоскать» неожиданно бытовой, однако именно эта неожиданность делает образ живым. Душа представлена почти как вещь, которую можно очистить морской водой от накопившейся усталости.
Финал:

А после лежать с тобой
Но больше не отпускать...

не выглядит эффектной концовкой ради красивого завершения. Это естественная точка всего стихотворения. Все предыдущие желания — молодость, здоровье, деньги, сила — оказываются лишь средствами для одной простой цели: быть рядом с любимым человеком.
Многоточие после первой строки создаёт ощущение мечты, долгожданного покоя, задержанного дыхания.
«Но больше не отпускать» — появляется внутренний перелом. После всех утрат, сожалений и несбывшихся желаний возникает обещание: если судьба ещё раз подарит эту возможность, уже не отпущу.
«Но» здесь добавляет эмоциональный подтекст: опыт прошлого делает вторую строку гораздо весомее.
Это «Но» резко меняет интонацию: это уже не продолжение мечты, а твёрдое внутреннее решение.
Точка в конце последней строки звучит окончательно. После всего стихотворения она воспринимается как итог, а не как незавершённость.
Стихотворение интересно тем, что почти полностью обходится без сложной символики и редкой лексики. Его художественная сила рождается из искренней интонации, точного чувства меры и постепенного раскрытия внутреннего мира героя. Это спокойная, зрелая лирика, в которой сожаление о прожитых годах не переходит в отчаяние, а становится признанием истинной ценности человеческой близости.

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

  <script>

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
