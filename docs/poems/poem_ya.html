  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2019",
    title: "Я б...",
    text: `
Я бы Ленину дал силы
Прострелить себе висок,
Чтоб пуля расслоила
Мозг его наискосок,

Чтобы брызнули наружу
Все великие мечты,
Чтоб валялся он, ненужен
И неведом нам почти.

Срамной хворью не болея,
Чтоб не кашлял, не чихал,
Чтоб не знать нам мавзолея, 
Продразвёрсток и ЧеКа.

Чтоб не чалилась на нарах
И не знала бы страна
Комиссаров, коммунаров,
Командиров - ни хрена!

Чтоб в могилке своей узкой
Он лежал, как диамант,
И не думал там о Крупской,
Коллонтай или Арманд.

На субботник не ходил бы
И бревна бы не таскал,
И Зиновьева в Разливе
Чтоб по пьяни не ласкал.

В опечатанном вагоне
В Питер чтоб не приезжал,
Лейба Троцкий на перроне
Чтоб его не провожал.

Чтоб дела земные бросив,
Разлагался он и гнил.
Чтобы рядом с ним Иосиф,
И Лаврентий тоже с ним!

Чтоб Россия победила
В бойне первой мировой,
А потом не разбудила 
Привидение второй.

Чтобы город над Невою
Звался в честь царя Петра.
Чтоб ни фабрик, ни заводов,
Ни проспектов, ни метра́!

Чтоб не знать нам пятилеток, 
Слов «колхоз», «ГУЛАГ» и «ЗиЛ».
Чтоб никто советских деток
В октябрята не крестил.

Чтобы лёг великий гений
В землю, как в расстрельный ров -
Ни стипендий чтоб, ни премий,
Ни значков, ни орденов!..

Или лучше в крематорий! 
Чтоб ни вешки, ни креста,
Чтобы всё согласно Торе -
Ни кумира, ни перста!

Чтоб не лез - неладен будь он! -
Ни в какой броневичок,
И чтоб жил Володя Путин
Там, где Вышний Волочёк.

Чтоб не знать про пионеров, 
Про вставание с колен, 
Про эпоху перемен бы
И про имя бы «Владлен».
 
Я б сказал: «Товарищ Ленин!
Буржуазный мир жесток! 
Как насчёт без промедлений
Засветить себе в висок?»

Я бы дал ему надежду,
Что давно его в раю
Двести гурий без одежды,
Ждут, сплотившися в строю. 

Я бы бахнул с ним по триста -
Ну а если не берёт, -
Для уверенности чисто 
По батончику пейот.

Револьвер системы Кольта
И патрон один бы дал, -
От меня лишь бы только
Ничего ещё не ждал.

И решительно по пьяной,
Словно опытный торчок,
Мне б сказал В.И.Ульянов:
«А ведь прав ты, старичок!»

И тогда б раздался выстрел,
И великий час настал, 
И апрельский тезис быстро
Улетучился б в астрал.

И спасительное тленье 
Охватило бы вождя,
И исчезло б слово «ЛЕНИН»
В никуда. И навсегда.


4.08.2019
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
