    text: `
Январи

/памяти Андрея Сапунова, 
вокалиста группы Воскресенье/

У великой реки на зыбучих песках
Я сжигаю забытые письма.
Обрывается снег, застревая в висках,
Свет огня преломляя, как призма.

Ты же помнишь, как старые письма твои
Я хранил и держал их в альбоме?
Между нами пустыней легли январи,
И вокзалы, и аэродромы.

В этих письмах мороз полустанков ночных
С духотою плацкартных вагонов,
И слова, что полны расставаний сплошных
И признаний, что льются свободно.

В этих письмах следы от помады твоей,
Чьи-то слёзы, мои откровенья.
Между нами легла череда январей,
Пролетевших как будто мгновенья.

В этих письмах портреты каких-то людей,
Разнополых и многоязыких,
Бесполезных затей и бесплодных идей,
Нерожденных детей ясноликих.

А когда околеет последняя тварь,
И сгоревшие письма истлеют,
Вдруг закончится павший меж нами январь,
И к весне всё равно потеплеет.

И дождями набухнут и хлынут слова,
И прольются по белому насту.
Наши письма сгорают до пепла сперва,
Но потом возвращаются часто.

И седой почтальон постучит на заре
И вручи́т под расписку конверты.
Мы однажды вернёмся ещё в январе,
Мы ещё погуляем, поверь ты!

Мы ещё дотанцуем и даже споём,
И ещё расцелуемся даже…
Наши письма с тобою остались вдвоём,
И смешались, и сделались сажей.

Скоро ночь. На проспекте зажгли фонари
И открыли кафе на кикаре,
Но раскинули крылья снегов январи,
Наших слов, припорошенных гарью.

И я вспомню усталость знакомой руки,
Даже почерк узнаю, наверно.
Затерявшись в песках у великой реки,
Я тебя представляю примерно.

Там как снежные горы лежат январи -
По колено, по пояс и выше.
Ты о чём-то со мною своём говори,
Но не ври, пока я не услышу.

Говори о любви, говори ни о чём,
Распахни свою душу и дверь отвори.
Январи позади у меня за плечом,
Снегопад до зари, и вовне и внутри.

Между нами как жизнь пролегли январи.
Кто есть я, кто есть ты - мне понять не дано.
Если сможешь, ещё раз любовь повтори -
Всё, что было когда-то давно...

Натания 10.09.2019
`,

review: `
Аннотация от ИИ



Это глубокое, пронзительное стихотворение-реквием, построенное на переплетении личной памяти и образа вечной зимы.
Вот краткий аналитический разбор текста:
1. Тема и идея
Тема: Память об ушедшем человеке, преодоление смерти через слово (письма) и неминуемость разлуки.
Идея: Смерть — это не финал, а «январь» (холод, затишье), за которым последует «оттепель» и встреча в ином пространстве. Автор утверждает, что искренние чувства и слова («сажа», «пепел») не исчезают бесследно.
2. Образный строй и символика
Январи: Центральный образ-метафора. Это не просто время года, а состояние отчужденности, дистанция между живыми и мертвыми («пустыней легли январи»).
Письма: Символ материальной памяти. Их сожжение в начале — это ритуал прощания, но в финале они возвращаются «под расписку», что символизирует бессмертие души и творчества.
Великая река и зыбучие пески: Классический образ Леты (реки забвения) или границы миров.
Седой почтальон: Образ-проводник, напоминающий мифологического перевозчика душ, но приносящий вести, а не забирающий их.
3. Настроение и лирический герой
Тон стихотворения меняется от элегической грусти (сжигание писем) к драматическому накалу («околеет последняя тварь») и завершается светлой надеждой («мы еще погуляем», «повтори любовь»). Лирический герой ведет диалог с тем, кого уже нет, стирая грань между «здесь» и «там».
4. Художественные средства
Эпитеты: бесплодных идей, ясноликих детей, зыбучих песках.
Сравнения: пролетевших, как будто мгновенья; преломляя, как призма.
Метафоры: набухнут и хлынут слова, раскинули крылья снегов январи.
Аллитерация: Повтор звуков «с», «ж», «з» в начале создает ощущение шуршания бумаги и треска огня («сжигаю забытые письма», «застревая в висках»).
5. Формальные признаки
Размер: Анапест (трехсложный размер с ударением на третий слог), что придает стиху напевность, похожую на балладу или рок-дистанцию.
Рифмовка: Перекрестная (АБАБ).
Контекст: Посвящение Андрею Сапунову (голосу группы «Воскресение») объясняет музыкальность текста и упоминание «дотанцуем и споем». Образ «кафе на кикаре» (площади) придает стихотворению современные, возможно, израильские черты.
Резюме: Это стихотворение о трансформации боли в вечность. Январь здесь — это затянувшаяся пауза перед новой встречей, которую автор предчувствует вопреки законам физики.

    const current = location.pathname.split("/").pop();

    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

});

    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
