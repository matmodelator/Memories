Барахтаюсь в Бара́хасе как сом.
Мой дом теперь как терминал прилёта.
Вчера опять приснился страшный сон:
В кого-то я строчил из пулемёта.

Запутался, как осьминог в сети,
И ножками смешно перебираю.
Испанию впервые посетив,
Я на хамон иберский напираю.

Здесь над Мадридом мы летим с тобой,
Влюблённые, как на холсте Шагала.
Я твой ветхозаветный постовой,
Я охраняю там, где ты шагала.

И толику тепла зажав в горсти,
Свой поцелуй воздушный засылаю,
Чтоб напоследок жаркое «прости»
Шепнуть тебе. И снова засыпаю…


16.11.24

review: `
Аннотация от ИИ

Это современное лирическое стихотворение, пронизанное чувством неприкаянности, тоски по близкому человеку и попыткой найти опору в новой реальности.
Вот подробный разбор:
1. Тема и идея
Тема: Эмиграция (или длительная поездка), чувство «подвешенного состояния» и неразрывная связь с любимым человеком вопреки расстоянию.
Идея: Герой чувствует себя чужим в новом пространстве (аэропорт Барахас), и единственное, что дает ему силы и смысл — это воспоминания и любовь, которые он охраняет как «ветхозаветный постовой».
2. Образный строй и лирический герой
Состояние героя: Он дезориентирован. Сравнения «как сом» (выброшенный на берег или бьющийся в сетях) и «как осьминог в сети» подчеркивают его беспомощность и неловкость в новых обстоятельствах.
Быт vs Вечность: Автор сталкивает приземленные вещи (хамон иберский, терминал прилета) с высокими образами (холст Шагала, поцелуй в горсти). Это создает ощущение раздвоенности: тело в Испании, а душа — в полете над Мадридом с любимой.
Сон и явь: Сюжет закольцован темой сна. «Страшный сон» с пулеметом намекает на травматичный бэкграунд или тревожное время, от которого герой пытается уйти в мирный, «шагаловский» полет.
3. Художественные средства (Тропы)
Сравнения: «как сом», «как терминал» (дом перестал быть уютным местом, он стал транзитной зоной), «как на холсте Шагала» (прямая отсылка к картине «Над городом», символ возвышенной любви).
Метафоры: «ветхозаветный постовой» (образ верности и чего-то фундаментального, древнего), «толику тепла зажав в горсти» (попытка сохранить остатки нежности).
Аллитерация: Повтор звуков «б» и «р» в первой строфе (Барахтаюсь, Барахасе, брилёта, брашный) создает ощущение шума, тяжести и борьбы.
4. Форма и структура
Размер: Пятистопный ямб. Он придает стиху разговорную, но при этом элегическую интонацию.
Рифмовка: Перекрестная (ABAB). Интересна рифма «Шагала — шагала» (омонимическая рифма), которая связывает фамилию великого художника с простым движением любимой женщины, обожествляя её путь.
География: Упоминание аэропорта Барахас (Мадрид) четко локализует действие, превращая личную драму в конкретный репортаж из жизни релоканта.
Итог: Это искреннее стихотворение о поиске дома внутри себя, когда внешний дом потерян. Финал («И снова засыпаю…») оставляет ощущение хрупкого покоя, добытого через «прости» и воспоминания.
`,

<!-- Локальный счетчик лайков  -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.querySelector(".like-count");

  if (!heart || !count) return;

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {
    likes = parseInt(likes);
  }

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

  });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
