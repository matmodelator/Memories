  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2019",
    title: "Вечерний Ялта",
    text: `
Marina Pevzner 
(пародия-песня)

Вечерний Ялта.*

Моя новая песня в великолепном исполнении. Огромное спасибо прекрасному композитору и замечательному певцу. Мне!
Исполнение именно такое, какое должно быть для песни о городе/герое Ялте - лучше невозможно себе даже сука представить!

Слова, Музыка, Аранжировка, Вокал, Аккомпанимент, Грим и все такое: Игорян

1.
Солнце топится в море угрюмо,
Взгляд прощальный кидая на Ялту,
Моряки вылезают из трюмов,
И воняет дерьмом непонятным.
Растянувшись на гальке прибрежной,
Проститутка икает в истоме,
И срывает с гетеры одежду
Алкоголик, сбежавший из дому.

Припев 1.
Променадом притихшим, ночною тропою,
Средь богатых и нищих проходят порою
Представители среднего класса 
И занудствуют часто не в кассу.
С Партенита идя, морщит носик ужасно,
Тоже чьё-то дитя - госпожа из Луганска.

2.
Я по Ленина выйду на берег
И войду в помутневшие волны,
На хрена мне вообще столько денег?
Я рублями, как песней наполнен!
И в песок погрузившись по брюхо,
Я отброшу ненужные цацки,
И спрошу эту Ялту: «Старуха,
Что ты значишь вообще по-татарски?»

Припев 2.
Променадом притихшим, ночною тропою,
Средь богатых и нищих проходят порою
Представители среднего класса 
И занудствуют часто не в кассу.
Там сидят старички-изуверы,
Персональные пенсионеры.

3.
Слышен русский и матерный тоже,
А какой же ещё ?..- не иврит же!
Бьют подростки друг другу по роже, -
Ну а ты что, хотел как в Париже?!!
Ты смеешься, но как-то не в тему,
Умываясь своими слезами,
Стих про Крым сочиняешь нетленный,
На Ай-Петри по пьяни влезая.

Припев 3.
Променадом притихшим, ночною тропою,
Средь богатых и нищих проходят порою
Представители среднего класса 
И занудствуют часто не в кассу.
Ты не спишь никогда, не скучаешь,
Ты занудствуешь тут. 
И бухаешь.

Игорян**©️

*Вечерний Ялта в переводе с грузинского - Вечерняя Ялта. Типо Ялта ввечерi по-украински или к примеру на иврите: ילטה בערב
**Игорян в переводе с армянского - сын Игоря. Навроде как Иванов по-русски или там Абрамзон на идиш...

В Ютюбе ролик - пока ещё не сняли. Ждём Тарантину


16.09.2019
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
