<script>

    if (!readingPanel.contains(e.target) && !nav.contains(e.target)) {
        window.location.href = "../index.html";
    }
});
</script>

 <script src="poem-nav.js"></script>
  

 <!--  Контейнер для контента с переменными -->

<h1 id="title"></h1>
<p id="author"></p>
<p id="year"></p>
<div id="text"></div>
  



  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь",
    year: "2026",
    title: "Барахас. Дождь",
    text: `
Бара́хас. Дождь. Кончается февраль.
Весна на взлете, но она чужая.
В окне я вижу ту же пастораль,
Навеки из Мадрида уезжая.

Мне очень жаль, что жизнь столь коротка,
И нам так мало выпало с тобою. 
Я прошлое спускаю с молотка 
И будущим сорю над мостовою.

Ещё чадит в окошках тёплый свет,
Искрит в стакане ти́нто-де-вера́на.
Испанцы на футбол ведут невест,
И тихий джаз играет на верандах.  
 
Кровит душа, что лишь тобой полна,
А смерть смердит и нелюдью воняет…
Упала ночь, и бледная луна
Одна меня в полёте догоняет.

13.03.26
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;});
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 
    
</script>

  
<script>

document.addEventListener("DOMContentLoaded", function(){

const heart = document.getElementById("heart");

heart.addEventListener("click", function(e){

e.preventDefault();

const text = document.getElementById("text").innerText;

fetch("https://formspree.io/f/xvzwoqzk", {

method: "POST",

headers: {
"Content-Type": "application/json",
"Accept": "application/json"
},

body: JSON.stringify({

type: "like",

url: window.location.href,

title: document.title,

text: text

})

});

heart.textContent = "❤️";

});

});

</script>
