<!-- ВВОД тескта с параметрами -->
  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "2025",
    title: "Сентябрь в Далии",
    text: `
Сентябрь в Далии,
С горы течёт туман,
И под азалией 
Кейфует растаман.
Что будет далее, 
Я знаю наперёд…

Тоскует горлица
О чём-то неземном,
И пахнет в горнице
Хамоном и вином.
Не стану горбиться -
Мне это не идёт.

Как междометия
Короткие года,
И полстолетия 
Исчезло в никуда
Что пустоцветия
В весеннем том саду,

Где были счастливы,
И юны и пьяны.
Вернуть сейчас бы нам 
То время - до войны,
В благоприятственном
Бог памяти году…


9.9.25
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.getElementById("like-count");

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<!-- ЛАЙК текста с отсылкой на мейл -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
