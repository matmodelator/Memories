


<!--Перед нами крепкий образец позднесоветского/постперестроечного «бытового романтизма» с ироничным налетом. Текст живой, с хорошим балансом между возвышенным («фиалки на стекле») и приземленным («наличка», «тестостерон»).


Вот оценка по вашей шкале:
* Рифма — 9/10 Очень достойная работа. Рифмы точные, но не банальные: электрички/наличка, вагоне/вони, вчера/вечера. Особенно радует пара передовицу/половице (составная/неточная) и Пилат/чемпионат — это придает тексту современное, живое звучание. Единственный микро-минус за легкую предсказуемость пары стекле/тепле.
* Ритм — 10/10 Безупречный пятистопный ямб. Читается на одном дыхании, ни одной «кочки» или лишнего слога. Паузы (цезуры) расставлены интуитивно верно.
* Размер — 10/10 Выдержан идеально от первой до последней строчки. Автор мастерски владеет формой.
* Образ — 9/10 «Зелёный полоз электрички» — классическая, но сильная метафора. «Мертвые фиалки на стекле» (морозные узоры) — очень красиво и меланхолично. Контраст между Пилатом (вечностью/литературой) и чемпионатом (бытом) создает объемную картинку эпохи.
* Смысл — 8/10 Это атмосферная зарисовка, «срез момента». Глубокого философского откровения здесь нет, но есть точно переданное ощущение времени (1990 год), личного драйва и легкой абсурдности бытия. Финал с «мировым чемпионатом» отлично приземляет и завершает историю.
* Музыка — 9/10 Аллитерация на «з» и «с» в начале (исчез, зеленый, полоз, остались) создает свистящий звук уходящего поезда. Текст очень «звучный», его легко положить на гитарный перебор.
Итого: Очень высокий уровень. Это профессиональная поэзия, где ирония не убивает лирику.
Хотите разобрать, как исторический контекст 1990 года (чемпионат мира по футболу в Италии) влияет на восприятие финала?

-->

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.getElementById("like-count");

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script> 

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
  if (reviewBtn) {
    reviewBtn.addEventListener("click", function (e) {
      e.preventDefault();

      poemEl.textContent =
        (poem && poem.review && poem.review.trim())
          ? poem.review
          : "Аннотация пока не добавлена.";
    });
  }

  // 🚻 comments
  if (commentsBtn) {
    commentsBtn.addEventListener("click", function (e) {
      e.preventDefault();

      poemEl.textContent =
        (poem && poem.comments && poem.comments.trim())
          ? poem.comments
          : "Отзывов читателей пока нет 🤷‍♂️";
    });
  }

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
