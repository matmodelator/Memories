Неоклассицизмы
                       

1. Если время любить,
    Умирать, стало быть - 
                           не время.
Мне античный божок завещал свой колчан и стрелы.
Я взираю на пыльный кирпич финикийской стелы
Древним глазом еврея.

2. Суть вполне очевидна,
               осталось решить детали.
Если бесы во мне, надо просто сказать - изыди!
И смеётся над нами богиня любви Изида,
Обнажая свои гениталии.

3. Десять тысяч тревожных лун 
                за собой оставив, 
Я вкушаю напитков земных неземную прелесть.
На четвёртом десятке мне как бы слегка приелись
Размышленья о славе. 

4. Миром правит любовь,
               что само по себе неплохо.
Не отведав зерна, отделить ли его от плевел?
Мы разводим костры, превращая в золу и пепел
Златокудрую похоть.

5. Из классических догм
              уцелела одна лишь форма.
За две тысячи лет изменились отчасти цифры,
Но пропорции, словно сакральный шифр,
Остаются мерилом нормы.

6. Скороспелая кровь 
              беспокойного сына Леванта
Мне влагает в гортань торжествующий вопль каннибала.
И вступаю я в Рим триумфальной мечтой Ганибала
На хребтах боевых элефантов.

7. Видно, сдвинулся мир,
              только я устоял, как колосс, -
Точно крепкий атлант подпираю его плечами.
И когда ослабеют глаза от немой печали,
Пусть останется голос.
 

Москва, 26-29 мая 2003г.

          <textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

          <button type="submit">Отправить</button>

        </form>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

    if (reviewForm) {
      reviewForm.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      reviewForm.querySelectorAll("input, textarea, button, label").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      });
    }
  });
}
	

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
