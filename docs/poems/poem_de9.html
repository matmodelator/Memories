Великий день... Он влез на табурет
И дряблою рукой поправил китель.
Они стоят — верховный предводитель,
А рядом бравый генералитет.

Бредут по снегу верные войска:
Пехота, кони, танки из фанеры —
Чеканный шаг, гвардейские манеры
И белые перчатки у виска.

Текут ряды картонные полков,
И громыхают сталью по брусчатке
Огромные ракеты без взрывчатки
Да пушки без снарядов и замков.

Свершая вечный свой парадный круг,
Они идут торжественно и гордо,
И данный им на разграбленье город
Огнями окон вспыхивает вдруг.

Армады древних супертягачей
Ползут, как будто жёлтые улитки,
И на лице его — почти улыбка,
И кровь его бежит погорячей.

Он молча поправляет микрофон.
Он озирает армию из ложи.
На то, что будет ею он низложен,
Есть шанс всего один на миллион.

Притихла публика, и те, кто повзрослей, —
Усатые седые ветераны,
И молодые, — внемлют все тирану,
Который отмечает юбилей.

И он для речи открывает рот,
И падают слова, как будто гири…
Внизу застыл, готовый к харакири,
Когда-то им возлюбленный народ.

Аннотация от ИИ

Это мощное и мрачное стихотворение, которое представляет собой социально-политическую сатиру с элементами антиутопии, описывает парад, который превращается в жутковатый фарс. 
Вот краткий разбор по ключевым моментам: 

1. Центральный образ и контраст 
Главный прием здесь — гротеск. Автор сталкивает пафос «Великого дня» с подчеркнутой фальшью и дряхлостью: 
* Бутафория: «танки из фанеры», «ракеты без взрывчатки», «пушки без снарядов». Это подчеркивает пустоту и декоративность происходящего. Мощь армии — лишь видимость.
* Образ тирана: Он «влез на табурет», у него «дряблая рука». Это лишает правителя величия, делая его образ карикатурным, но при этом опасным. 

2. Сюжет и настроение 
Стихотворение пропитано чувством обреченности. 
* Город: Он не празднует, он отдан армии «на разграбление».
* Динамика: Движение войск сравнивается с «желтыми улитками», что создает тягучее, неприятное ощущение застоя.
* Финал: Речь тирана сравнивается с «гирями», которые давят на людей. Слово «харакири» в конце намекает на коллективное самоубийство нации, которая слепо следует за вождем. 

3. Метафоры и детали 
* «Картонные полки» — символ хрупкости и неискренности государственного строя.
* «Шанс один на миллион» — горькое признание автора в том, что система кажется незыблемой, несмотря на свою внутреннюю пустоту.
* «Возлюбленный народ» — горькая ирония. Любовь правителя к народу здесь оборачивается его уничтожением. 

4. Ритм и форма 
Написано пятистопным ямбом. Это придает стиху торжественное, маршевое звучание, которое вступает в жесткий резонанс с «фанерным» содержанием парада. 
Итог: Это стихотворение о диктатуре, которая держится на страхе и декорациях, и о трагедии народа, который замер в ожидании неминуемого ужасного финала..

<!-- Локальный счетчик лайков  -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.querySelector(".like-count");

  if (!heart || !count) return;

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {
    likes = parseInt(likes);
  }

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

  });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
