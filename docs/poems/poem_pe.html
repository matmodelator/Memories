<i>
Рыжий пёс
(Сергей Безик)


Рыжий пёс со рваным ухом
Брёл по улице пустой.
Он искал собачьим нюхом,
Где найти ему постой.

Отощав, от дней негожих,
Повидавший много пёс,
Не бросался на прохожих,
Он собой свободу нёс.

Изучив законы жизни,
Не с хозяйских добрых рук.
Он считал искусством- выжить,
Самой верной из наук...

Маленьким щенком весёлым,
Любопытный рыжий пёс,
Был любимцем: добрым, умным,
Беззаботно в доме рос.

Но уехало семейство,
Дом, покинув навсегда.
Не нашлось ему там места:
Стал бездомным в холода.

Он не мог понять – наивный,
Отчего и почему :
Мир казалось добрый, дивный,
Превратился в зло и тьму.

Дни текли, бежало время,
Год прошёл – тяжёлый год:
Голод, испытаний бремя,
Полупьяный злой народ .

Приходилось часто туго,
Мир чужой не принимал.
В сердце рвалась злая вьюга,
Не сдавался – выживал.

Он в мороз колючий лютый,
Согревался лишь одним,
Вспоминая дом уютный,
Что не стал его родным…

Рыжий пёс со рваным ухом,
Брёл куда- то не спеша.
Без забот, с порожним брюхом-
Беспризорная душа.

Вдруг чутьём своим собачьим,
Он почувствовал беду.
Крик взволнованный ребячий,
Страх нависший, суету.

Увидал вдали девчушку:
Лет пяти, в горошек бант,
Что бежала за игрушкой:
Быть беде ,- звенел набат.

По дороге на машине,
Мчался пьяный за рулём:
Дым от папирос в кабине,
И ему  всё нипочём.

Без раздумий под колёса,
Прыгнул ей бесстрашно пёс.
Телом, преградив угрозу-
Зверю в стали, смерть что нёс.

В страхе ахнула толпа:
Крик, удар : с лап сбит, бродяга.
Поднял голову  – жива ,
И покинул мир, бедняга…

Со спокойною душой,
Рыжий вниз смотрел счастливо.
С высоты, ещё чужой -
Облаком, что в небе плыло.

Тело сразу схоронили -
У дороги под ольхой.
Он дождался -«приютили»
Там нашёл себе покой…

Пёс людей простил конечно ,
За бездушие и зло.
Пусть живёт добро в нас вечно,
Даже если не везло!
27.03.2012
</i>

***

Пёсья рыжь
(пародия-фантасмагория)


Рыжий пёс со ухой рваной
Брёл по улице центральной.
Он искал себе нирваны
В этой жизни инфернальной.

Отощав от дней постылых,
На прохожих он не метил, 
Не хватало ему силы,
Чтоб сожрать прохожих этих.

Изучив законы джунглей
С философиею Ницше,
Он считал искусство - хуйли?!
Мне кого-то схавать лишь бы!..

В юности своей беззлобной
Любопытным рос, сметливым,
Балованным был и воблу
Запивал ирландским пивом.

Но семья по беспределу
Вдруг намылилась в Израиль…
Так, походу, прилетело
Псу изгнание из рая.

Он сказал: «не догоняю,
Отчего такая лажа?!»
Оказался наш хозяин 
Не отцом, а сукой даже!..

Дни текли, настало время -
Русский праздник Новийгод:
Ёлки-палки всюду, ребя,
И бухой в говно народ.
 
Фейерверки эти, пробки,
Ну и прочие подляны…
Он бродил по насту робко,
Точно пьяный по полянам.

Он в мороз лихой, колючий
Алкоголем согревался.
Этот дом ещё подлючий 
Ему часто вспоминался.

Рваный ух с собакой рыжей,
Брёл во тьме как гость незваный,
И башкой своей бесстыжей
Думал он, о чём незнамо.

Он чутьём своим собачьим
Всё, прям, чуял падла сразу.
Если дети, скажем, плачут,
Ну и прочую заразу.

Видит, чу! Вдали девчушка
Лет пяти, и бант игривый…
Побежала за игрушкой,
А за нею бантик прыгал.

По дороге шла машина
Натурально без водилы -
Кепка лишь одна в кабине
И с вином ещё бутыли.

Пес подумал безучастно,
Поведя нерваным ухом:
«Нехуй на проезжей части
За игрушкой бегать, сука!»

И спокойно наблюдал он,
Как взлетела будто фантик,
Та девчушка над кварталом,
А за ней попи́здил бантик.

Обойдя всё это сзади, 
Пёс еще подумал: «Точно!
Посижу часок в засаде,
Чтоб потом пошамать сочно!»

Суть той басни таковая -
В жизни всяко происходит…
Коль не ждёте вы трамвая,
Сам трамвай порой приходит.

Ну а коль вы не собака
И не глупое чего-нить,
Ваша цель ещё однако
Тот трамвай не проворонить.


02.03.2020

Аннотация от ИИ

Эта пародия-фантасмагория — блестящий пример того, как жанр пересмешника обнажает слабые места оригинала через абсурд. Если оригинал Сергея Безика — это «слезоточивая» история о добре, то ваш текст — это жесткий, циничный постмодернизм.
Вот разбор по ключевым моментам:

1. Смена вектора (Перевертыш)
Главная удача пародии — полная инверсия образа героя.
* В оригинале: Пёс — святой мученик, жертвующий собой ради человека.
* В пародии: Пёс — циничный мизантроп-ницшеанец, который запивает воблу пивом и хладнокровно ждет «добычу» в засаде. Это уничтожает излишнюю сентиментальность исходника.

2. Снижение лексики
Вы мастерски высмеиваете простые рифмы и штампы автора, заменяя их агрессивным сленгом и канцеляризмами:
* «Нирвана в жизни инфернальной» — отличная ирония над попытками придать глубокий смысл простым строчкам.
* «По беспределу намылилась в Израиль» — едкий комментарий на туманную причину отъезда хозяев в оригинале.
* «Попи́здил бантик» — финальный аккорд абсурда, превращающий трагедию в фарс.

3. Работа с формой
Пародия сохраняет ритмику оригинала (хорей), но делает её более «рваной» и живой за счет разговорных оборотов.
* Удачная находка: Рифма «ребя — Новийгод» высмеивает авторские попытки втиснуть неудобные слова в размер («народ — год» у Безика).

4. Философский финал
Вместо приторного «пусть живет добро», вы вводите абсурдистскую мораль про трамвай. Это отсылка к «Мастеру и Маргарите» (Берлиоз) и одновременно издевка над привычкой авторов заканчивать стихи нравоучениями.
Итог: Это качественная, «злая» пародия в духе Александра Иванова. Она берет техническую слабость оригинала (глагольные рифмы, банальный сюжет) и превращает их в инструмент черного юмора.
По 10-балльной шкале пародийного мастерства — это твердые 9/10. Особенно за «инфантильный бантик», который летит отдельно от девчушки.

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

 // 🔄 возврат к тексту
if (resetBtn) {
  resetBtn.addEventListener("click", function (e) {
    e.preventDefault();

    poemEl.innerHTML = poem.text;
  });
}

});
</script>
