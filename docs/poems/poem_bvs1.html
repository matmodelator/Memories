Аннотация от ИИ


Литературный разбор стихотворения «Всё плохо»
1. Тема и настроение
Стих — о переживании разрыва, одиночества и тоски по человеку, который эмоционально и физически недоступен.
Первая строка задаёт тон:

«Всё кончено. Твой статус: не в сети.» 

Это современная, почти бытовая деталь, но она работает как символ:
человек исчез — и в жизни, и в сети, и в душе.

Настроение — тягучее, меланхоличное, с постоянным движением внутрь себя.

2. Лирический герой
Герой:

потерян («Мне некуда и незачем идти»)

зациклен на любимой («Я имя твоё пробую на вкус»)

хранит её образы («Я фото твои знаю наизусть»)

хочет быть рядом, но не может («Понять тебя, а лучше бы обнять»)

боится потерять («Не думать вновь, что я тебя теряю»)

Он одновременно сильный в чувствах и слабый в ситуации.

3. Образы и символы
В стихе много нежных, интимных образов, которые создают атмосферу:

вкус имени — редкий, чувственный образ

несвятая Анна — сравнение с иконописным образом, но земным

лежать касаясь плечами — бытовая, но очень теплая деталь

горы за окном — символ расстояния, пути, недостижимости

Эти образы делают стих живым и визуальным.

4. Композиция
Стих состоит из четырёх строф, каждая — шаг в эмоциональном движении:

Разрыв и пустота  
«Всё кончено… Мне некуда идти…»

Воспоминания и тяга  
«Я имя твоё пробую на вкус…»

Желание утешить и быть рядом  
«Всю боль твою хочу сейчас унять…»

Надежда и страх потери  
«Не думать вновь, что я тебя теряю…»

Композиция плавная, логичная, с нарастающей интимностью.

5. Ритм и форма
Ритм — четырёхстопный ямб, местами свободный, но в целом ровный.
Рифма — перекрёстная, классическая, чистая.

Это делает стих песенным, легко читаемым вслух.

6. Язык и стиль
Стиль — современная любовная лирика:

простые слова

разговорные интонации

отсутствие пафоса

эмоциональная честность

Особенно сильны строки:

«Я имя твоё пробую на вкус»

«Ты смотришь с них, как несвятая Анна»

«И так лежать касаючись плечами»

«А видеть только горы за окном»

Они создают уникальный голос автора.

⭐ Итог
Стих — мягкий, искренний, очень личный.
Он держится на сочетании:

бытовых деталей

чувственных образов

страха потери

тихой надежды

Это делает его живым и запоминающимся.

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.querySelector(".like-count");

  if (!heart || !count) return;

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {
    likes = parseInt(likes);
  }

  count.textContent = likes;

  heart.addEventListener("click", function (e) {
    e.preventDefault();

    likes++;
    count.textContent = likes;

    localStorage.setItem(key, likes);

  });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.innerHTML = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 open-comments

	
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

// если сейчас уже показан текст стиха → переключаем full screen

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
