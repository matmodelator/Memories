Кляксы

    
Столько лет прошло… Но только всё помню.
Где же ты, мой друг, затерялся?
Что же ты мой друг не исполнил
Обещанья, которыми мне клялся?

Столько лет прошло, но только я вижу,
Как с дыханием великой реки споря,
Мы бросались в леденящую жижу,
Что несла нас бешено к морю.
 
Столько лет прошло, но только я знаю, 
Что прожили мы с тобой долго.
И пока я верю, что бог с нами,
Я смогу доплыть из Оки в Волгу.

Столько лет прошло, но только я плачу,
Словно в женский день развожу слякоть,
Ухожу в луга и глаза прячу,
Потому что нам не к лицу плакать.      

Столько лет прошло, но я нашёл точно
Это место, где я тебе клялся.
По бумаге кто-то разбросал точки… -
То ли слёзы мои, то ли просто кляксы.


Велегож. 1988 - 2000

Что особенно цепляет
Повтор «Столько лет прошло…» создаёт ритм воспоминания, будто человек снова и снова возвращается к одному и тому же месту внутри себя.

Образ реки — мощный. Он делает дружбу чем‑то природным, большим, чем просто человеческая связь.

Контраст между силой и уязвимостью: «нам не к лицу плакать», но слёзы всё равно есть — и они превращаются в «точки» на бумаге.

Финал очень точный: неясно, что это — слёзы или кляксы, и в этом вся правда о памяти.

<!-- Навигация по списку  -->  
<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const heart = document.getElementById("heart");
  const count = document.getElementById("like-count");

  let likes = parseInt(count.textContent);

  if (heart) {
    heart.addEventListener("click", function () {

      if (heart.classList.contains("liked")) {
        heart.classList.remove("liked");
        heart.textContent = "💟";
        likes--;
      } else {
        heart.classList.add("liked");
        heart.textContent = "💜";
        likes++;
      }

      count.textContent = likes;

    });
  }

});
</script>

<!-- ЛАЙК текста с отсылкой на мейл -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script> 

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена.";
  });
}

// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }
});
</script>
