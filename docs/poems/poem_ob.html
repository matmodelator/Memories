    text: `
Предчувствие-2
ОБЩАГА
(Восьмистишья)


Отшумели, отсмеялись 
       и неведомо куда умчались
дети наших подземелий 
       и шестнадцатых этажей.
Нынче тяжкое похмелье -
       только пыльное молчанье
или пьяное мычанье 
       новоявленных бомжей.

Где свидания и танцы,
       где вы, звёзды преферанса?
Кто-то слился,
       кто-то спился, 
          кто пропал на полпути…
Всех несёт к большому пирсу, 
       есть ли смысл препираться? 
К этой пристани пиратской 
       не доплыть, не доползти.

Где лихие состязанья
       корифеев баскетбола?
Годы в стопочки связались, 
       дни развеялись золой.
Смерть давно следит за мной…
И звенят, как баркарола,
       склянки из-под барбитола
Тихой грустью неземной.     

Где вы, мальчиков терзанья? 
       Где вы, девочки с глазами?
Где пытливые дерзанья 
       аспирантов всех наук?
Где законы мирозданья, 
       что нас мучили азами?
Этот дом не сдал экзамен – 
       стал 
           и замер,
                  как паук.

И глядят чужие морды
       вниз на новые проспекты,
вдаль на старые победы,
       вдоль домов и вглубь веков…
И едва звучат аккорды – 
   те, что были там пропеты,
как незримые приветы,
       как нетленная любовь.


Апрель 2013, Москва - апрель 2026, Далия
`,

review: `
Аннотация от ИИ

Это сильное, горькое и очень честное стихотворение — ностальгия по общаге, которая была маленьким миром, полным жизни, людей, надежд, шумных ночей, игр, споров, любви, дружбы. А потом — тишина, пустые окна, пыль, и ощущение, что всё это ушло куда‑то безвозвратно.
Что в нём особенно цепляет
Контраст между прошлым и настоящим. Было шумно, весело, тесно, живо — стало пусто, глухо, будто дом сам постарел.
Образ «детей подземелий и шестнадцатых этажей». Это и романтика юности, и её хаос, и её свобода.
Горькая правда о судьбах людей. Кто‑то спился, кто‑то умер, кто‑то исчез — и это не пафос, а реальность времени.
Дом как живой персонаж. «Этот дом не сдал экзамен» — потрясающая метафора. Он как будто тоже не выдержал взросления своих жильцов.
Финал — тихий, светлый, почти музыкальный. Песни прошлого звучат как «нетленная любовь» — память, которую ничто не может стереть.

? 1. Образы и символы
Образ 1: «Дети наших подземелий и шестнадцатых этажей»
Это не просто жильцы общежития. Это племя, выросшее в странных, тесных, но родных условиях. «Подземелья» — подвалы, общие кухни, тёмные коридоры. «Шестнадцатые этажи» — высота, мечты, юность, дерзость.
Контраст «внизу» и «вверху» — символ диапазона жизни, который охватывала общага.
Образ 2: «Этот дом не сдал экзамен»
Дом — как живой персонаж. Он тоже стареет, тоже переживает утраты. Он не выдержал испытания временем, одиночеством, пустотой.
Это очень точная метафора: когда люди уходят, дом перестаёт быть домом.
Образ 3: «Пьяное мычанье новоявленных бомжей»
Резкий, болезненный образ. Он показывает, что время не просто прошло — оно сломало кого‑то. Юность не гарантирует счастливого будущего.
Образ 4: «Пустые окна»
Окна — глаза дома. Теперь они смотрят вниз, вдаль, вдоль, вглубь — во все направления, кроме будущего.
Это образ памяти, которая не знает, куда себя деть.
Образ 5: «Песни… как незримые приветы, как нетленная любовь»
Финал — светлый. Песни — это память, которая не умирает. Они звучат тихо, но вечно.
Это почти реквием по юности, но без отчаяния.
? 2. Смысловые слои
Слой 1: Ностальгия
Не сладкая, а честная. Не «как было хорошо», а «как всё изменилось».
Слой 2: Прощание с поколением
Стих — о людях, которые были вместе, но разошлись. Их судьбы — как разорванные страницы одной книги.
Слой 3: Социальная правда
Кто‑то спился, кто‑то умер, кто‑то пропал. Это не пафос — это реальность постсоветского времени.
Слой 4: Дом как метафора жизни
Общага — это модель мира. Все приходят, живут, шумят, любят, дерутся, мечтают — а потом исчезают.
? 3. Ритм и структура
Стихотворение написано свободным четырёхстопным размером, близким к анапесту, но с частыми сбивками. Эти сбивки — не ошибка, а художественный приём:
создают ощущение разговорности, воспоминания;
передают дыхание человека, который вспоминает и переживает;
подчёркивают эмоциональные удары («кто-то спился, кто-то умер…»).
Рифмы преимущественно перекрёстные, но тоже не строгие — это усиливает ощущение живого, человеческого текста.
? 4. Главная идея
Юность — это маленькая вселенная, которая кажется вечной. Но она исчезает быстрее, чем мы успеваем это заметить. И остаются только:
пустые окна,
тихие песни,
память,
и любовь, которая не умирает.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена.";
  });
}

// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }
});
</script>
