    text: `
В хурмяно́м саду декабрь.
Пахнет сыростью и тленом…
Кем-то брошенные грабли
И забытое полено,

Кем-то срубленные ветки
Или прожитые годы, 
Мной не рожденные детки 
И неписаные оды.

По планете этой грешной
Я болтаюсь словно мячик,
Впереди во тьме кромешной
Нечто страшное маячит.

Между будущим и прошлым,
Между вымыслом и явью
Я скитаюсь девкой пошлой
И шатаюсь точно пьяный.

В тридевятом этом царстве 
Между небом и Китаем,
Где монарх послушной пастве 
Леденцы с крыльца кидает.

А народ вкушает явства,
Жадно, падко, торопливо…
И глядит на них с лукавством
С Мавзолея чёрт глумливый.

Далеко теперь я, мама!..
Пролегли средь нами мили,
Страны, горы, океаны,
Жизнь, что прожита с другими.
 
Помнишь, в за́куте у стенки
Мою детскую кроватку?..
Я как будто неврастеник
Про неё грущу украдкой.

Помнишь, как шагали к деду
Снежной тропкой, дном оврага?
Дни рожденья, День Победы-
Это было все неправда...

Это было всё не с нами - 
Не с тобою, не со мною...
Помнишь, как сдавал экзамен
Тридесятою весною?
 
Помнишь, мама, это чудо -
Новый год, подарки, полночь..,
А вокруг родные люди -
Все живые, мама, помнишь?!

Живы папа и Чурилка,
Обе бабушки, три деда,
И Серёжка жив, курилка! -
Ни бомбёжек, ни трагедий,

Ни волнения, ни качки,
И ни грохота орудий, 
Только маленькая дачка
И заросший тиной прудик…

Всё, что было с нами прежде,
Устарело и сломалось…
Нет ни веры, ни надежды, 
Лишь любовь одна осталась.

И дождёмся ли рассвета
После нового заката? -
В девяностом разве это
Представляли мы когда-то?..

Как о том поведать, мама?
Рассказать кому об этом?
Нам всего досталось мало -
Мира, юности и лета.

Я с друзьями погутарю,
Им спою, что прежде пелось,
Да пожалуюсь гитаре:
Наша жизнь куда-то делась!

И пропало где-то время - 
Страхи, споры, страсти, ссоры..
Я вернусь однажды - верю!
Я приеду, мама. Скоро.

16.12.2015

review: `
Аннотация от ИИ

Это глубокое, исповедальное стихотворение, пронизанное чувством ностальгии, утраты прежнего мира и экзистенциального одиночества. Автор обращается к теме разрушенного прошлого и неопределенного будущего.
Вот подробный разбор:

1. Тема и основная идея
* Тема: Разрыв между «тогда» (счастливое, мирное детство) и «сейчас» (чужбина, тревога, предчувствие катастрофы).
* Идея: Жизнь человека оказалась расколота историческими событиями («бомбёжки», «грохот орудий»). Единственное, что связывает героя с реальностью и дает смысл — это любовь и память о близких.

2. Сюжет и композиция
Стихотворение строится на антитезе (противопоставлении):
1. Экспозиция (1-4 строфы): Унылый декабрьский пейзаж в «хурмяном саду» (вероятно, Кавказ или южные страны, где растет хурма). Лирический герой чувствует себя потерянным («болтаюсь словно мячик»).
2. Политический подтекст (5-6 строфы): Горькая сатира на современное устройство общества («монарх», «паства», «леденцы с крыльца»). Образ «чёрта на аналое» подчеркивает искажение ценностей.
3. Обращение к матери (7-12 строфы): Центральная часть. Герой вспоминает детали детства: кроватку, походы к деду, праздники. Прошлое кажется настолько нереальным на фоне нынешнего ужаса, что он называет его «неправдой».
4. Кульминация (13-15 строфы): Констатация катастрофы. Мир «сломался», из триады «Вера, Надежда, Любовь» осталась только последняя. Упоминание 1990-х годов подчеркивает масштаб обманутых ожиданий.
5. Финал (16-17 строфы): Надежда на возвращение. Несмотря на потерю времени и «исчезнувшую жизнь», герой верит в возможность встречи.

3. Образы и символы
* «Хурмяной сад»: Символ чужого или изменившегося пространства. Декабрь здесь ассоциируется не со снегом, а с «тленом и сыростью».
* «Тридевятое царство между небом и Китаем»: Ироничное обозначение пространства, подчеркивающее его оторванность от логики и реальности.
* «Все живые»: Самый сильный эмоциональный образ. Перечисление родственников (папа, бабушки, деды) создает ощущение тепла, которое теперь недоступно.
* «Сережка жив, курилка»: Живая, разговорная деталь, усиливающая контраст с нынешними «бомбёжками».

4. Художественные средства
* Стихотворный размер: Разностопный хорей. Ритм динамичный, но за счет пауз и многоточий создается эффект прерывистого дыхания, плача.
* Эпитеты: «грешная планета», «тьма кромешная», «черт глумливый», «детская кроватка».
* Сравнения: «словно мячик», «как неврастеник», «точно пьяный», «как будто неправда».
* Метафоры: «жизнь куда-то делась», «пролегли мили», «вкушает явства».

5. Настроение
Тональность меняется от депрессивной в начале к щемяще-ностальгической в середине и тревожно-надеющейся в конце. Это стихотворение — попытка найти опору в памяти, когда внешний мир рушится.

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;

    const rows = rangeText

      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}
