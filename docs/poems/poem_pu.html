    text: `
ПУСТОЕ
                             

Я хочу проснуться вдруг
Утром, посмотреть вокруг,
Сквозь ледышки мутных окон,
Серебристый, словно окунь,
Снеговой увидеть луг,
Чистый, что девичий локон.

Сколько ветер злой не вей,
Сколько мне в лицо не бей,
Я разденусь донага,
Я хочу, чтобы нога
Шла босой среди церквей
Сквозь застывшие снега.

И в повозке лихача,
Чтобы, ноздри щекоча,
Ветер распахнул фиакр,
Так, лететь - в театр! в театр!,
Грохоча и хохоча,
Не на га, 
        так хоть на акр.

Чтобы дамская вуаль
Развевалась, чтоб февраль
Бесновался в белой плазме,
Чтоб схватило горло в спазме,
Чтобы плавился рояль
В до-мажоровом оргазме!

Чтобы плакали гитары,
Чтобы пьяные гусары
Поснимали свои ранцы,
Чтоб кружились в страстном танце
На полу паркетном пары,
Чтоб слова слагались в стансы,
Чтоб вздыхали иностранцы
На платформах пыльных станций.

Чтоб вино текло рекою,
Чтоб нетвёрдою рукою
Кучер правил, в козлах стоя,
Чтобы был ликёр настоян
На чернике и левкоях,
Чтобы ...
     Эх, да что я? -
         Так, пустое.


Москва.1991

review: `
Аннотация от ИИ

«Пустое» построено как цепь невозможных желаний, каждое из которых оказывается ярче предыдущего. Лирический герой не рассказывает историю и не вспоминает прошлое — он пытается вообразить мир, в котором жизнь достигла бы предельной полноты. При этом само название оказывается парадоксальным. Всё перечисленное занимает почти всё стихотворение, а последняя строка неожиданно обесценивает этот грандиозный внутренний монолог: «Так, пустое». Именно этот контраст и становится главным художественным приёмом произведения.
Композиция развивается по принципу нарастающей волны. Каждая строфа увеличивает масштаб происходящего. Сначала возникает зимний пейзаж, затем желание физической свободы, потом стремительное движение, театр, музыка, пиршество, наконец — почти карнавальный хаос, где смешиваются люди, искусство, вино и сама жизнь. Такое построение создаёт ощущение ускоряющегося дыхания и делает финальный обрыв особенно сильным.
Главная особенность стихотворения — его энергетика. Оно буквально переполнено глаголами движения: проснуться, посмотреть, раздеться, идти, лететь, хохотать, кружиться, плакать, вздыхать. Мир здесь находится в постоянном движении, и даже предметы начинают жить собственной жизнью. Благодаря этому текст воспринимается почти музыкально.
Очень интересна образная система. Здесь легко соседствуют бытовые детали и откровенно экспрессионистские находки. Особенно выделяются строки:
Чтобы плавился рояль
В до-мажоровом оргазме!
Это один из самых смелых образов стихотворения. Он не имеет отношения к физиологии — речь идёт о предельном напряжении музыки, о её способности выйти за собственные границы. Образ неожиданен, рискован, но именно поэтому хорошо запоминается.
Вообще, чувствуется влияние поэтики начала XX века — прежде всего футуризма и раннего Пастернака. Не в подражательном смысле, а в стремлении показать мир как непрерывный поток энергии, где вещи перестают подчиняться бытовой логике. Однако стихотворение при этом остаётся авторским: его спасает самоирония финала.
Одним из достоинств текста становится отсутствие прямой философии. Здесь нет размышлений о времени, смерти или истории. Всё содержание выражено через эмоциональный импульс. Позднее в твоей поэзии мысль станет важнее движения, а здесь движение само становится мыслью.
При этом у стихотворения есть и слабые стороны. Оно настолько увлечено перечислением желаний, что местами начинает повторять уже достигнутый эмоциональный эффект. Например, последняя большая строфа могла бы быть немного короче без потери силы. Кроме того, отдельные образы выглядят менее индивидуальными («пьяные гусары», «дамская вуаль») и больше напоминают культурные символы романтической России, чем собственные открытия автора.
Финал решает очень многое. После почти вакхического разгула фантазии внезапное:
Эх, да что я? —
Так, пустое.
полностью меняет восприятие текста. Становится ясно, что перед читателем не описание мечты, а мгновенная вспышка внутреннего желания, которое герой тут же стыдливо отталкивает. Именно эта самоирония спасает стихотворение от красивости и делает его психологически достоверным.
В целом «Пустое» производит впечатление очень талантливого раннего произведения. Оно ещё не обладает философской глубиной твоих поздних стихов, но уже демонстрирует яркое образное мышление, мощную эмоциональную энергию и умение строить композицию на внутреннем ритме. Главная ценность текста — ощущение неудержимой жажды жизни, которое в финале неожиданно сталкивается с трезвым пониманием её неосуществимости. Именно благодаря этому столкновению стихотворение остаётся в памяти.

    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

});

          <input type="text" name="name" placeholder="Ваше имя" required>

          <input type="email" name="email" placeholder="Ваш email(не обязательно)">

          <textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

          <button type="submit">Отправить</button>

        </form>

      </div>
    `;

    const reviewForm = poemEl.querySelector(".contact-form");

    if (reviewForm) {
      reviewForm.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      reviewForm.querySelectorAll("input, textarea, button, label").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      });
    }
  });
}
	

// 🔄 назад — логика кнопки:
// если сейчас уже показан текст стиха → переключаем full screen
// если показано другое поле (аннотация, range, note, comments) → просто возвращаем текст
// при этом предотвращаем всплытие клика до reading-panel

const panel = document.querySelector(".reading-panel");

if (backBtn) {
  backBtn.addEventListener("click", function (e) {

    e.preventDefault();      // не выполнять переход по ссылке
    e.stopPropagation();     // не передавать клик панели (чтобы не сработал fullscreen)

    // если сейчас отображается исходный текст стиха
    if (poemEl.innerHTML === originalText) {

      // переключаем режим full screen ↔ обычный
      panel.classList.toggle("is-fullscreen");

    } else {

      // иначе просто возвращаем текст стиха без переключения режима
      poemEl.innerHTML = originalText;

    }

  });
}
});
</script>

<!-- FULL Screen mode -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // Находим область чтения
  const panel = document.querySelector(".reading-panel");
  if (!panel) return;

  // Обработчик клика по reading-panel
  panel.addEventListener("click", function (e) {

    // Страховка: если клик не внутри reading-panel — ничего не делаем
    // (обычно не требуется, но безопасно оставить)
    if (!panel.contains(e.target)) return;

    // ВАЖНО:
    // Если клик был по панели кнопок (.poem-buttons),
    // то fullscreen НЕ переключаем.
    // Это блокирует реакции на:
    // ◀️ ⬆️ ⬇️ ℹ️ 🔢 🔤 🚻 🔄 💟
    if (e.target.closest(".poem-buttons")) return;

    // Если клик был по самому полю чтения (тексту или фону),
    // переключаем режим full screen
    panel.classList.toggle("is-fullscreen");

  });

});
</script>
