<!-- ВВОД тескта с параметрами -->
  <script>
document.addEventListener("DOMContentLoaded", function () {
  const poem = {
    author: "Игорь Хорош",
    year: "219",
    title: "В центре мира и на краю земли",
    text: `
В центре мира и на краю земли,
От великой империи зла вдали,
Будто старый корабль застряв в пыли,
Я сижу на песке, ожидая конца времён.
И вкушая из фляги мои сто грамм, 
Я влезаю в фейсбук или Инстаграм,
Чтоб проверить, не сдох ли пока тиран -
Ведь когда-нибудь все, говорят, умрём...

А покуда светило вершит свой круг
И пловцы соревнуются силой рук,
Утомлённые прелестями подруг,
Заводи-ка скорее джаз!
И богиню знакомую приобняв, 
Мы добавим с тобою чуть-чуть огня,
И оставшиеся нам ещё полдня
Станем пить настоящий шнапс.

А когда истечёт то, что нам дано,
И светило закончит свой круг дневной,
Буду я от тебя далеко давно -
Неизвестно когда и с кем.
Пусть клубится туманами Бабуган
И лежит словно спившийся бандюган,
Полуостров, упавший к чужим ногам,
Точно дохлый дельфин на песке.

22.05.2019
`
  };

  // title = первая непустая строка, если пусто
  if (!poem.title.trim()) {
    poem.title = poem.text.split("\n").find(l => l.trim())?.trim() || "";
  }

  // 1) НАХОДИМ <pre id="poem">, или создаём
  let pre = document.getElementById("poem");
  if (!pre) {
    const panel = document.querySelector(".reading-panel");
    if (!panel) {
      alert("Не найден .reading-panel (проверь класс в HTML)");
      return;
    }
    pre = document.createElement("pre");
    pre.id = "poem";
    pre.className = "poem-text";
    panel.appendChild(pre);
  }

  // 2) ВСТАВЛЯЕМ ТЕКСТ (в <pre> это будет “без изменений”)
  pre.textContent = poem.text;

  // 3) НИЖНЯЯ ПОДПИСЬ (С автором и БЕЗ)
  const meta = document.getElementById("meta");
 // if (meta) meta.textContent = `${poem.author} — ${poem.title} — ${poem.year}`;}); 
if (meta) meta.textContent = `${poem.title} — ${poem.year}`;
    
  // 4) Стили “поверх фона” + внизу
  meta.style.position = "fixed";
  meta.style.left = "0";
  meta.style.right = "0";
  meta.style.bottom = "10px";
  meta.style.textAlign = "center";
  meta.style.fontSize = "14px";
  meta.style.color = "brown";
  meta.style.opacity = "0.85";
  meta.style.zIndex = "9999";
  meta.style.pointerEvents = "none";
  meta.style.textShadow = "0 1px 2px rgba(0,0,0,0.7)";
 });
    
</script>

 <!-- ЛАЙК тескта с параметрами -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const heart = document.getElementById("heart");
  if (!heart) return;

  heart.addEventListener("click", async function (e) {
    e.preventDefault();
    e.stopPropagation();

    const targetUrl = heart.getAttribute("href");


    const formData = new FormData();
    formData.append("_subject", "Лайк с сайта Memories");
    formData.append("type", "like");
    formData.append("url", window.location.href);
    formData.append("text", document.getElementById("meta").textContent);

    try {
      await fetch("https://formspree.io/f/xvzwoqzk", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      heart.textContent = "💗";
    } catch (err) {
      heart.textContent = "⚠️";
    }

    setTimeout(function () {
      window.location.href = targetUrl;
    }, 1000);
  });
});
</script>
