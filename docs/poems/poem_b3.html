В центре мира и на краю земли,
От великой империи зла вдали,
Будто старый корабль застряв в пыли,
Я сижу на песке, ожидая конца времён.
И вкушая из фляги мои сто грамм, 
Я влезаю в фейсбук или Инстаграм,
Чтоб проверить, не сдох ли пока тиран -
Ведь когда-нибудь все, говорят, умрём...

А покуда светило вершит свой круг
И пловцы соревнуются силой рук,
Утомлённые прелестями подруг,
Заводи-ка скорее джаз!
И богиню знакомую приобняв, 
Мы добавим с тобою чуть-чуть огня,
И оставшиеся нам ещё полдня
Станем пить настоящий шнапс.

А когда истечёт то, что нам дано,
И светило закончит свой круг дневной,
Буду я от тебя далеко давно -
Неизвестно когда и с кем.
Пусть клубится туманами Бабуган
И лежит словно спившийся бандюган,
Полуостров, упавший к чужим ногам,
Точно дохлый дельфин на песке.

review: `
Аннотация от ИИ

1. Сюжет и контекст
Герой находится в добровольном или вынужденном изгнании («вдали от империи зла»). Он ощущает себя вне времени и пространства: одновременно «в центре мира» (внутренне) и «на краю земли» (географически). Это состояние затишья перед бурей или ожидания финала («ожидая конца времён»).
2. Ключевые образы
Старый корабль в пыли — символ заброшенности и ненужности. Корабль должен быть в воде, но он застрял, что подчеркивает стагнацию и невозможность двигаться дальше.
Фейсбук и Инстаграм — резкий контраст между вечностью («конец времён») и бытовой современностью. Соцсети здесь не для развлечения, а как единственный канал связи с враждебным прошлым («не сдох ли пока тиран»).
Бабуган и «спившийся бандюган» — Бабуган-яйла (горный массив в Крыму) олицетворяет покинутую родину. Сравнение с бандюганом и «дохлым дельфином» передает крайнюю степень горечи. Полуостров в глазах автора потерял былое величие и теперь выглядит жалким, «упавшим к чужим ногам».
3. Настроение и конфликт
В стихотворении два полюса:
Политический и экзистенциальный тупик: ожидание смерти тирана, размышления о гибели империи.
Гедонизм отчаяния: джаз, шнапс, объятия с «богиней». Герой пытается заглушить внутреннюю боль простыми радостями, понимая, что осталось «полдня» (метафора недолгого спокойствия).
4. Технические особенности
Ритм: Использован дольник (размер, близкий к разговорной речи), что создает эффект доверительной беседы или внутреннего монолога.
Рифмовка: Интересно сочетание точных рифм (земли/вдали/пыли) и более свободных, ассонансных.
Финал: Стихотворение заканчивается на низкой, трагической ноте. Образ «дохлого дельфина на песке» замыкает композицию — от корабля в пыли в начале до мёртвого тела в конце. Это символ окончательного разрыва и утраты дома.
Резюме: Это текст о «потерянном поколении» новой эпохи. Герой пытается сохранять достоинство (пить хороший шнапс, слушать джаз), но фоновое ощущение катастрофы и гибели родного края (Крыма) пропитывает каждую строчку.

  const key = "likes_" + location.pathname;

  // берём сохранённое или стартовое из HTML
  let likes = localStorage.getItem(key);

  if (likes === null) {
    likes = parseInt(count.textContent) || 0;
  } else {

  count.textContent = likes;

    likes++;

    localStorage.setItem(key, likes);

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
