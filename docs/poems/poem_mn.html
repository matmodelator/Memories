Мне кажется порой, что было счастье,
И дивный мир, разбившийся на  части, -
Осколки тают, жменю холодя.
В стране далёкой сбрендил подполковник,
И зеркало разбилось на балконе,
Где ты негромко плачешь, уходя.

За поворотом тихо плещет море.
Я всё ещё люблю, и это горе,
С которым остаёшься на один.

Уходит время, я поладить с ним не смог.
Идёт война. Кинжалы точат персы.
И свесив вниз седеющие пейсы,
Глядит на нас еврейский древний бог...

  review: `
Это стихотворение относится к той части твоей лирики, где личное переживание уже невозможно отделить от исторического времени. Здесь нет привычного разделения на «любовное» и «гражданское»: расставание, война, память, разрушенный мир и течение времени существуют одновременно, отражаясь друг в друге. Благодаря этому текст воспринимается не как отклик на конкретные события, а как размышление о человеческой жизни в эпоху исторического слома.
Композиция построена по принципу постоянного расширения масштаба. Первая строфа начинается почти интимно — с воспоминания о счастье, которое распалось «на части». Однако уже через несколько строк частная история оказывается связана с внешним миром: появляется «сбрендивший подполковник», разбитое зеркало, уход любимого человека. Личная трагедия перестаёт существовать сама по себе и становится частью общей катастрофы. Этот переход выполнен очень естественно и задаёт направление всему произведению.
Во второй строфе пространство заметно расширяется. Море, азовские степи, погибающие люди, слова на бумаге, дочерины картины — всё это существует одновременно. Особенно удачна строка:
«Слова пылятся даром на бумаге…»
Она точно выражает ощущение бессилия искусства перед происходящим. При этом стихотворение парадоксальным образом само опровергает эту мысль: именно слова становятся способом сохранить переживание. Возникает внутреннее напряжение между ощущением бесполезности поэзии и её реальной необходимостью.
Третья строфа поднимает произведение ещё на один уровень обобщения. Крым, война, «персы», древний Бог — это уже не только конкретные реалии 2022 года, но и попытка увидеть современность как продолжение многовековой истории. Особенно интересен финальный образ. Бог здесь не вмешивается в происходящее и не произносит никаких слов. Он лишь смотрит. Такое молчаливое присутствие оказывается значительно сильнее любого авторского вывода и оставляет читателя один на один с вопросами, на которые стихотворение сознательно не отвечает.
Одна из главных особенностей текста — его способность удерживать эмоциональное равновесие. Несмотря на тяжёлую тему, автор избегает публицистического пафоса и прямых обвинений. Даже самые трагические события передаются через отдельные детали: разбитое зеркало, жменю холодных осколков, пожелтевший холст, капающую сквозь пальцы жизнь. Благодаря этому стихотворение не превращается в политическое высказывание, а остаётся произведением о человеческой судьбе.
Очень сильна и система образов. Практически каждый предмет несёт символическую нагрузку. Разбитое зеркало становится образом разрушенного мира, море — символом неизменности природы, пожелтевший холст — уходящего времени, а осколки счастья, холодящие ладонь, соединяют физическое ощущение с внутренней болью. При этом символика не выглядит искусственной: все образы рождаются из конкретной жизненной ситуации.
Если говорить о возможном резерве произведения, то он связан не с художественным уровнем, а с восприятием отдельных исторических деталей. Такие строки, как «сбрендил подполковник» или «кинжалы точат персы», очень точно работают в контексте времени написания, однако одновременно сильнее привязывают текст к конкретному историческому моменту. Для современного читателя это усиливает эмоциональный эффект, но через десятилетия часть этих аллюзий может потребовать дополнительного культурного контекста.
В целом это одно из наиболее зрелых произведений. Его сила заключается в том, что оно не противопоставляет личную боль исторической трагедии, а показывает их как проявления одного и того же процесса — разрушения привычного мира. Именно поэтому стихотворение воспринимается не как хроника событий, а как философское размышление о памяти, любви, времени и человеческом бессилии перед ходом истории. Финал с молчащим древним Богом превращает частную историю в универсальную притчу и оставляет сильное, долго не исчезающее послевкусие.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

<!-- Аннотации -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
