    text: `
Я ступал будто Ной
В тёмно-серые воды Севана,
Запивая суджу́к
Коньяком с голубой дондурмо́й.
И летел надо мной
Абрикосовый шум Еревана,
А носатый сельджу́к
Угощал меня спелой хурмой.

Дни бежали гурьбой,
Нескончаемым сладостным дивом.
Мне казалось, вот-вот
Я жар-птицу поймаю рукой.
Мы лежали с тобой,
Утомлённые солнцем и пивом,
И тринадцатый год
Начинался как всякий другой…

Стоязыкой молвой
В Эрзуруме галдели чайха́ны,
Да библейские сны
Наполнялись дурманом отрав -  
Золотой пахлавой,
Запечённым на гриле ишха́ном,
И последней весны
Опьяняющим запахом трав. 

Вдруг задули ветра, 
Что свинцовые тучи нагнали,
Выпал снег в сентябре
Там, где раньше не шёл никогда.
И как дождь из ведра,
Реки крови проли́лись над нами,
И закат в серебре
Под горою угас на года.

Увядали цветы,
Холодели лицом ереванки,
А в далёких лесах
Хохотал и паясничал гном.
Но портреты святых
Мироточили в каменных ва́нках,
Расплываясь в слезах
Карабахским инжирным вином.
 
Всё, казалось, - пустяк…
Только время строчило кинжально.
Перекрёстным огнём 
Оно с флангов косило ряды.
Четверть века спустя 
Я стою у разбитых скрижалей
Ослепительным днём 
У отрогов Кавказской гряды. 

И мне чудятся вновь
Эти волны в мурашках простуды,
Где застыл Арарат
За окном, словно призрак двойной,
Что дымится как плов
В керамической курдской посуде,
Обожжённый сто крат
Нескончаемой подлой войной.


16.06.26

  review: `
Это уже не просто лирическое воспоминание. Здесь работает сразу несколько пластов: личная память, утраченный рай, армянская культурная география и катастрофа, которая постепенно превращает конкретную историю в миф.

Сильнее всего в тексте работает контраст между первой и второй половиной.

В начале — почти чувственный каталог счастья:

Севан
суджук
коньяк
голубая дондурма
абрикосовый шум Еревана
хурма
ишхан
пахлава

Все ощущения материальны: вкус, запах, солнце, пиво, травы. Мир существует через тело.

Потом происходит перелом:

Вдруг задули ветра,
Что свинцовые тучи нагнали.

И дальше текст уже не о путешествии и любви, а о времени и войне.

Особенно удачна строфа:

Всё, казалось, — пустяк...
Только время строчило кинжально.
Перекрёстным огнём
Оно с флангов косило ряды.

Время здесь действует как пулемётчик. Не война убивает людей — время добивает всё, что война не успела уничтожить.

Из наиболее сильных образов:

«абрикосовый шум Еревана» — почти готовая поэтическая формула;
«реки крови пролились над нами» — образ традиционный, но здесь работает благодаря контрасту с прежней идиллией;
«портреты святых мироточили... карабахским инжирным вином» — очень сильная и одновременно тревожная метафора;
«разбитые скрижали» — переводит частную трагедию в библейский масштаб;
финальный Арарат-призрак.

Последняя строфа вообще одна из лучших:

И мне чудятся вновь
Эти волны в мурашках простуды,
Где застыл Арарат
За окном, будто призрак двойной...

Здесь уже нет публицистики. Только память и боль.

Есть несколько мест, которые можно обсуждать.

1. «носатый сельджук»

Технически ярко и запоминается сразу.

Но слово «сельджук» выбивается из общего регистра. До этого всё выглядит как личное воспоминание, а здесь появляется почти былинный персонаж.

Если это намеренная стилизация — работает. Если нет, именно здесь читатель может споткнуться.

2. «хохотал и гримасничал гном»

Это самый загадочный образ текста.

Он нарочито инороден.

Читатель сразу задаётся вопросом:

кто этот гном?
политик?
аллегория?
сказочное зло?

Неясность сама по себе не недостаток, но образ настолько конкретен, что требует расшифровки или принятия как символа.

3. Финальное сравнение

Что дымится как плов
В керамической курдской посуде

Образ необычный, но чуть менее мощный, чем весь предыдущий подъём к Арарату.

До него идёт почти библейская высота:

Арарат;
призрак;
война;
память.

А потом внезапно бытовая деталь про плов и посуду.

Некоторым читателям это понравится именно своей земной фактурностью, другим покажется небольшим снижением регистра.

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const prev = document.getElementById("prev-poem");
  const next = document.getElementById("next-poem");

  if (!prev || !next) return;

  try {
    const current = location.pathname.split("/").pop();

    const response = await fetch("/Memories/poems.html");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const links = [...doc.querySelectorAll("a[href$='.html']")];
    const files = links.map(a => a.getAttribute("href"));
    const names = files.map(href => href.split("/").pop());

    const index = names.indexOf(current);

    if (index !== -1) {
      if (files[index - 1]) {
        prev.href = new URL(files[index - 1], location.origin + "/Memories/").href;
      }

      if (files[index + 1]) {
        next.href = new URL(files[index + 1], location.origin + "/Memories/").href;
      }
    }

  } catch (e) {}
});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {

  const poemEl = document.getElementById("poem");
  if (!poemEl) return;

  const reviewBtn = document.getElementById("open-review");
  const commentsBtn = document.getElementById("open-comments");
  const rangeBtn = document.getElementById("open-range");
  const noteBtn = document.getElementById("open-note");  
  const backBtn = document.getElementById("back-to-poem");

  // 🔒 используем уже существующий poem.text (ничего не переинициализируем)
  const originalText = (typeof poem !== "undefined" && poem.text)
    ? poem.text
    : poemEl.textContent;

  // ℹ️ review
if (reviewBtn) {
  reviewBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const reviewText = poem.review ? poem.review.trim() : "";

    poemEl.textContent = reviewText || "Аннотация пока не добавлена";
  });
}

// 🔢 range
if (rangeBtn) {
  rangeBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const rangeText = poem.range ? poem.range.trim() : "";

    if (!rangeText) {
      poemEl.textContent = "Я всё жду, когда его оценят по достоинству";
      return;
    }

    const rows = rangeText
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    let html = '<table class="range-table">';

    rows.forEach((row, index) => {
      const cols = row.split("|").map(col => col.trim());

      html += "<tr>";

      cols.forEach(col => {
        if (index === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    poemEl.innerHTML = html;
  });
}

// 🔤 note
if (noteBtn) {
  noteBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const noteText = poem.note ? poem.note.trim() : "";

    poemEl.textContent = noteText || "Автор пока не прокомментировал";
  });
}
  
// 🚻 comments
if (commentsBtn) {
  commentsBtn.addEventListener("click", function (e) {
    e.preventDefault();

    const commentsText = String(poem.comments || "").trim();

    if (commentsText !== "") {
      poemEl.textContent = commentsText;
    } else {
      poemEl.textContent = "Отзывов читателей пока нет 🤷‍♂️";
    }
  });
}

  // 🔄 назад
  if (backBtn) {
    backBtn.addEventListener("click", function (e) {
      e.preventDefault();
      poemEl.textContent = originalText;
    });
  }

});
</script>
