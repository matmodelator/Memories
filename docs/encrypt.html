<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encrypt text</title>
</head>
<body>

  <textarea id="text" rows="14" cols="80" placeholder="Текст стиха"></textarea>
  <br><br>

  <button id="run">Зашифровать</button>

  <pre id="out"></pre>

  <script>
    const CONTENT_KEY = "fixed-content-key-2026-memories";

    function bytesToBase64(bytes) {
      let bin = "";
      for (let i = 0; i < bytes.length; i++) {
        bin += String.fromCharCode(bytes[i]);
      }
      return btoa(bin);
    }

    async function deriveKey(password, saltBytes) {
      const enc = new TextEncoder();

      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: 250000,
          hash: "SHA-256"
        },
        keyMaterial,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["encrypt"]
      );
    }

    document.getElementById("run").addEventListener("click", async function () {
      const text = document.getElementById("text").value;

      const enc = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));

      const key = await deriveKey(CONTENT_KEY, salt);

      const encrypted = await crypto.subtle.encrypt(
        {
          name: "AES-GCM",
          iv: iv
        },
        key,
        enc.encode(text)
      );

      const result = {
        salt: bytesToBase64(salt),
        iv: bytesToBase64(iv),
        data: bytesToBase64(new Uint8Array(encrypted))
      };

      document.getElementById("out").textContent =
        JSON.stringify(result, null, 2);
    });
  </script>

</body>
</html>
