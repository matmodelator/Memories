  <section class="reading-panel" aria-label="Текст стихотворения">
    
<h2>Обратная связь</h2>

<p>
Если вы хотите связаться со мной, заполните форму ниже.
</p>

<form class="contact-form" action="https://formspree.io/f/xvzwoqzk" method="POST">

<input type="hidden" name="_subject" value="Сообщение с сайта Memories">

<input type="text" name="name" placeholder="Ваше имя" required>

<input type="email" name="email" placeholder="Ваш email" required>

<textarea name="message" rows="7" placeholder="Ваше сообщение" required></textarea>

<button type="submit">Отправить</button>

</form>
  </section>

<script>
document.addEventListener("click", function(e) {
    const readingPanel = document.querySelector(".reading-panel");
    const nav = document.querySelector(".main-nav");

    if (!readingPanel.contains(e.target) && !nav.contains(e.target)) {
        window.location.href = "../index.html";
    }
});
</script>
