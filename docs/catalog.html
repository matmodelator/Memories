<!DOCTYPE html>

<!--
catalog.html
version: v1.0.3
date: 2026-04-21
-->

<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Каталог Memories</title>

<style>

/*
========================================
БАЗОВЫЕ СТИЛИ
========================================
*/

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

header {
  background: #2563eb;
  color: white;
  padding: 16px;
  text-align: center;
}

.container {
  max-width: 980px;
  margin: 24px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.status {
  margin: 16px 0;
  padding: 12px 14px;
  border-radius: 8px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
}

.status.good {
  background: #f0fdf4;
  border-color: #bbf7d0;
}

.status.bad {
  background: #fef2f2;
  border-color: #fecaca;
}

.log {
  margin-top: 20px;
  background: #0f172a;
  color: #dbeafe;
  padding: 14px;
  border-radius: 8px;
  height: 380px;
  overflow: auto;
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}

</style>

</head>

<body>

<header>

<h1>
Каталог Memories
</h1>

</header>

<div class="container">

<button onclick="buildCatalog()">

Собрать catalog.json

</button>

<div id="status"
     class="status">

Готов

</div>

<div id="log"
     class="log">

</div>

</div>

<script>

/*
========================================
ЧТЕНИЕ ВЕРСИИ ИЗ КОММЕНТАРИЯ
========================================
*/

function getVersionFromComment() {

  const html =
    document.documentElement.outerHTML

  const match =
    html.match(
      /version:\s*([^\n\r]+)/i
    )

  if (match)
    return match[1].trim()

  return "unknown"

}

const FILE_VERSION =
  getVersionFromComment()

/*
========================================
ГЛОБАЛЬНЫЕ
========================================
*/

let CATALOG = []

const logBox =
  document.getElementById("log")

const statusBox =
  document.getElementById("status")

/*
========================================
ЛОГ
========================================
*/

function log(text) {

  logBox.textContent +=
    text + "\n"

  logBox.scrollTop =
    logBox.scrollHeight

}

/*
========================================
СТАТУС
========================================
*/

function setStatus(text, error = false) {

  statusBox.textContent =
    text

  if (error)
    statusBox.className =
      "status bad"
  else
    statusBox.className =
      "status good"

}

/*
========================================
ОЧИСТКА
========================================
*/

function clean(value) {

  return String(value || "")
    .replace(/\r/g, "")
    .replace(/\n/g, " ")
    .replace(/\s+/g, " ")
    .trim()

}

/*
========================================
РАЗДЕЛ
========================================
*/

function detectSection(file) {

  if (file.includes("poems/"))
    return "poems"

  if (file.includes("songs/"))
    return "songs"

  if (file.includes("stories/"))
    return "stories"

  return ""

}

/*
========================================
TAGS
========================================
*/

function extractTags(resume) {

  if (!resume)
    return []

  return resume
    .toLowerCase()
    .replace(/[.,:;!?]/g, " ")
    .split(/\s+/)
    .filter(Boolean)

}

/*
========================================
FETCH HTML
========================================
*/

async function fetchHtml(path) {

  log(
    "Открываю: " +
    path
  )

  const res =
    await fetch(path)

  if (!res.ok)
    throw new Error(
      "Не удалось открыть: " +
      path
    )

  return await res.text()

}

/*
========================================
СПИСОК ФАЙЛОВ
========================================
*/

async function getFilesFromPage(page) {

  try {

    const html =
      await fetchHtml(page)

    const doc =
      new DOMParser()
        .parseFromString(
          html,
          "text/html"
        )

    const links =
      Array.from(
        doc.querySelectorAll("a[href]")
      )

    const hrefs =
      links
        .map(a =>
          a.getAttribute("href")
        )
        .filter(Boolean)

    log(
      "Страница: " +
      page
    )

    log(
      "Всего ссылок: " +
      hrefs.length
    )

    const files =
      hrefs.filter(href =>

        href.includes("poem_")
        ||
        href.includes("song_")
        ||
        href.includes("story_")

      )

    log(
      "Подходящих файлов: " +
      files.length
    )

    return files

  }

  catch {

    log(
      "Ошибка страницы: " +
      page
    )

    return []

  }

}

/*
========================================
ПОИСК window.poem
========================================
*/

function extractPoemMeta(source, file) {

  const start =
    source.indexOf("window.poem")

  if (start === -1) {

    log(
      "window.poem не найден: " +
      file
    )

    return null

  }

  const titleMatch =
    source.match(
      /title\s*:\s*["'`](.*?)["'`]/s
    )

  const resumeMatch =
    source.match(
      /resume\s*:\s*["'`](.*?)["'`]/s
    )

  const title =
    titleMatch
      ? clean(titleMatch[1])
      : ""

  const resume =
    resumeMatch
      ? clean(resumeMatch[1])
      : ""

  return {

    title,
    resume

  }

}

/*
========================================
BUILD
========================================
*/

async function buildCatalog() {

  try {

    logBox.textContent = ""

    log(
      "Версия файла: " +
      FILE_VERSION
    )

    setStatus(
      "Сборка каталога..."
    )

    const pages = [

      "poems.html",
      "songs.html",
      "stories.html"

    ]

    let files = []

    for (const page of pages) {

      const list =
        await getFilesFromPage(page)

      files =
        files.concat(list)

    }

    files =
      Array.from(
        new Set(files)
      )

    log(
      "Всего файлов: " +
      files.length
    )

    CATALOG = []

    for (const file of files) {

      try {

        const source =
          await fetchHtml(file)

        const meta =
          extractPoemMeta(
            source,
            file
          )

        if (!meta)
          continue

        CATALOG.push({

          title:
            meta.title
            || file,

          file:
            file,

          section:
            detectSection(file),

          tags:
            extractTags(
              meta.resume
            )

        })

        log(
          "Добавлен: " +
          meta.title
        )

      }

      catch {

        log(
          "Ошибка файла: " +
          file
        )

      }

    }

    log(
      "Итоговых записей: " +
      CATALOG.length
    )

    if (!CATALOG.length)
      throw new Error(
        "Каталог пуст"
      )

    downloadJson(
      CATALOG
    )

    setStatus(
      "Готово: " +
      CATALOG.length
    )

  }

  catch (e) {

    setStatus(
      "Ошибка: " +
      e.message,
      true
    )

  }

}

/*
========================================
DOWNLOAD JSON
========================================
*/

function downloadJson(data) {

  const blob =
    new Blob(

      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],

      {
        type:
          "application/json"
      }

    )

  const url =
    URL.createObjectURL(
      blob
    )

  const a =
    document.createElement("a")

  a.href =
    url

  a.download =
    "catalog.json"

  a.click()

}

log(
  "Версия файла: " +
  FILE_VERSION
)

log(
  "catalog.html загружен"
)

</script>

</body>
</html>
