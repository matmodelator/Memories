<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">
<title>Каталог Memories</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

header {
  background: #2563eb;
  color: white;
  padding: 16px;
  text-align: center;
}

.container {
  max-width: 820px;
  margin: 30px auto;
  background: white;
  padding: 24px;
  border-radius: 10px;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.log {
  margin-top: 20px;
  background: #0f172a;
  color: #dbeafe;
  padding: 14px;
  border-radius: 8px;
  height: 300px;
  overflow: auto;
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
<h1>Каталог Memories</h1>
</header>

<div class="container">

<button onclick="buildCatalog()">
Собрать catalog.json
</button>

<div id="log" class="log"></div>

</div>

<script>

const logBox =
  document.getElementById("log")

function log(text) {
  logBox.textContent +=
    text + "\n"
}

function clean(text) {
  return String(text || "")
    .replace(/\s+/g, " ")
    .trim()
}

async function fetchHtml(path) {

  log("Открываю: " + path)

  const res =
    await fetch(path)

  return await res.text()

}

async function getPoemFiles() {

  const html =
    await fetchHtml("poems.html")

  const doc =
    new DOMParser()
      .parseFromString(html, "text/html")

  const links =
    Array.from(
      doc.querySelectorAll("a[href]")
    )

  const files =
    links
      .map(a =>
        a.getAttribute("href")
      )
      .filter(href =>
        /poems\/poem_.*\.html/i
          .test(href)
      )

  log("Найдено файлов: " + files.length)

  return files

}

function extractPoem(html) {

  const doc =
    new DOMParser()
      .parseFromString(html, "text/html")

  const scripts =
    doc.querySelectorAll("script")

  for (const s of scripts) {

    const code =
      s.textContent

    if (
      !code.includes("window.poem")
    )
      continue

    try {

      const poem =
        new Function(
          `
          let window = {};
          ${code}
          return window.poem;
          `
        )()

      if (poem)
        return poem

    }

    catch {}

  }

  return null

}

async function buildCatalog() {

  logBox.textContent = ""

  const files =
    await getPoemFiles()

  const catalog = []

  for (const file of files) {

    const html =
      await fetchHtml(file)

    const poem =
      extractPoem(html)

    if (!poem)
      continue

    catalog.push({

      title:
        clean(poem.title),

      author:
        clean(poem.author),

      year:
        clean(poem.year),

      style:
        clean(poem.style),

      file:
        file,

      resume:
        clean(poem.resume),

      tags:
        poem.tags || []

    })

    log("Добавлен: " +
        poem.title)

  }

  downloadJson(catalog)

}

function downloadJson(data) {

  const blob =
    new Blob(
      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],
      {
        type:
        "application/json"
      }
    )

  const url =
    URL.createObjectURL(blob)

  const a =
    document.createElement("a")

  a.href =
    url

  a.download =
    "catalog.json"

  a.click()

}

</script>

</body>
</html>
