<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">
<title>Каталог Memories</title>

<style>

/*
========================================
БАЗОВЫЕ СТИЛИ
========================================
*/

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

header {
  background: #2563eb;
  color: white;
  padding: 16px;
  text-align: center;
}

.container {
  max-width: 980px;
  margin: 24px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.status {
  margin: 16px 0;
  padding: 12px 14px;
  border-radius: 8px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
}

.status.good {
  background: #f0fdf4;
  border-color: #bbf7d0;
}

.status.bad {
  background: #fef2f2;
  border-color: #fecaca;
}

.log {
  margin-top: 20px;
  background: #0f172a;
  color: #dbeafe;
  padding: 14px;
  border-radius: 8px;
  height: 360px;
  overflow: auto;
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}

</style>
</head>

<body>

<header>
<h1>Каталог Memories</h1>
</header>

<div class="container">

<button onclick="buildCatalog()">
Собрать catalog.json
</button>

<div id="status" class="status">
Готов
</div>

<div id="log" class="log"></div>

</div>

<script>

/*
========================================
ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
========================================
*/

let CATALOG = []

const logBox =
  document.getElementById("log")

const statusBox =
  document.getElementById("status")

/*
========================================
ЛОГ
========================================
*/

function log(text) {

  logBox.textContent +=
    text + "\n"

  logBox.scrollTop =
    logBox.scrollHeight

}

/*
========================================
СТАТУС
========================================
*/

function setStatus(text, error = false) {

  statusBox.textContent = text

  if (error)
    statusBox.className =
      "status bad"
  else
    statusBox.className =
      "status good"

}

/*
========================================
ОЧИСТКА ТЕКСТА
========================================
*/

function clean(value) {

  return String(value || "")
    .replace(/\r/g, "")
    .replace(/\n/g, " ")
    .replace(/\s+/g, " ")
    .trim()

}

/*
========================================
ОПРЕДЕЛЕНИЕ РАЗДЕЛА
========================================
*/

function detectSection(file) {

  if (file.includes("poems/"))
    return "poems"

  if (file.includes("songs/"))
    return "songs"

  if (file.includes("stories/"))
    return "stories"

  return ""

}

/*
========================================
ПОЛУЧЕНИЕ TAGS ИЗ RESUME
========================================
*/

function extractTags(resume) {

  if (!resume)
    return []

  return resume
    .toLowerCase()
    .replace(/[.,:;!?—–]/g, " ")
    .split(/\s+/)
    .filter(Boolean)

}

/*
========================================
ЧТЕНИЕ HTML
========================================
*/

async function fetchHtml(path) {

  log("Открываю: " + path)

  const res =
    await fetch(path)

  if (!res.ok)
    throw new Error(
      "Не удалось открыть: " + path
    )

  return await res.text()

}

/*
========================================
ПОЛУЧЕНИЕ СПИСКА ФАЙЛОВ
========================================
*/

async function getFilesFromPage(page) {

  try {

    const html =
      await fetchHtml(page)

    const doc =
      new DOMParser()
        .parseFromString(
          html,
          "text/html"
        )

    const links =
      Array.from(
        doc.querySelectorAll("a[href]")
      )

    const hrefs =
      links
        .map(a =>
          (a.getAttribute("href") || "").trim()
        )
        .filter(Boolean)

    log("Страница: " + page)
    log("Всего ссылок: " + hrefs.length)

    const files =
      hrefs.filter(href =>

        href.includes("poem_")
        ||
        href.includes("song_")
        ||
        href.includes("story_")

      )

    log("Подходящих файлов: " + files.length)

    return files

  }

  catch {

    log(
      "Не удалось открыть страницу: " +
      page
    )

    return []

  }

}

/*
========================================
ИЗВЛЕЧЕНИЕ window.poem
========================================
*/

function extractPoem(html, file) {

  const doc =
    new DOMParser()
      .parseFromString(
        html,
        "text/html"
      )

  const scripts =
    Array.from(
      doc.querySelectorAll("script")
    )

  log(
    "Скриптов в " +
    file +
    ": " +
    scripts.length
  )

  for (const s of scripts) {

    const code =
      s.textContent || ""

    if (
      !code.includes("window.poem")
      &&
      !code.includes("author:")
      &&
      !code.includes("title:")
    ) {
      continue
    }

    try {

      const poem =
        new Function(`
          let window = {};
          let poem = null;

          let document = {
            addEventListener: function(event, callback) {
              if (event === "DOMContentLoaded" && typeof callback === "function") {
                callback();
              }
            }
          };

          ${code}

          return window.poem || poem || null;
        `)()

      if (poem) {

        log(
          "Найден poem: " +
          file
        )

        return poem

      }

    }

    catch (e) {

      log(
        "Ошибка разбора: " +
        file +
        " | " +
        e.message
      )

    }

  }

  log(
    "poem не найден: " +
    file
  )

  return null

}
/*
========================================
СБОРКА КАТАЛОГА
========================================
*/

async function buildCatalog() {

  try {

    logBox.textContent = ""

    setStatus(
      "Сборка каталога..."
    )

    const pages = [

      "poems.html",
      "songs.html",
      "stories.html"

    ]

    let files = []

    /*
    ========================================
    ЧИТАЕМ ВСЕ СПИСКИ
    ========================================
    */

    for (const page of pages) {

      const list =
        await getFilesFromPage(page)

      files =
        files.concat(list)

    }

    /*
    ========================================
    УБИРАЕМ ДУБЛИКАТЫ
    ========================================
    */

    files =
      Array.from(
        new Set(files)
      )

    log(
      "Всего файлов: " +
      files.length
    )

    CATALOG = []

    /*
    ========================================
    ЧИТАЕМ КАЖДЫЙ ФАЙЛ
    ========================================
    */

    for (const file of files) {

      try {

        const html =
          await fetchHtml(file)

        const poem =
          extractPoem(
            html,
            file
          )

        if (!poem)
          continue

        CATALOG.push({

          title:
            clean(
              poem.title
            ),

          file:
            file,

          section:
            detectSection(
              file
            ),

          tags:
            extractTags(
              poem.resume
            )

        })

        log(
          "Добавлен: " +
          poem.title
        )

      }

      catch {

        log(
          "Ошибка файла: " +
          file
        )

      }

    }

    log(
      "Итоговых записей: " +
      CATALOG.length
    )

    if (!CATALOG.length)
      throw new Error(
        "Каталог пуст"
      )

    /*
    ========================================
    СОХРАНЕНИЕ
    ========================================
    */

    downloadJson(
      CATALOG
    )

    setStatus(
      "Готово. Записей: " +
      CATALOG.length
    )

  }

  catch (e) {

    setStatus(
      "Ошибка: " +
      e.message,
      true
    )

  }

}

/*
========================================
СОХРАНЕНИЕ JSON
========================================
*/

function downloadJson(data) {

  const blob =
    new Blob(
      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],
      {
        type:
          "application/json"
      }
    )

  const url =
    URL.createObjectURL(
      blob
    )

  const a =
    document.createElement("a")

  a.href =
    url

  a.download =
    "catalog.json"

  a.click()

}

</script>

</body>
</html>
