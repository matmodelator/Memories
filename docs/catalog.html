<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!-- Адаптация под мобильные -->
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Каталог Memories</title>

<style>

/*
========================================
БАЗОВЫЕ СТИЛИ СТРАНИЦЫ
========================================
*/

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  color: #222;
}

header {
  background: #2563eb;
  color: white;
  padding: 16px;
  text-align: center;
}

.container {
  max-width: 980px;
  margin: 24px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
  box-sizing: border-box;
}

/*
========================================
КНОПКА
========================================
*/

button {
  padding: 12px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/*
========================================
СТАТУС
========================================
*/

.status {
  margin: 16px 0;
  padding: 12px 14px;
  border-radius: 8px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  white-space: pre-wrap;
}

.status.good {
  color: #166534;
  background: #f0fdf4;
  border-color: #bbf7d0;
}

.status.bad {
  color: #b91c1c;
  background: #fef2f2;
  border-color: #fecaca;
}

/*
========================================
ЛОГ
========================================
*/

.log {
  margin-top: 20px;
  background: #0f172a;
  color: #dbeafe;
  padding: 14px;
  border-radius: 8px;
  height: 340px;
  overflow: auto;
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}

</style>
</head>

<body>

<header>
  <h1>Каталог Memories</h1>
</header>

<div class="container">

<button onclick="buildCatalog()">
Собрать catalog.json
</button>

<div id="status" class="status">
Готов к сборке каталога
</div>

<div id="log" class="log"></div>

</div>

<script>

/*
========================================
ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
========================================
*/

let CATALOG = []

const logBox =
  document.getElementById("log")

const statusBox =
  document.getElementById("status")

/*
========================================
ЛОГ
========================================
*/

function log(text) {

  logBox.textContent +=
    text + "\n"

  logBox.scrollTop =
    logBox.scrollHeight

}

/*
========================================
СТАТУС
========================================
*/

function setStatus(text, error = false) {

  statusBox.textContent = text

  if (error)
    statusBox.className =
      "status bad"
  else
    statusBox.className =
      "status good"

}

/*
========================================
ОЧИСТКА ТЕКСТА
========================================
*/

function clean(value) {

  return String(value || "")
    .replace(/\r/g, "")
    .replace(/\n/g, " ")
    .replace(/\s+/g, " ")
    .trim()

}

/*
========================================
ОПРЕДЕЛЕНИЕ РАЗДЕЛА
========================================
*/

function detectSection(file) {

  if (file.startsWith("poems/"))
    return "poems"

  if (file.startsWith("songs/"))
    return "songs"

  if (file.startsWith("stories/"))
    return "stories"

  return ""

}

/*
========================================
ПОЛУЧЕНИЕ TAGS ИЗ RESUME
========================================
*/

function extractTags(resume) {

  if (!resume)
    return []

  return resume

    .toLowerCase()

    .replace(/[.,:;!?—–]/g, " ")

    .split(/\s+/)

    .filter(Boolean)

}

/*
========================================
ЧТЕНИЕ HTML
========================================
*/

async function fetchHtml(path) {

  log("Открываю: " + path)

  const res =
    await fetch(path)

  if (!res.ok)
    throw new Error(path)

  return await res.text()

}

/*
========================================
СПИСОК ФАЙЛОВ
========================================
*/

async function getFilesFromPage(page) {

  const html =
    await fetchHtml(page)

  const doc =
    new DOMParser()
      .parseFromString(html, "text/html")

  const links =
    Array.from(
      doc.querySelectorAll("a[href]")
    )

  return links

    .map(a =>
      a.getAttribute("href")
    )

    .filter(href =>

      /poems\/poem_.*\.html/i
        .test(href)

      ||

      /songs\/song_.*\.html/i
        .test(href)

      ||

      /stories\/story_.*\.html/i
        .test(href)

    )

}

/*
========================================
ИЗВЛЕЧЕНИЕ window.poem
========================================
*/

function extractPoem(html) {

  const doc =
    new DOMParser()
      .parseFromString(html, "text/html")

  const scripts =
    doc.querySelectorAll("script")

  for (const s of scripts) {

    const code =
      s.textContent

    if (!code.includes("window.poem"))
      continue

    try {

      const poem =
        new Function(
          `
          let window = {};
          ${code}
          return window.poem;
          `
        )()

      if (poem)
        return poem

    }

    catch (e) {

      log("Ошибка разбора")

    }

  }

  return null

}

/*
========================================
СБОРКА КАТАЛОГА
========================================
*/

async function buildCatalog() {

  try {

    logBox.textContent = ""

    setStatus(
      "Сборка каталога..."
    )

    /*
    ========================================
    ЧИТАЕМ ВСЕ СПИСКИ
    ========================================
    */

    const pages = [

      "poems.html",
      "songs.html",
      "stories.html"

    ]

    let files = []

    for (const page of pages) {

      try {

        const list =
          await getFilesFromPage(page)

        files =
          files.concat(list)

      }

      catch {

        log(
          "Пропуск страницы: " +
          page
        )

      }

    }

    /*
    ========================================
    УБИРАЕМ ДУБЛИКАТЫ
    ========================================
    */

    files =
      Array.from(
        new Set(files)
      )

    log(
      "Найдено файлов: " +
      files.length
    )

    /*
    ========================================
    ЧИТАЕМ КАЖДЫЙ ФАЙЛ
    ========================================
    */

    CATALOG = []

    for (const file of files) {

      try {

        const html =
          await fetchHtml(file)

        const poem =
          extractPoem(html)

        if (!poem)
          continue

        /*
        ========================================
        ДОБАВЛЯЕМ ЗАПИСЬ
        ========================================
        */

        CATALOG.push({

          title:
            clean(poem.title),

          file:
            file,

          section:
            detectSection(file),

          tags:
            extractTags(
              poem.resume
            )

        })

        log(
          "Добавлен: " +
          poem.title
        )

      }

      catch (e) {

        log(
          "Ошибка файла: " +
          file
        )

      }

    }

    /*
    ========================================
    ПРОВЕРКА
    ========================================
    */

    if (!CATALOG.length)
      throw new Error(
        "Каталог пуст"
      )

    /*
    ========================================
    СОХРАНЕНИЕ
    ========================================
    */

    downloadJson(
      CATALOG
    )

    setStatus(
      "Готово. Записей: " +
      CATALOG.length
    )

  }

  catch (e) {

    setStatus(
      "Ошибка: " +
      e.message,
      true
    )

  }

}

/*
========================================
СОХРАНЕНИЕ JSON
========================================
*/

function downloadJson(data) {

  const blob =
    new Blob(

      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],

      {
        type:
          "application/json"
      }

    )

  const url =
    URL.createObjectURL(
      blob
    )

  const a =
    document.createElement("a")

  a.href =
    url

  a.download =
    "catalog.json"

  a.click()

}

</script>

</body>
</html>
