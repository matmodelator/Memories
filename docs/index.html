<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memories</title>

  <!-- Рукописный шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: url("desktop.webp") no-repeat center center;
      background-size: cover;
      font-family: 'Great Vibes', cursive;
      position: relative;
    }

    /* Навигатор */
    .main-nav {
      position: absolute;
      left: 8%;
      top: 50%;
      transform: translateY(-50%);
      text-align: left;
    }

    .main-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .main-nav li {
      margin: 20px 0;
    }

    .main-nav a {
      text-decoration: none;
      font-size: 44px;
      color: rgba(70, 40, 20, 0.85);
      transition: 0.3s ease;
    }

    .main-nav a:hover {
      color: rgba(120, 60, 30, 1);
      transform: translateX(6px);
    }

    /* Мобильная версия */
    @media (max-width: 768px) {
      body {
        background: url("mobile.webp") no-repeat center center;
        background-size: cover;
      }

      .main-nav {
        left: 10%;
      }

      .main-nav a {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <nav class="main-nav">
    <ul>
      <li><a href="#">Главная</a></li>
      <li><a href="#">Стихи</a></li>
      <li><a href="#">Вехи</a></li>
      <li><a href="#">Автор</a></li>
      <li><a href="#">Контакты</a></li>
    </ul>
  </nav>

</body>
</html>
