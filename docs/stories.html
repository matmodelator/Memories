<!-- Сохранение позиции в свитке (списке) -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const panel = document.querySelector(".scroll-inner");
  if (!panel) return;

  const saved = sessionStorage.getItem("poemsScrollTop");
  if (saved !== null) {
    panel.scrollTop = parseInt(saved, 10);
  }

  panel.addEventListener("scroll", function () {
    sessionStorage.setItem("poemsScrollTop", panel.scrollTop);
  });

  document.querySelectorAll('a[href$=".html"]').forEach(link => {
    link.addEventListener("click", function () {
      sessionStorage.setItem("poemsScrollTop", panel.scrollTop);
    });
  });

});
</script>

<!-- Lock на запароленные тескты-->
 <script>
document.addEventListener("DOMContentLoaded", async function () {
  const links = document.querySelectorAll('.scroll-panel a[href$=".html"]');

  for (const link of links) {
    const href = link.getAttribute("href");
    if (!href) continue;

    try {
      const response = await fetch(href);
      if (!response.ok) continue;

      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      const access = doc.body ? doc.body.getAttribute("data-access") : null;

      if (access === "hidden" || access === "secret" || access === "privat") {
        link.classList.add("locked");
        link.dataset.lock = access;
      }

    } catch (err) {
      console.warn("Ошибка проверки:", href, err);
    }
  }
});
</script>
